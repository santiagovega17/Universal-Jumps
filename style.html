<style>
    :root {
       --bg: #0f172a;
       --sidebar: #1e293b;
       --header: #0f172a;
       --zebra-1: #cbd5e1;
       --zebra-2: #94a3b8;
       --text-dark: #1e293b;
       --accent: #38bdf8;
       --total-bg: #450a0a;
       --total-txt: #fca5a5;
       --border-color: rgba(255, 255, 255, 0.08);
       --input-bg: #334155;
       --input-border: #475569;
       --danger: #ef4444;
       --grass-green: #22c55e;
       --table-green: #14532d;
    }
 
    body,
    button,
    input,
    select,
    textarea {
       font-family: 'Plus Jakarta Sans', sans-serif;
    }
 
    button,
    .btn-login,
    .btn-switch,
    .btn-submit,
    .btn-reset,
    .btn-add-pago,
    .btn-remove-pago,
    .btn-reintentar,
    .btn-cargar-mas,
    .btn-pay-now,
    .fab,
    .top-nav-dropdown-trigger,
    .top-nav-item {
       text-transform: uppercase;
    }
 
    body {
       background: var(--bg);
       color: #f1f5f9;
       margin: 0;
       display: flex;
       height: 100vh;
       overflow: hidden;
       font-weight: 400;
    }
 
    /* MATERIAL SYMBOLS */
    .material-symbols-outlined {
       font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
       vertical-align: middle;
       font-size: 20px;
    }
 
    /* SCROLLBARS */
    ::-webkit-scrollbar {
       width: 6px;
       height: 6px;
    }
 
    ::-webkit-scrollbar-track {
       background: var(--bg);
    }
 
    ::-webkit-scrollbar-thumb {
       background: #334155;
       border-radius: 3px;
    }
 
    ::-webkit-scrollbar-thumb:hover {
       background: rgba(56, 189, 248, 0.5);
    }
 
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
       -webkit-appearance: none;
       margin: 0;
    }
 
    input[type=number] {
       -moz-appearance: textfield;
    }
 
    .hidden {
       display: none !important;
    }
 
    /* LOGIN */
    #login-screen {
       position: fixed;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       background: var(--bg);
       z-index: 9999;
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       transition: opacity 0.5s;
    }
 
    .login-box {
       text-align: center;
       width: 90%;
       max-width: 400px;
    }
 
    .login-logo {
       width: 180px;
       height: auto;
       margin-bottom: 30px;
       object-fit: contain;
    }
 
    .btn-login {
       background: var(--accent);
       color: var(--bg);
       font-weight: 600;
       padding: 12px 25px;
       border: none;
       border-radius: 8px;
       cursor: pointer;
       font-size: 15px;
       width: 100%;
       transition: 0.2s;
       letter-spacing: 0.5px;
    }
 
    .btn-login:hover {
       opacity: 0.9;
    }

    .btn-login:disabled {
       opacity: 0.7;
       cursor: not-allowed;
       pointer-events: none;
    }
 
    #login-error {
       color: var(--danger);
       margin-top: 15px;
       font-weight: 500;
       font-size: 13px;
       display: none;
    }
 
    .btn-switch {
       background: transparent;
       border: 1px solid var(--accent);
       color: var(--accent);
       margin-top: 15px;
       padding: 10px 20px;
       border-radius: 8px;
       font-weight: 500;
       cursor: pointer;
       text-transform: uppercase;
       font-size: 11px;
       width: 100%;
       letter-spacing: 0.5px;
    }
 
    /* APP LAYOUT */
    #app-container {
       display: none;
       flex: 1;
       flex-direction: column;
       height: 100%;
       position: relative;
       min-height: 0;
    }
 
    /* TOP NAV - Barra horizontal superior */
    .top-nav {
       flex-shrink: 0;
       background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
       border-bottom: 1px solid rgba(56, 189, 248, 0.15);
       z-index: 100;
       position: relative;
       box-shadow: 0 2px 20px rgba(0, 0, 0, 0.25);
    }
 
    .top-nav-inner {
       display: flex;
       align-items: center;
       padding: 0 28px;
       height: 64px;
       gap: 32px;
    }
 
    .top-nav-logo {
       display: flex;
       align-items: center;
       text-decoration: none;
       color: white;
       flex-shrink: 0;
       padding: 6px 0;
       border-right: 1px solid rgba(255, 255, 255, 0.1);
       padding-right: 24px;
       margin-right: 8px;
    }
 
    .top-nav-logo:hover {
       opacity: 0.9;
    }
 
    .top-nav-logo img {
       max-height: 32px;
       width: auto;
       filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.3));
    }
 
    .top-nav-logo-text {
       font-weight: 700;
       font-size: 16px;
       letter-spacing: 1.2px;
       color: #f1f5f9;
    }
 
    .top-nav-toggle {
       display: none;
       background: none;
       border: none;
       color: white;
       cursor: pointer;
       padding: 8px;
    }
 
    .top-nav-toggle .material-symbols-outlined {
       font-size: 26px;
    }
 
    .top-nav-menu {
       display: flex;
       align-items: center;
       justify-content: space-evenly;
       flex: 1;
       overflow: visible;
    }
 
    .top-nav-item {
       padding: 12px 20px !important;
       margin: 0 !important;
       border-radius: 6px;
       white-space: nowrap;
       font-weight: 600;
       font-size: 13px;
       letter-spacing: 0.3px;
       color: #94a3b8;
       border-bottom: 2px solid transparent;
       transition: all 0.2s ease;
    }
 
    .top-nav-item:hover {
       color: var(--accent);
       background: rgba(56, 189, 248, 0.06);
    }
 
    .top-nav-item.active {
       color: var(--accent);
       border-bottom-color: var(--accent);
       background: rgba(56, 189, 248, 0.08);
    }
 
    .top-nav-dropdown {
       position: relative;
    }
 
    .top-nav-dropdown-trigger {
       display: flex;
       align-items: center;
       gap: 8px;
       padding: 12px 18px;
       background: transparent;
       border: none;
       border-radius: 6px;
       color: #94a3b8;
       font-size: 13px;
       font-weight: 600;
       letter-spacing: 0.3px;
       cursor: pointer;
       transition: all 0.2s ease;
       font-family: inherit;
       border-bottom: 2px solid transparent;
    }
 
    .top-nav-dropdown-trigger:hover {
       color: var(--accent);
       background: rgba(56, 189, 248, 0.06);
    }
 
    .top-nav-dropdown:hover .top-nav-dropdown-trigger,
    .top-nav-dropdown.nav-dropdown-open .top-nav-dropdown-trigger {
       color: var(--accent);
       border-bottom-color: var(--accent);
    }
 
    .top-nav-dropdown-trigger .menu-arrow {
       font-size: 16px;
       opacity: 0.8;
       transition: transform 0.2s ease;
       transform: rotate(0deg);
    }
 
    .top-nav-dropdown-trigger:hover .menu-arrow,
    .top-nav-dropdown-trigger.active .menu-arrow,
    .top-nav-dropdown-trigger.nav-arrow-open .menu-arrow,
    .top-nav-dropdown:hover .top-nav-dropdown-trigger .menu-arrow,
    .top-nav-dropdown.nav-dropdown-open .top-nav-dropdown-trigger .menu-arrow,
    .top-nav-dropdown:has(.top-nav-dropdown-content.open) .top-nav-dropdown-trigger .menu-arrow {
       transform: rotate(180deg);
    }
 
    .top-nav-dropdown-content {
       position: absolute;
       top: 100%;
       left: 50%;
       transform: translateX(-50%);
       min-width: 240px;
       margin-top: 6px;
       background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
       border: 1px solid rgba(56, 189, 248, 0.2);
       border-radius: 12px;
       box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
       padding: 10px;
       max-height: 0;
       overflow: hidden;
       opacity: 0;
       visibility: hidden;
       transition: max-height 0.12s ease-out, opacity 0.1s ease-out, visibility 0.1s;
       z-index: 200;
    }
 
    .top-nav-dropdown.nav-dropdown-close-now .top-nav-dropdown-content {
       transition: none;
       max-height: 0 !important;
       opacity: 0 !important;
       visibility: hidden !important;
    }
 
    .top-nav-dropdown.nav-dropdown-open .top-nav-dropdown-content {
       max-height: 2000px;
       opacity: 1;
       visibility: visible;
       overflow: visible;
       transition: max-height 0.3s ease-in, opacity 0.25s ease-in, visibility 0.15s;
    }
 
    .top-nav-right {
       display: flex;
       align-items: center;
       gap: 16px;
       flex-shrink: 0;
       padding-left: 20px;
       border-left: 1px solid rgba(255, 255, 255, 0.1);
    }
 
    .top-nav-version {
       font-size: 10px;
       color: #64748b;
       background: rgba(0, 0, 0, 0.2);
       padding: 4px 8px;
       border-radius: 4px;
       font-weight: 600;
    }
 
    .top-nav-user {
       text-align: right;
       line-height: 1.3;
    }
 
    .top-nav-user .user-name {
       font-size: 12px;
       color: #e2e8f0;
    }
 
    .top-nav-user .user-role {
       font-size: 10px;
       color: var(--accent);
       font-weight: 700;
       letter-spacing: 0.5px;
    }
 
    .menu-arrow {
       transition: transform 0.3s ease;
       font-size: 16px;
    }
 
    .submenu.open:not(.top-nav-dropdown-content) {
       max-height: 500px;
       opacity: 1;
    }
 
    .top-nav .menu-sublabel {
       font-size: 9px;
       color: var(--accent);
       font-weight: 700;
       margin: 14px 0 6px 0;
       padding: 0 10px;
       text-transform: uppercase;
       letter-spacing: 1.2px;
       opacity: 0.85;
    }
 
    .top-nav .menu-item {
       padding: 10px 14px;
       margin-bottom: 2px;
       border-radius: 8px;
       cursor: pointer;
       color: #cbd5e1;
       transition: all 0.2s ease;
       font-size: 13px;
       font-weight: 500;
       display: flex;
       align-items: center;
       gap: 12px;
    }
 
    .top-nav .menu-item:hover {
       background: rgba(56, 189, 248, 0.12);
       color: white;
       transform: translateX(2px);
    }
 
    .top-nav .menu-item.active {
       background: rgba(56, 189, 248, 0.18);
       color: var(--accent);
       font-weight: 600;
       border-left: 3px solid var(--accent);
    }
 
    .top-nav .menu-item .material-symbols-outlined {
       font-size: 18px;
       opacity: 0.85;
    }
 
    .vendor-item.vendor-inactive {
       opacity: 0.5;
       color: #64748b;
    }
 
    .vendor-item.vendor-inactive:hover {
       opacity: 0.7;
       color: #94a3b8;
    }
 
    /* MAIN */
    .main {
       flex: 1;
       display: flex;
       flex-direction: column;
       overflow: hidden;
       position: relative;
       width: 100%;
    }
 
    .header {
       height: 56px;
       padding: 0 25px;
       display: flex;
       align-items: center;
       background: var(--header);
       border-bottom: 1px solid var(--border-color);
       justify-content: flex-start;
    }
 
    .header-left {
       display: flex;
       align-items: center;
       gap: 15px;
       flex: 1;
       overflow: hidden;
    }
 
    .header-select {
       display: none;
       padding: 6px 12px;
       border-radius: 6px;
       background: #334155;
       color: white;
       border: 1px solid #475569;
       font-size: 13px;
       cursor: pointer;
       outline: none;
       font-family: 'Plus Jakarta Sans', sans-serif;
    }
 
    .header-select:focus {
       border-color: var(--accent);
    }
 
    #balance-filters .header-select {
       display: block !important;
    }
 
    .header h2 {
       margin: 0;
       font-size: 14px;
       font-weight: 600;
       text-transform: uppercase;
       letter-spacing: 1px;
       color: #f1f5f9;
    }
 
    .user-info {
       text-align: right;
       line-height: 1.2;
    }
 
    .user-name {
       font-size: 13px;
       font-weight: 500;
       color: white;
    }
 
    .user-role {
       color: var(--accent);
       font-weight: 600;
       font-size: 10px;
       text-transform: uppercase;
       letter-spacing: 0.5px;
    }
 
    .content {
       padding: 15px;
       overflow: auto;
       height: 100%;
       -webkit-overflow-scrolling: touch;
    }
 
    /* CARDS */
    .home-grid {
       display: grid;
       grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
       gap: 25px;
       max-width: 1000px;
       margin: 0 auto;
    }
 
    .home-card {
       background: var(--sidebar);
       padding: 25px;
       border-radius: 12px;
       cursor: pointer;
       border: 1px solid var(--border-color);
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       height: 160px;
       text-align: center;
       position: relative;
       overflow: hidden;
       transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
 
    .home-card:hover {
       border-color: rgba(56, 189, 248, 0.5);
       transform: scale(1.02);
       box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(56, 189, 248, 0.2);
    }
 
    .home-card.main-cat {
       height: 180px;
       background: rgba(30, 41, 59, 0.5);
    }
 
    .home-card.main-cat:hover {
       background: var(--sidebar);
       border-color: rgba(56, 189, 248, 0.5);
       transform: scale(1.02);
       box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(56, 189, 248, 0.2);
    }
 
    .home-icon {
       margin-bottom: 15px;
       color: var(--accent);
    }
 
    .home-icon .material-symbols-outlined {
       font-size: 40px;
       font-weight: 300;
    }
 
    .home-title {
       font-size: 14px;
       font-weight: 600;
       color: white;
       text-transform: uppercase;
       letter-spacing: 0.5px;
    }
 
    .home-desc {
       font-size: 12px;
       color: #94a3b8;
       margin-top: 8px;
       font-weight: 400;
    }
 
    .home-card.disabled {
       opacity: 0.5;
       cursor: not-allowed;
    }
 
    .back-nav {
       display: flex;
       align-items: center;
       gap: 8px;
       margin-bottom: 25px;
       cursor: pointer;
       color: #94a3b8;
       font-weight: 500;
       font-size: 13px;
       width: fit-content;
       padding: 6px 0 6px 12px;
       border-left: 3px solid transparent;
       transition: all 0.25s ease;
    }
 
    .back-nav:hover {
       color: var(--accent);
       border-left-color: var(--accent);
    }
 
    .back-nav .material-symbols-outlined {
       font-size: 16px;
    }
 
    .dash-section-title {
       font-size: 12px;
       color: var(--accent);
       font-weight: 700;
       margin-bottom: 25px;
       text-transform: uppercase;
       letter-spacing: 1.5px;
       border-bottom: 1px solid rgba(255, 255, 255, 0.1);
       padding-bottom: 15px;
       text-align: center;
    }
 
    .welcome-banner {
       text-align: center;
       margin-bottom: 50px;
       margin-top: 30px;
    }
 
    .welcome-title {
       font-size: 22px;
       font-weight: 600;
       color: white;
       letter-spacing: -0.5px;
    }
 
    .welcome-subtitle {
       color: #94a3b8;
       font-size: 14px;
       margin-top: 5px;
    }
 
    /* --- TARJETAS MES (UNIFICADO) --- */
    .month-grid {
       display: grid;
       grid-template-columns: 1fr 1fr;
       gap: 20px;
    }
 
    .month-card {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 10px;
       overflow: hidden;
       display: flex;
       flex-direction: column;
    }
 
    .month-header {
       background: rgba(255, 255, 255, 0.02);
       padding: 15px 20px;
       display: flex;
       justify-content: space-between;
       align-items: center;
       border-bottom: 1px solid var(--border-color);
    }
 
    .month-name {
       font-weight: 600;
       color: white;
       text-transform: uppercase;
       font-size: 15px;
       letter-spacing: 0.5px;
    }
 
    .month-total-val {
       font-weight: 700;
       color: white;
       font-size: 24px;
    }
 
    .month-body {
       padding: 20px;
       flex: 1;
    }
 
    .month-kpi-row {
       display: flex;
       justify-content: space-between;
       margin-bottom: 15px;
       padding-bottom: 15px;
       border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
 
    .m-kpi {
       font-size: 12px;
       color: #94a3b8;
       font-weight: 500;
       text-transform: uppercase;
       letter-spacing: 0.5px;
    }
 
    .m-kpi span {
       display: block;
       color: white;
       font-size: 16px;
       font-weight: 600;
       margin-top: 4px;
    }
 
    /* CONTENEDOR PAISES CON LINEA VERTICAL */
    .month-countries {
       display: grid;
       grid-template-columns: 1fr 1fr;
       gap: 15px;
       background: rgba(0, 0, 0, 0.15);
       padding: 15px;
       border-radius: 8px;
       margin-bottom: 12px;
       border: 1px solid rgba(255, 255, 255, 0.03);
       position: relative;
    }
 
    .month-countries::after {
       content: '';
       position: absolute;
       top: 15px;
       bottom: 15px;
       left: 50%;
       width: 1px;
       background: #94a3b8;
       /* COLOR DE LA FUENTE DE ETIQUETAS */
       transform: translateX(-50%);
    }
 
    .c-row {
       display: flex;
       justify-content: space-between;
       align-items: center;
       font-size: 13px;
       margin-bottom: 5px;
    }
 
    .c-name {
       color: #94a3b8;
       font-weight: 600;
       font-size: 12px;
    }
 
    .c-val {
       color: #f1f5f9;
       font-weight: 700;
       font-size: 15px;
    }
 
    .c-ars {
       color: #64748b;
       font-size: 11px;
       margin-left: 5px;
       font-weight: 400;
    }
 
    .month-footer {
       background: rgba(34, 197, 94, 0.08);
       padding: 12px 20px;
       border-top: 1px solid rgba(34, 197, 94, 0.15);
       display: flex;
       justify-content: space-between;
       align-items: center;
    }
 
    .comm-label {
       color: #86efac;
       font-size: 10px;
       font-weight: 700;
       text-transform: uppercase;
       letter-spacing: 1px;
    }
 
    .comm-total {
       color: #4ade80;
       font-size: 18px;
       font-weight: 700;
    }
 
    /* GENERAL CARDS */
    #general-cards-container .month-grid {
       grid-template-columns: 1fr 1fr;
       gap: 20px;
    }
 
    @media (max-width: 900px) {
 
       .month-grid,
       #general-cards-container .month-grid {
          grid-template-columns: 1fr;
       }
    }
 
    /* BARRA PROGRESO */
    .prog-container {
       margin-bottom: 20px;
    }
 
    .prog-labels {
       display: flex;
       justify-content: space-between;
       font-size: 11px;
       color: var(--accent);
       font-weight: 600;
       margin-bottom: 5px;
       text-transform: uppercase;
       letter-spacing: 0.5px;
    }
 
    .prog-track {
       width: 100%;
       height: 6px;
       background: #334155;
       border-radius: 3px;
       overflow: hidden;
       position: relative;
       border: 1px solid #475569;
    }
 
    .prog-fill {
       height: 100%;
       background: var(--grass-green);
       transition: width 0.5s ease-out;
       border-radius: 3px;
    }
 
    .prog-stats {
       display: flex;
       justify-content: space-between;
       margin-top: 6px;
       font-size: 12px;
       color: #cbd5e1;
       font-weight: 600;
    }
 
    .prog-stats span {
       display: block;
    }
 
    /* BALANCE CAJA - ESTILO CARDS */
    .method-grid {
       display: grid;
       grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
       gap: 15px;
       margin-bottom: 30px;
    }
 
    .method-card {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 10px;
       padding: 15px;
    }
 
    .method-title {
       font-size: 13px;
       font-weight: 700;
       color: white;
       text-transform: uppercase;
       margin-bottom: 10px;
       border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
       padding-bottom: 5px;
    }
 
    .method-row {
       display: flex;
       justify-content: space-between;
       font-size: 12px;
       margin-bottom: 4px;
       color: #94a3b8;
    }
 
    .method-val {
       font-weight: 600;
    }
 
    .method-total {
       margin-top: 8px;
       padding-top: 8px;
       border-top: 1px solid rgba(255, 255, 255, 0.05);
       display: flex;
       justify-content: space-between;
       font-size: 14px;
       color: white;
       font-weight: 700;
    }
 
    .val-green {
       color: var(--grass-green);
    }
 
    .val-red {
       color: var(--danger);
    }
 
    .val-blue {
       color: var(--accent);
    }
 
    .txn-list {
       display: flex;
       flex-direction: column;
       gap: 10px;
    }
 
    .txn-item {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 10px;
       padding: 15px;
       display: flex;
       align-items: center;
       justify-content: space-between;
       transition: 0.2s;
    }
 
    .txn-item:hover {
       border-color: rgba(255, 255, 255, 0.1);
       background: rgba(255, 255, 255, 0.02);
    }
 
    .txn-left {
       display: flex;
       align-items: center;
       gap: 15px;
       flex: 1;
    }
 
    .txn-icon {
       width: 40px;
       height: 40px;
       border-radius: 50%;
       display: flex;
       align-items: center;
       justify-content: center;
       flex-shrink: 0;
    }
 
    .txn-icon.ingreso {
       background: rgba(34, 197, 94, 0.1);
       color: var(--grass-green);
    }
 
    .txn-icon.egreso {
       background: rgba(239, 68, 68, 0.1);
       color: var(--danger);
    }
 
    .txn-info {
       display: flex;
       flex-direction: column;
    }
 
    .txn-concept {
       font-weight: 600;
       font-size: 14px;
       color: white;
    }
 
    .txn-desc {
       font-size: 12px;
       color: #94a3b8;
       margin-top: 2px;
    }
 
    .txn-meta {
       font-size: 11px;
       color: #64748b;
       margin-top: 2px;
       display: flex;
       gap: 10px;
    }
 
    .txn-right {
       text-align: right;
       display: flex;
       flex-direction: column;
       align-items: flex-end;
       gap: 5px;
    }
 
    .txn-amount {
       font-weight: 700;
       font-size: 15px;
    }
 
    .txn-actions {
       display: flex;
       gap: 5px;
       opacity: 0.5;
       transition: 0.2s;
    }
 
    .txn-item:hover .txn-actions {
       opacity: 1;
    }
 
    @media(max-width: 600px) {
       .txn-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
       }
 
       .txn-right {
          width: 100%;
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          border-top: 1px solid rgba(255, 255, 255, 0.05);
          padding-top: 10px;
          margin-top: 5px;
       }
    }
 
    /* UI ELEMENTOS */
    .card-header {
       font-size: 16px;
       color: var(--accent);
       font-weight: 800;
       text-transform: uppercase;
       margin-bottom: 15px;
       border-left: 4px solid #ef4444;
       padding-left: 15px;
       letter-spacing: 1px;
       display: flex;
       align-items: center;
       gap: 8px;
    }
 
    .filter-bar {
       display: flex;
       gap: 8px;
       margin-bottom: 15px;
       background: var(--sidebar);
       padding: 12px;
       border-radius: 10px;
       border: 1px solid var(--border-color);
       flex-wrap: wrap;
       align-items: center;
    }
 
    .filter-select {
       background: var(--bg);
       border: 1px solid var(--input-border);
       color: white;
       padding: 8px;
       border-radius: 6px;
       font-size: 12px;
       outline: none;
       min-width: 100px;
       flex: 1;
       cursor: pointer;
    }
 
    .filter-select:focus {
       border-color: var(--accent);
    }
 
    .btn-reset {
       background: var(--danger);
       border: none;
       color: white;
       padding: 8px 12px;
       border-radius: 6px;
       font-weight: 700;
       font-size: 12px;
       cursor: pointer;
       display: flex;
       align-items: center;
       justify-content: center;
    }
 
    .btn-submit {
       background: var(--accent);
       color: var(--bg);
       font-weight: 800;
       padding: 12px 24px;
       border: none;
       border-radius: 8px;
       cursor: pointer;
       font-size: 14px;
       width: 100%;
       transition: all 0.25s ease;
       box-shadow: 0 2px 8px rgba(56, 189, 248, 0.2);
    }
    .btn-submit:hover {
       box-shadow: 0 4px 16px rgba(56, 189, 248, 0.4);
       filter: brightness(1.08);
    }
 
    .action-btn {
       background: none;
       border: none;
       cursor: pointer;
       padding: 5px;
       font-size: 16px;
       transition: 0.2s;
       border-radius: 4px;
       display: inline-flex;
    }
 
    .btn-edit:hover {
       background: rgba(255, 255, 255, 0.05);
       color: var(--accent);
    }
 
    .btn-del:hover {
       background: rgba(220, 38, 38, 0.1);
       color: #ef4444;
    }
 
    .action-btn .material-symbols-outlined {
       font-size: 18px;
    }
 
    .spinner {
       border: 4px solid rgba(255, 255, 255, 0.1);
       width: 36px;
       height: 36px;
       border-radius: 50%;
       border-left-color: var(--accent);
       animation: spin 1s linear infinite;
       margin: 0 auto 10px;
    }
 
    @keyframes spin {
       0% {
          transform: rotate(0deg);
       }
 
       100% {
          transform: rotate(360deg);
       }
    }
 
    #error-msg {
       color: #ef4444;
       text-align: center;
       margin-top: 20px;
       font-weight: 500;
       display: none;
       padding: 20px;
       border: 1px solid #ef4444;
       background: rgba(239, 68, 68, 0.1);
       border-radius: 8px;
    }
 
    .fab {
       position: fixed;
       bottom: 30px;
       right: 30px;
       background: var(--accent);
       color: var(--bg);
       width: auto;
       height: auto;
       border-radius: 10px;
       border: none;
       padding: 12px 20px;
       font-weight: 700;
       font-size: 13px;
       cursor: pointer;
       display: inline-flex;
       align-items: center;
       gap: 8px;
       box-shadow: 0 4px 16px rgba(56, 189, 248, 0.35);
       transition: all 0.25s ease;
       z-index: 100;
    }
 
    .fab:hover {
       transform: translateY(-3px) scale(1.02);
       box-shadow: 0 8px 24px rgba(56, 189, 248, 0.45);
    }
 
    .fab .material-symbols-outlined {
       font-size: 18px;
    }
 
    /* TABLAS (SOLO HISTORIAL) */
    .card {
       background: var(--sidebar);
       border-radius: 10px;
       margin-bottom: 30px;
       border: 1px solid var(--border-color);
       /* overflow: hidden;  -- Eliminado para permitir que los tooltips se vean */
    }
 
    .card-scroll {
       overflow-x: auto;
       width: 100%;
    }
 
    table {
       width: 100%;
       border-collapse: collapse;
       border-spacing: 0;
       font-size: 13px;
    }
 
    thead tr {
       background: var(--header);
    }
 
    thead th {
       padding: 12px 10px;
       color: #94a3b8;
       font-weight: 700;
       text-transform: uppercase;
       text-align: center;
       border: none !important;
       white-space: nowrap;
       min-width: 60px;
       background: var(--header);
    }
 
    td {
       padding: 12px 10px;
       text-align: center;
       border: none !important;
       vertical-align: middle;
       position: relative;
       z-index: 1;
       white-space: nowrap;
       color: #f1f5f9;
       line-height: 1.4;
    }
 
    /* Mantener botones de acciones en una sola línea */
    td:last-child {
       white-space: nowrap;
    }
 
    tbody tr td {
       background: var(--sidebar);
    }
 
    tbody tr:hover td {
       background: rgba(56, 189, 248, 0.05);
    }
 
    /* FORMULARIOS */
    .form-label {
       display: block;
       margin-bottom: 10px;
       font-size: 12px;
       font-weight: 600;
       color: #94a3b8;
    }
 
    .form-input,
    .form-select,
    textarea.form-input {
       width: 100%;
       background: var(--input-bg);
       border: 1px solid var(--input-border);
       color: #f1f5f9;
       padding: 10px;
       border-radius: 6px;
       font-size: 14px;
       outline: none;
       box-sizing: border-box;
       transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:hover,
    .form-select:hover,
    textarea.form-input:hover {
       border-color: #64748b;
    }
    .form-input:focus {
       border-color: var(--accent);
       box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
 
    .form-row {
       display: flex;
       gap: 15px;
       margin-bottom: 15px;
    }
 
    .form-group {
       flex: 1;
       margin-bottom: 20px;
    }
 
    .btn-add-pago {
       background: none;
       border: 1px dashed var(--accent);
       color: var(--accent);
       padding: 8px;
       width: 100%;
       border-radius: 6px;
       cursor: pointer;
       font-size: 12px;
       font-weight: 600;
       transition: 0.2s;
    }
 
    .btn-add-pago:hover {
       background: rgba(56, 189, 248, 0.1);
    }
 
    .pago-row {
       display: flex;
       gap: 10px;
       margin-bottom: 10px;
       align-items: center;
    }
 
    .btn-remove-pago {
       background: var(--danger);
       color: white;
       border: none;
       width: 30px;
       height: 36px;
       border-radius: 6px;
       cursor: pointer;
       font-weight: bold;
       display: flex;
       align-items: center;
       justify-content: center;
    }
 
    .type-toggle {
       display: flex;
       background: var(--input-bg);
       border-radius: 6px;
       overflow: hidden;
       border: 1px solid var(--input-border);
    }
 
    .type-option {
       flex: 1;
       text-align: center;
       padding: 10px;
       cursor: pointer;
       font-weight: 600;
       font-size: 12px;
       transition: 0.2s;
       color: #94a3b8;
    }
 
    .type-option.active-egreso {
       background: var(--danger);
       color: white;
    }
 
    .type-option.active-ingreso {
       background: var(--grass-green);
       color: white;
    }
 
    /* VIEW TOGGLE VENDEDORES (TABS) */
    .view-toggle-container {
       margin-bottom: 20px;
    }
 
    .view-option.active-view {
       background: var(--accent);
       color: var(--bg);
       font-weight: 800;
    }
 
    /* Colores característicos por país para tabs activas */
    .tab-caja.active-view[data-pais="ARGENTINA"] {
       background: #6CACE4 !important;
       /* Azul celeste de Argentina */
       color: white !important;
    }
 
    .tab-caja.active-view[data-pais="CHILE"] {
       background: #0039A6 !important;
       /* Azul de Chile */
       color: white !important;
    }
 
    .tab-caja.active-view[data-pais="ESPAÑA"] {
       background: #AA151B !important;
       /* Rojo de España */
       color: white !important;
    }
 
    .tab-caja.active-view[data-pais="MEXICO"] {
       background: #006847 !important;
       /* Verde de México */
       color: white !important;
    }
 
    .tab-caja.active-view[data-pais="EEUU"] {
       background: #002868 !important;
       /* Azul de EEUU */
       color: white !important;
    }
 
    .view-option {
       flex: 1;
       text-align: center;
       padding: 10px;
       cursor: pointer;
       font-weight: 600;
       font-size: 12px;
       color: #94a3b8;
       transition: 0.2s;
    }
 
    .view-option:hover {
       color: white;
    }
 
    /* KPI */
    .kpi-container {
       display: flex;
       gap: 15px;
       margin-bottom: 20px;
       flex-wrap: wrap;
       justify-content: center;
    }
 
    .kpi-card {
       flex: 1;
       min-width: 140px;
       max-width: 250px;
       background: var(--sidebar);
       padding: 15px;
       border-radius: 12px;
       border: 1px solid var(--border-color);
       text-align: center;
    }
 
    .kpi-title {
       font-size: 11px;
       text-transform: uppercase;
       color: #94a3b8;
       font-weight: 700;
       margin-bottom: 5px;
    }
 
    .kpi-value {
       font-size: 18px;
       font-weight: 800;
       color: white;
    }
 
    .kpi-green {
       color: var(--grass-green);
    }
 
    .text-green-table {
       color: var(--table-green);
       font-weight: 800;
    }
 
    .kpi-red {
       color: var(--danger);
    }
 
    .kpi-blue {
       color: var(--accent);
    }
 
    /* CONFIG */
    .config-section {
       margin-bottom: 25px;
    }
 
    .add-row {
       display: flex;
       gap: 8px;
       margin-bottom: 10px;
    }
 
    .config-container {
       display: flex;
       flex-wrap: wrap;
       gap: 8px;
       background: rgba(255, 255, 255, 0.03);
       padding: 10px;
       border-radius: 8px;
       border: 1px dashed rgba(255, 255, 255, 0.1);
       min-height: 40px;
       margin-top: 5px;
    }
 
    .config-tag {
       background: rgba(56, 189, 248, 0.15);
       color: #7dd3fc;
       border: 1px solid rgba(56, 189, 248, 0.2);
       padding: 5px 12px;
       border-radius: 20px;
       font-size: 12px;
       font-weight: 600;
       display: inline-flex;
       align-items: center;
       gap: 8px;
       transition: 0.2s;
    }
 
    .config-tag:hover {
       background: rgba(56, 189, 248, 0.25);
    }
 
    .config-tag span {
       cursor: pointer;
       color: #fca5a5;
       font-weight: bold;
       font-size: 14px;
       line-height: 1;
       display: flex;
       align-items: center;
    }
 
    .config-tag span:hover {
       color: #ef4444;
    }
 
    /* OBJETIVOS */
    .obj-grid-container {
       display: grid;
       grid-template-columns: repeat(4, 1fr);
       gap: 20px;
       margin-bottom: 30px;
    }
 
    .obj-card {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 12px;
       padding: 0;
       overflow: hidden;
    }
 
    .obj-header-row {
       background: var(--header);
       padding: 15px;
       border-bottom: 1px solid var(--border-color);
       display: flex;
       justify-content: space-between;
       align-items: center;
    }
 
    .obj-title {
       font-weight: 800;
       color: white;
       text-transform: uppercase;
       font-size: 14px;
    }
 
    .obj-comision {
       font-size: 12px;
       color: var(--accent);
       font-weight: 700;
       background: rgba(56, 189, 248, 0.1);
       padding: 4px 10px;
       border-radius: 20px;
    }
 
    .obj-content {
       padding: 15px;
    }
 
    .obj-sub-section {
       margin-bottom: 15px;
       padding-bottom: 15px;
       border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
 
    .obj-sub-section:last-child {
       margin-bottom: 0;
       padding-bottom: 0;
       border-bottom: none;
    }
 
    .obj-sub-title {
       font-size: 11px;
       color: #94a3b8;
       font-weight: 700;
       margin-bottom: 8px;
       text-transform: uppercase;
       letter-spacing: 0.5px;
       display: flex;
       align-items: center;
       gap: 5px;
    }
 
    .obj-sub-title .material-symbols-outlined {
       font-size: 16px;
       color: var(--accent);
    }
 
    .obj-row {
       display: flex;
       justify-content: space-between;
       align-items: center;
       margin-bottom: 6px;
       font-size: 13px;
    }
 
    .obj-label {
       color: #cbd5e1;
    }
 
    .obj-val {
       font-weight: 600;
       color: white;
    }
 
    .obj-input {
       background: transparent;
       border: 1px solid transparent;
       color: white;
       text-align: right;
       width: 80px;
       font-weight: bold;
       border-radius: 4px;
       padding: 2px 5px;
    }
 
    .obj-input.editable {
       border-color: var(--accent);
       background: #334155;
    }
 
    .obj-input:focus {
       outline: none;
       border-color: var(--grass-green);
    }
 
    /* CONSOLIDADO STYLES */
    .conso-grid {
       display: grid;
       grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
       gap: 25px;
    }
 
    .conso-card {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 12px;
       overflow: hidden;
    }
 
    .conso-card-annual {
       background: var(--sidebar);
       border: 1px solid var(--border-color);
       border-radius: 12px;
       overflow: hidden;
       width: 100%;
    }
 
    .conso-header {
       background: var(--header);
       padding: 15px;
       border-bottom: 1px solid var(--border-color);
       font-weight: 800;
       text-transform: uppercase;
       color: white;
       letter-spacing: 1px;
       text-align: center;
    }
 
    .conso-body {
       padding: 20px;
    }
 
    .arg-section {
       background: rgba(56, 189, 248, 0.05);
       border: 1px solid rgba(56, 189, 248, 0.1);
       border-radius: 8px;
       padding: 15px;
       margin-bottom: 15px;
    }
 
    .arg-title {
       color: var(--accent);
       font-weight: 800;
       font-size: 12px;
       text-transform: uppercase;
       margin-bottom: 10px;
       border-bottom: 1px solid rgba(56, 189, 248, 0.2);
       padding-bottom: 5px;
    }
 
    .arg-row {
       display: flex;
       justify-content: space-between;
       font-size: 13px;
       margin-bottom: 5px;
       color: #cbd5e1;
    }
 
    .arg-row.total {
       font-weight: 800;
       color: white;
       margin-top: 10px;
       border-top: 1px dashed rgba(255, 255, 255, 0.1);
       padding-top: 5px;
       font-size: 14px;
    }
 
    .world-grid {
       display: grid;
       grid-template-columns: 1fr 1fr;
       gap: 10px;
    }
 
    .world-item {
       background: rgba(255, 255, 255, 0.03);
       padding: 8px;
       border-radius: 6px;
       text-align: center;
    }
 
    .world-country {
       font-size: 10px;
       font-weight: 700;
       color: #94a3b8;
       text-transform: uppercase;
       margin-bottom: 3px;
    }
 
    .world-val {
       font-size: 13px;
       font-weight: 700;
       color: white;
    }
 
    /* MODALS */
    .modal-overlay {
       position: fixed;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       background: rgba(0, 0, 0, 0.7);
       backdrop-filter: blur(8px);
       z-index: 9999;
       display: none;
       align-items: center;
       justify-content: center;
       opacity: 0;
       transition: opacity 0.3s;
    }
 
    .modal-overlay.open {
       display: flex;
       opacity: 1;
    }
 
    .modal-content {
       background: #1e293b;
       width: 95%;
       max-width: 500px;
       border-radius: 14px;
       padding: 20px;
       border: 1px solid rgba(255, 255, 255, 0.1);
       box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
       transform: translateY(20px);
       transition: transform 0.3s;
       max-height: 90vh;
       overflow-y: auto;
    }
 
    /* Modal de nuevo producto - más compacto */
    #modalNuevoProducto .modal-content {
       max-height: 85vh;
       max-width: 600px;
    }

    /* Modal de venta: compacto como caja, max 520px */
    #modalVenta {
       padding: 12px 0;
       align-items: center;
    }
    #modalVenta .modal-content {
       max-height: calc(100vh - 24px);
       max-width: 520px;
       width: 95%;
       padding: 12px;
       overflow-y: auto;
    }
    #modalVenta .form-group-venta-sm,
    #modalVenta .form-group.form-group-venta-sm {
       margin-bottom: 8px;
    }
    #modalVenta .form-row-venta-sm,
    #modalVenta .form-row.form-row-venta-sm {
       display: flex;
       gap: 10px;
       margin-bottom: 8px;
    }
    #modalVenta .form-row-venta-sm .form-group-venta-sm {
       flex: 1;
       margin-bottom: 0;
    }
    #modalVenta .form-label-venta-sm {
       font-size: 11px;
       margin-bottom: 4px;
    }
    #modalVenta .form-input-venta-sm,
    #modalVenta .form-input.form-input-venta-sm,
    #modalVenta select.form-input-venta-sm,
    #modalVenta textarea.form-input-venta-sm {
       padding: 6px 8px;
       font-size: 12px;
    }
    #modalVenta .cliente-combobox-row {
       display: flex;
       gap: 6px;
       align-items: stretch;
    }
    #modalVenta .cliente-combobox-row button.cliente-combobox-add-btn {
       margin-top: 0;
       width: 36px;
       min-width: 36px;
       max-width: 36px;
       flex-shrink: 0;
       padding: 0;
       align-self: stretch;
       box-sizing: border-box;
       display: flex;
       align-items: center;
       justify-content: center;
    }
    #modalVenta .cliente-combobox-add-icon {
       font-size: 18px;
       line-height: 1;
    }
    #modalVenta .cliente-combobox-input {
       width: 100%;
       box-sizing: border-box;
    }
    #modalVenta .cliente-combobox-panel {
       position: absolute;
       left: 0;
       right: 0;
       top: 100%;
       margin-top: 2px;
       max-height: 220px;
       overflow-y: auto;
       z-index: 50;
       background: #1e293b;
       border: 1px solid #334155;
       border-radius: 8px;
       box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    #modalVenta .cliente-combobox-option {
       padding: 8px 10px;
       font-size: 12px;
       cursor: pointer;
       color: #f1f5f9;
       border-bottom: 1px solid #334155;
    }
    #modalVenta .cliente-combobox-option:last-child {
       border-bottom: none;
    }
    #modalVenta .cliente-combobox-option:hover,
    #modalVenta .cliente-combobox-option.is-active {
       background: #334155;
    }
    #modalVenta .cliente-combobox-msg {
       padding: 8px 10px;
       font-size: 12px;
       color: #94a3b8;
    }
    #modalVenta .btn-submit-venta-sm {
       width: auto;
       padding: 8px 16px;
       font-size: 12px;
       margin-top: 4px;
    }
    #modalVenta .modal-header {
       margin-bottom: 10px;
       padding-bottom: 6px;
    }
    #modalVenta .modal-title {
       font-size: 14px;
    }

    /* Configuración — medios de pago (grilla compacta, filas horizontales) */
    .formas-pago-config-body {
       padding: 6px 0 24px 0;
       max-width: 960px;
       margin-left: auto;
       margin-right: auto;
       box-sizing: border-box;
    }
    .formas-pago-config-toolbar {
       display: flex;
       flex-wrap: wrap;
       align-items: center;
       justify-content: space-between;
       gap: 10px;
       margin-bottom: 14px;
    }
    .formas-pago-config-toolbar-title {
       margin: 0;
       font-size: 16px;
       font-weight: 700;
       color: #f1f5f9;
       letter-spacing: 0.02em;
    }
    .formas-pago-config-add-btn {
       width: auto;
       padding: 8px 14px;
       font-size: 12px;
       display: inline-flex;
       align-items: center;
       gap: 5px;
    }
    .formas-pago-config-add-btn .material-symbols-outlined {
       font-size: 18px;
    }
    /* A: columnas acotadas, sin 1fr que estire al ancho completo */
    .formas-pago-config-grid {
       display: grid;
