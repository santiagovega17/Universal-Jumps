<script>
    let GLOBAL_CONFIG = {}; // Se llenará estructurada por país
    let PAIS_CAJA_ACTUAL = 'ARGENTINA'; // País por defecto
    let PAIS_STOCK_ACTUAL = 'ARGENTINA'; // País por defecto para stock
    let VISTA_STOCK_ACTUAL = 'STOCK'; // Vista por defecto: 'STOCK' o 'MOVIMIENTOS'
    let ALL_OBJECTIVES = []; // Cache de objetivos
    let ALL_OBJECTIVES_ESPECIALES = {}; // Cache de objetivos especiales { trimestre: { vendedor: objetivo } }
    let COTIZACIONES = {};
    const TRIMESTRES = ["1° TRIMESTRE", "2° TRIMESTRE", "3° TRIMESTRE", "4° TRIMESTRE"];
    let HOJA_ACTUAL = 'HOME';
    let USUARIO_ACTUAL = null;
    let HISTORIAL_CACHE = [];
    let HISTORIAL_CAJA_COMPLETO = []; // Almacenar todos los movimientos para filtrar
    let FILTRO_TIPO_HISTORIAL = 'EGRESO'; // Filtro predeterminado
    let FILAS_EN_EDICION = {}; // { filaIndex: true/false } para rastrear qué filas están en modo edición
    let CAMBIOS_PENDIENTES = {}; // { filaIndex: { campo: valor } } para almacenar cambios no guardados
 
    let accionPendiente = null;
    let NAVEGANDO = false; // Flag para prevenir navegación múltiple
 
    // DETECTAR ESC PARA CERRAR MODALES
    document.addEventListener('keydown', function (event) {
       if (event.key === "Escape") {
          cerrarModals();
       }
    });
 
    // Listener para actualizar clientes cuando cambia el vendedor o el país en el modal de venta
    setTimeout(() => {
       let selVendedor = document.getElementById('selVendedor');
       if (selVendedor && !selVendedor.dataset.listenerAdded) {
          selVendedor.addEventListener('change', function () {
             actualizarSelectorClientes(this.value);
          });
          selVendedor.dataset.listenerAdded = 'true';
       }
 
       let paisInput = document.getElementById('paisInput');
       if (paisInput && !paisInput.dataset.listenerAdded) {
          paisInput.addEventListener('change', function () {
             // Actualizar clientes cuando cambia el país
             let selVendedor = document.getElementById('selVendedor');
             if (selVendedor && selVendedor.value) {
                actualizarSelectorClientes(selVendedor.value);
             }
          });
          paisInput.dataset.listenerAdded = 'true';
       }
    }, 2000);
 
    // --- NUEVA FUNCIÓN: CAMBIAR PAÍS EN CAJA ---
    function switchCountryCaja(pais) {
       PAIS_CAJA_ACTUAL = pais;
 
       // Actualizar visualmente las pestañas usando data-pais
       document.querySelectorAll('.tab-caja').forEach(el => {
          el.classList.remove('active-view');
          if (el.getAttribute('data-pais') === pais) {
             el.classList.add('active-view');
          }
       });
 
       // Recargar Balance y Selects para el país seleccionado
       cargarBalance();
       poblarSelectsCaja();
    }
 
    // --- FORMATO ARGENTINA ---
    function formatoMoneda(input) {
       let val = input.value.replace(/\D/g, '');
       if (!val) { input.value = ""; return; }
       let num = parseInt(val) / 100;
       input.value = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }).format(num).replace('ARS', '').trim();
    }
    function parseCurrency(str) {
       if (!str) return 0;
       if (typeof str === 'number') return str;
       let limpio = str.toString().replace(/[$.]/g, '').replace(',', '.').trim();
       return parseFloat(limpio) || 0;
    }
    function formatNumberAr(num) {
       if (num === null || num === undefined) return "$ 0,00";
       return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }).format(num);
    }
    function calcularTotal() {
       let cant = parseFloat(document.getElementById('cantInput').value) || 0;
       let precio = parseCurrency(document.getElementById('precioInput').value);
       let total = cant * precio;
       document.getElementById('totalDisplay').value = formatNumberAr(total);
    }
 
    function formatCurrency(amount, currencyCode) {
       if (!amount) amount = 0;
       return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode }).format(amount);
    }
 
    // --- UI HELPERS ---
    function setTipoCaja(tipo) {
       document.getElementById('tipoCaja').value = tipo;
       let btnEgreso = document.getElementById('btn-egreso');
       let btnIngreso = document.getElementById('btn-ingreso');
       if (tipo === 'EGRESO') { btnEgreso.classList.add('active-egreso'); btnIngreso.classList.remove('active-ingreso'); }
       else { btnIngreso.classList.add('active-ingreso'); btnEgreso.classList.remove('active-egreso'); }
    }
 
    function toggleSection(id) {
       let el = document.getElementById(id);
       let cat = el.previousElementSibling;
       if (el.classList.contains('open')) { el.classList.remove('open'); cat.classList.remove('active'); }
       else { el.classList.add('open'); cat.classList.add('active'); }
    }
 
    // Función auxiliar para mostrar estado de carga
    function mostrarEstadoCarga(titulo, backNav) {
       let backNavHtml = backNav || '';
       document.getElementById('app').innerHTML = `
             ${backNavHtml}
             <div class="dash-section-title">${titulo}</div>
             <div style="padding:40px; text-align:center;">
                <div class="spinner" style="width:40px; height:40px; border-width:4px; margin:0 auto;"></div>
                <div style="color:#94a3b8; margin-top:15px; font-size:14px;">Cargando datos...</div>
             </div>
          `;
    }
 
    function iniciarSesion() {
       let btn = document.getElementById('btn-entrar');
       let err = document.getElementById('login-error');
       let switcher = document.getElementById('account-switcher');
       btn.disabled = true; btn.innerText = "Verificando..."; err.style.display = 'none'; switcher.style.display = 'none';
 
       google.script.run.withSuccessHandler(perfil => {
          if (perfil.error) {
             btn.disabled = false; btn.innerText = "Ingresar";
             if (perfil.authError) {
                err.innerText = "Tu usuario no tiene permisos."; err.style.display = 'block';
                document.getElementById('wrong-email').innerText = perfil.emailDetectado; switcher.style.display = 'block';
             } else { err.innerText = perfil.mensaje; err.style.display = 'block'; }
          } else {
             USUARIO_ACTUAL = perfil; aplicarPermisos(perfil);
             document.getElementById('login-screen').style.opacity = '0';
             setTimeout(() => { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; }, 500);
             inicializarApp();
          }
       }).withFailureHandler(e => { err.innerText = "Error: " + e; err.style.display = 'block'; btn.disabled = false; }).obtenerPerfilUsuario();
    }
 
    function cambiarCuentaGoogle() { window.open("https://accounts.google.com/AccountChooser?service=wise&continue=" + encodeURIComponent(window.location.href), '_top'); }
 
    function aplicarPermisos(perfil) {
       document.getElementById('user-display-name').innerText = perfil.email;
       document.getElementById('user-display-role').innerText = perfil.rol + (perfil.hoja !== 'TODAS' ? ` (${perfil.hoja})` : '');
 
       if (perfil.rol === 'VENDEDOR') {
          document.querySelector('[onclick="toggleSection(\'admin-section\')"]').parentNode.style.display = 'none';
          document.getElementById('menu-consolidado').style.display = 'none';
          document.getElementById('menu-comisiones').style.display = 'none';
          let sublabels = document.querySelectorAll('.menu-sublabel');
          if (sublabels[0]) sublabels[0].style.display = 'none';
          document.querySelectorAll('.vendor-item').forEach(item => { if (item.id !== 'menu-' + perfil.hoja.replace(/\s/g, '')) item.style.display = 'none'; });
          // Clientes siempre visible para vendedores
          if (document.getElementById('menu-clientes')) document.getElementById('menu-clientes').style.display = 'block';
       } else if (perfil.rol === 'VENDEDORGRAL') {
          // VENDEDORGRAL puede ver todo pero no tiene acceso a admin
          document.querySelector('[onclick="toggleSection(\'admin-section\')"]').parentNode.style.display = 'none';
          // Ocultar consolidado y comisiones para VENDEDORGRAL
          if (document.getElementById('menu-consolidado')) document.getElementById('menu-consolidado').style.display = 'none';
          if (document.getElementById('menu-comisiones')) document.getElementById('menu-comisiones').style.display = 'none';
          // Ocultar config permisos
          if (document.getElementById('menu-config-permisos')) document.getElementById('menu-config-permisos').style.display = 'none';
       } else if (perfil.rol === 'ROOT') {
          // ROOT tiene todos los permisos (se definirán más adelante)
       }
       // ADMIN ya puede ver todo por defecto (no se oculta nada)
    }
 
    // NUEVA FUNCIÓN: Renderizar lista de vendedores dinámicamente
    function renderizarVendedores() {
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             console.error('Error cargando vendedores:', res.mensaje);
             return;
          }
 
          let container = document.getElementById('vendor-list-container');
          if (!container) return;
 
          let html = '';
 
          // Vendedores activos (ordenados alfabéticamente)
          let activosOrdenados = (res.activos || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
          activosOrdenados.forEach(v => {
             let idNombre = v.nombre.replace(/\s/g, '');
             let icono = v.nombre === 'Universal Jumps' ? 'storefront' : 'person';
             html += `<div class="menu-item vendor-item vendor-active" id="menu-${idNombre}" onclick="navegar(this, '${v.nombre}')">
                   <span class="material-symbols-outlined">${icono}</span> ${v.nombre}
                </div>`;
          });
 
          // Separador si hay inactivos
          if ((res.inactivos || []).length > 0) {
             html += `<div class="menu-sublabel" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">VENDEDORES INACTIVOS</div>`;
 
             // Vendedores inactivos (ordenados alfabéticamente)
             let inactivosOrdenados = (res.inactivos || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
             inactivosOrdenados.forEach(v => {
                let idNombre = v.nombre.replace(/\s/g, '');
                let icono = v.nombre === 'Universal Jumps' ? 'storefront' : 'person';
                html += `<div class="menu-item vendor-item vendor-inactive" id="menu-${idNombre}" onclick="navegar(this, '${v.nombre}')">
                      <span class="material-symbols-outlined">${icono}</span> ${v.nombre}
                   </div>`;
             });
          }
 
          container.innerHTML = html;
 
          // Aplicar permisos después de renderizar
          if (USUARIO_ACTUAL) aplicarPermisos(USUARIO_ACTUAL);
       }).obtenerListaVendedores();
    }
 
    function inicializarApp() {
       document.getElementById('fechaInput').valueAsDate = new Date();
       document.getElementById('fechaCaja').valueAsDate = new Date();
 
       google.script.run.withSuccessHandler(res => {
          if (!res.error) COTIZACIONES = res.data;
       }).obtenerCotizacionesBackend();
 
       google.script.run.withSuccessHandler(res => {
          if (!res.error) { GLOBAL_CONFIG = res.data; poblarSelectsCaja(); }
       }).obtenerConfiguracion();
 
       // Cargar vendedores dinámicamente
       renderizarVendedores();
 
       let hoy = new Date();
       // Inicializar selectores de balance si existen
       let selMesBalance = document.getElementById('selMesBalance');
       let selAnioBalance = document.getElementById('selAnioBalance');
       if (selMesBalance) selMesBalance.value = (hoy.getMonth() + 1).toString(); // Mes actual (1-12)
       if (selAnioBalance) selAnioBalance.value = hoy.getFullYear();
 
       const mesActual = hoy.getMonth();
       let obj = 'OBJETIVOS 1°T';
       if (mesActual >= 3 && mesActual <= 5) obj = 'OBJETIVOS 2°T';
       else if (mesActual >= 6 && mesActual <= 8) obj = 'OBJETIVOS 3°T';
       else if (mesActual >= 9) obj = 'OBJETIVOS 4°T';
       document.getElementById('selTrimestreHeader').value = obj;
 
       navegar(null, 'HOME');
    }
 
 
 
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobile-overlay').classList.toggle('active'); }
 
    function navegar(el, hoja) {
       // Prevenir navegación múltiple
       if (NAVEGANDO) return;
       NAVEGANDO = true;
 
       if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobile-overlay').classList.remove('active'); }
 
       document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
       if (el) { el.classList.add('active'); }
 
       let selVentas = document.getElementById('selTrimestreHeader');
       let selBalance = document.getElementById('balance-filters');
       let selConsolidadoVentas = document.getElementById('consolidado-ventas-filters');
       let selStock = document.getElementById('stock-filters');
       let fabVenta = document.querySelector('.fab');
       let fabCaja = document.getElementById('fab-caja');
 
       // Ocultar todas las vistas personalizadas PRIMERO (antes de cualquier otra operación)
       document.querySelectorAll('[id^="vista-"]').forEach(v => {
          v.style.display = 'none';
       });
 
       selVentas.style.display = 'none';
       selBalance.style.display = 'none';
       if (selConsolidadoVentas) selConsolidadoVentas.style.display = 'none';
       if (selStock) selStock.style.display = 'none';
       if (fabVenta) fabVenta.style.display = 'none';
       if (fabCaja) fabCaja.style.display = 'none';
 
       HOJA_ACTUAL = hoja;
 
       if (hoja === 'HOME') { 
          document.getElementById('titulo').innerText = 'INICIO';
          renderMainMenu(); 
       }
       else if (hoja === 'MENU_ADMIN') { 
          document.getElementById('titulo').innerText = 'ADMINISTRACIÓN';
          renderAdminMenu(); 
       }
       else if (hoja === 'MENU_VENTAS') { 
          document.getElementById('titulo').innerText = 'VENTAS';
          renderVentasMenu(); 
       }
       else if (hoja === 'MENU_STOCK') { 
          document.getElementById('titulo').innerText = 'STOCK';
          if (selStock) selStock.style.display = 'flex';
          // Asegurar que app esté limpio
          if (document.getElementById('app')) {
             document.getElementById('app').innerHTML = '';
          }
          // Mostrar vista-stock
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) {
             vistaStock.style.display = 'block';
          }
          renderStockMenu(); 
       }
       else if (hoja === 'STOCK') {
          document.getElementById('titulo').innerText = 'STOCK';
          if (selStock) {
             selStock.style.display = 'flex';
          }
          // Asegurar que app esté limpio
          if (document.getElementById('app')) {
             document.getElementById('app').innerHTML = '';
          }
          // Mostrar vista-stock
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) {
             vistaStock.style.display = 'block';
          }
          cargarStock();
       }
       else if (hoja === 'OBJETIVOS') {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          selVentas.style.display = 'block';
          document.getElementById('titulo').innerText = 'OBJETIVOS';
          mostrarEstadoCarga('OBJETIVOS', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          cargar(selVentas.value);
       }
       else if (hoja === 'CAMBIAR_TRIMESTRE') {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          selVentas.style.display = 'block';
          let currentTitle = document.getElementById('titulo').innerText;
          if (currentTitle === 'COMISIONES') {
             // Si estamos en comisiones, recargar todas las comisiones
             document.getElementById('titulo').innerText = 'COMISIONES';
             mostrarEstadoCarga('COMISIONES', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
             google.script.run.withSuccessHandler(res => {
                NAVEGANDO = false;
                if (res.error) {
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
                } else {
                   renderComisiones(res.data);
                }
             }).obtenerTodasLasComisiones();
          } else {
             document.getElementById('titulo').innerText = 'OBJETIVOS';
             document.getElementById('btnObjetivos').classList.add('active');
             mostrarEstadoCarga('OBJETIVOS', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
             cargar(selVentas.value);
          }
       }
       else if (hoja === 'GESTION_USUARIOS') {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          document.getElementById('titulo').innerText = 'GESTIONAR USUARIOS';
          mostrarEstadoCarga('GESTIONAR USUARIOS', '<div class="back-nav" onclick="navegar(null, \'MENU_ADMIN\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_ADMIN')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">GESTIONAR USUARIOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderGestionUsuarios();
             }
          }).obtenerTodosUsuarios();
       }
       else if (hoja === 'CAJA') {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          selBalance.style.display = 'flex';
          document.getElementById('titulo').innerText = 'BALANCE DE CAJA';
          mostrarEstadoCarga('BALANCE DE CAJA', '<div class="back-nav" onclick="navegar(null, \'MENU_ADMIN\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          renderBalanceCaja();
       }
       else if (hoja === 'CLIENTES') {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          document.getElementById('titulo').innerText = 'CLIENTES';
          mostrarEstadoCarga('CLIENTES', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CLIENTES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderClientes();
             }
          }).obtenerListaVendedores();
       }
       else if (hoja === 'CONSOLIDADO' || hoja === '%') {
          // Verificar permisos para CONSOLIDADO y COMISIONES
          if (USUARIO_ACTUAL && USUARIO_ACTUAL.rol === 'VENDEDORGRAL') {
             alert('No tienes permisos para ver esta sección');
             NAVEGANDO = false;
             return;
          }
          let tituloConsolidado = hoja === '%' ? 'COMISIONES' : 'CONSOLIDADO';
          document.getElementById('titulo').innerText = tituloConsolidado;
          mostrarEstadoCarga(tituloConsolidado, '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          cargar(hoja);
       }
       else {
          // Asegurar que vista-stock esté oculta
          let vistaStock = document.getElementById('vista-stock');
          if (vistaStock) vistaStock.style.display = 'none';
          
          // Ocultar el FAB global siempre en vistas de vendedor específico (se usa el botón dinámico dentro de renderVendedor)
          if (fabVenta) fabVenta.style.display = 'none';
          let tituloVendedor = 'VENTAS: ' + hoja.toUpperCase();
          document.getElementById('titulo').innerText = tituloVendedor;
          mostrarEstadoCarga(tituloVendedor, '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>');
          cargar(hoja);
       }
 
       // Resetear flag después de un breve delay para permitir la navegación
       setTimeout(() => { NAVEGANDO = false; }, 300);
    }
 
    // --- MENUS ---
    function renderMainMenu() {
       // Asegurar que vista-stock esté oculta
       let vistaStock = document.getElementById('vista-stock');
       if (vistaStock) vistaStock.style.display = 'none';
       
       let user = USUARIO_ACTUAL;
       let rol = user ? user.rol : '';
       let html = `<div class="welcome-banner"><div class="welcome-title">Panel Principal</div></div>
          <div class="home-grid">`;
 
       // VENDEDOR y VENDEDORGRAL solo ven VENTAS
       if (rol === 'VENDEDOR' || rol === 'VENDEDORGRAL') {
          html += `<div class="home-card main-cat" onclick="navegar(null, 'MENU_VENTAS')"><div class="home-icon"><span class="material-symbols-outlined" style="font-size:48px;">trending_up</span></div><div class="home-title">VENTAS</div></div>`;
       }
       // ADMIN y ROOT ven todo
       else if (rol === 'ADMIN' || rol === 'ROOT') {
          html += `<div class="home-card main-cat" onclick="navegar(null, 'MENU_ADMIN')"><div class="home-icon"><span class="material-symbols-outlined" style="font-size:48px;">domain</span></div><div class="home-title">ADMINISTRACIÓN</div></div>
             <div class="home-card main-cat" onclick="navegar(null, 'MENU_STOCK')"><div class="home-icon"><span class="material-symbols-outlined" style="font-size:48px;">inventory_2</span></div><div class="home-title">STOCK</div></div>
             <div class="home-card main-cat" onclick="navegar(null, 'MENU_VENTAS')"><div class="home-icon"><span class="material-symbols-outlined" style="font-size:48px;">trending_up</span></div><div class="home-title">VENTAS</div></div>`;
       }
 
       html += `</div>`;
       document.getElementById('app').innerHTML = html;
    }
 
    function renderAdminMenu() {
       // Asegurar que vista-stock esté oculta
       let vistaStock = document.getElementById('vista-stock');
       if (vistaStock) vistaStock.style.display = 'none';
       
       let html = `<div class="back-nav" onclick="navegar(null, 'HOME')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>
          <div class="dash-section-title">ADMINISTRACIÓN</div>
          <div class="home-grid">
             <div class="home-card" onclick="navegar(null, 'CAJA')"><div class="home-icon"><span class="material-symbols-outlined">account_balance_wallet</span></div><div class="home-title">Balance de Caja</div><div class="home-desc">Ingresos y Egresos</div></div>
             <div class="home-card" onclick="navegar(null, 'GESTION_USUARIOS')"><div class="home-icon"><span class="material-symbols-outlined">groups</span></div><div class="home-title">Gestionar Usuarios</div><div class="home-desc">Usuarios y Permisos</div></div>
          </div>`;
       document.getElementById('app').innerHTML = html;
    }
 
    function renderVentasMenu() {
       // Asegurar que vista-stock esté oculta
       let vistaStock = document.getElementById('vista-stock');
       if (vistaStock) vistaStock.style.display = 'none';
       let user = USUARIO_ACTUAL;
       let html = `<div class="back-nav" onclick="navegar(null, 'HOME')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">VENTAS</div><div class="home-grid">`;
       if (user.rol === 'ADMIN' || user.rol === 'ROOT') {

    function cargar(hoja) {
       // El estado de carga ya se muestra en navegar(), no es necesario mostrarlo aquí
       // document.getElementById('loader').style.display = 'block'; 
       // document.getElementById('app').innerHTML = '';
 
       if (hoja.includes('OBJETIVOS')) {
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderObjetivos(res.data, res.especiales || []);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${err.message}</div>`;
          }).obtenerObjetivosBackend(hoja);
          return;
       }
 
       if (hoja === 'CONSOLIDADO') {
          // Obtener año seleccionado para consolidado de ventas
          let anioConsolidadoVentas = new Date().getFullYear();
          let selAnioVentas = document.getElementById('selAnioConsolidadoVentas');
          if (selAnioVentas) anioConsolidadoVentas = parseInt(selAnioVentas.value) || new Date().getFullYear();
          // Mostrar selector de año en el header
          let selConsolidadoVentas = document.getElementById('consolidado-ventas-filters');
          if (selConsolidadoVentas) selConsolidadoVentas.style.display = 'flex';
 
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderConsolidado(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${err.message}</div>`;
          }).obtenerReporteConsolidado(anioConsolidadoVentas);
          return;
       }
 
       if (hoja === '%') {
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderComisiones(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${err.message}</div>`;
          }).obtenerTodasLasComisiones();
          return;
       }
 
       // Cargar objetivos en paralelo (no bloquea la carga de datos del vendedor)
       google.script.run.withSuccessHandler(resObjs => {
          // Validar que resObjs existe y tiene data
          if (resObjs && !resObjs.error && resObjs.data && Array.isArray(resObjs.data)) {
             ALL_OBJECTIVES = resObjs.data.filter(o => o && !o.esEspecial); // Solo rangos comunes
             // Organizar objetivos especiales por trimestre y vendedor
             ALL_OBJECTIVES_ESPECIALES = {};
             resObjs.data.filter(o => o && o.esEspecial).forEach(obj => {
                if (obj.trimestre && obj.vendedor) {
                   if (!ALL_OBJECTIVES_ESPECIALES[obj.trimestre]) {
                      ALL_OBJECTIVES_ESPECIALES[obj.trimestre] = {};
                   }
                   ALL_OBJECTIVES_ESPECIALES[obj.trimestre][obj.vendedor] = obj;
                }
             });
          } else {
             // Si hay error o no hay datos, inicializar vacío
             ALL_OBJECTIVES = [];
             ALL_OBJECTIVES_ESPECIALES = {};
          }
       }).withFailureHandler(err => {
          // Si falla obtenerTodosLosObjetivos, inicializar vacío
          console.error('Error al obtener objetivos:', err);
          ALL_OBJECTIVES = [];
          ALL_OBJECTIVES_ESPECIALES = {};
       }).obtenerTodosLosObjetivos();
 
       // Cargar datos del vendedor de forma independiente (no espera a los objetivos)
       try {
          google.script.run.withSuccessHandler(data => {
             try {
                NAVEGANDO = false;
                if (!data) {
                   let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: No se recibieron datos</div>`;
                   return;
                }
                if (data.error) {
                   let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${data.mensaje || 'Error desconocido'}</div>`;
                   return;
                }
                if (hoja === 'CONSOLIDADO') {
                   if (data.data) renderConsolidado(data.data);
                   else console.error('No hay datos para consolidado');
                } else if (hoja === '%') {
                   if (data.data) renderComisiones(data.data);
                   else console.error('No hay datos para comisiones');
                } else {
                   if (data.data) renderVendedor(data.data, hoja);
                   else console.error('No hay datos para vendedor:', hoja);
                }
             } catch (renderError) {
                NAVEGANDO = false;
                console.error('Error al renderizar:', renderError);
                let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al renderizar: ${renderError.message}</div>`;
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             console.error('Error al obtener datos de hoja:', err);
             let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
             let errorMsg = err && err.message ? err.message : (err && err.toString ? err.toString() : 'Error desconocido');
             document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${errorMsg}</div>`;
          }).obtenerDatosDeHoja(hoja);
       } catch (e) {
          NAVEGANDO = false;
          console.error('Error al iniciar carga:', e);
          let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
          document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al iniciar carga: ${e.message}</div>`;
       }
    }

    // NUEVA FUNCIÓN: Filtrar clientes en la tabla por país y búsqueda
    function filtrarClientesTabla() {
       let filtroPais = document.getElementById('selPaisCliente')?.value || '';
       let filtroBuscar = (document.getElementById('buscarCliente')?.value || '').toLowerCase();
 
       let tableBody = document.getElementById('clientes-table-body');
       if (!tableBody) return;
 
       let todasLasFilas = Array.from(tableBody.querySelectorAll('tr'));
       let filasVisibles = 0;
 
       todasLasFilas.forEach(tr => {
          let tds = tr.querySelectorAll('td');
          if (tds.length < 7) {
             tr.style.display = ''; // Mantener filas de mensaje sin datos
             return;
          }
 
          // Índices de las columnas en la tabla (sin ID visible)
          // Nombre=0, Apellido=1, DNI=2, Teléfono=3, Correo=4, Domicilio=5, Provincia=6, País=7
          let idxPais = 7; // Columna País (índice 7)
          let idxNombre = 0; // Columna Nombre
          let idxApellido = 1; // Columna Apellido
          let idxDni = 2; // Columna DNI
          let idxCorreo = 4; // Columna Correo
 
          let pais = (tds[idxPais]?.textContent || '').trim();
          let nombre = (tds[idxNombre]?.textContent || '').toLowerCase();
          let apellido = (tds[idxApellido]?.textContent || '').toLowerCase();
          let dni = (tds[idxDni]?.textContent || '').toLowerCase();
          let correo = (tds[idxCorreo]?.textContent || '').toLowerCase();
 
          let coincidePais = !filtroPais || pais === filtroPais;
          let coincideBuscar = !filtroBuscar || nombre.includes(filtroBuscar) || apellido.includes(filtroBuscar) || dni.includes(filtroBuscar) || correo.includes(filtroBuscar);
 
          if (coincidePais && coincideBuscar) {
             tr.style.display = '';
             filasVisibles++;
          } else {
             tr.style.display = 'none';
          }
       });
 
       // Si no hay filas visibles, mostrar mensaje
       if (filasVisibles === 0 && todasLasFilas.length > 0) {
          let mensajeRow = tableBody.querySelector('tr[data-no-results]');
          if (!mensajeRow) {
             mensajeRow = document.createElement('tr');
             mensajeRow.setAttribute('data-no-results', 'true');
             let colspan = tableBody.querySelector('thead tr th') ? tableBody.querySelectorAll('thead tr th').length : 8;
             mensajeRow.innerHTML = `<td colspan="${colspan}" style="text-align:center; padding:40px; color:#94a3b8;">No se encontraron clientes con los filtros seleccionados</td>`;
             tableBody.appendChild(mensajeRow);
          } else {
             mensajeRow.style.display = '';
          }
       } else {
          let mensajeRow = tableBody.querySelector('tr[data-no-results]');
          if (mensajeRow) mensajeRow.style.display = 'none';
       }
    }

             // Si venía del formulario de venta, no cargar la vista de clientes
             if (DATOS_FORMULARIO_VENTA) {

    // NUEVA FUNCIÓN: Actualizar selector de clientes en formulario de venta
    function actualizarSelectorClientes(vendedor) {
       let selectCliente = document.getElementById('clienteInput');
       let paisSelect = document.getElementById('paisInput');
 
       if (!selectCliente) {
          console.error('No se encontró el elemento clienteInput');
          return;
       }
       if (selectCliente.tagName !== 'SELECT') {
          console.error('clienteInput no es un elemento SELECT');
          return;
       }
 
       // Obtener país seleccionado
       let paisSeleccionado = paisSelect ? paisSelect.value : '';
 
       // Si no hay país seleccionado, dejar mensaje
       if (!paisSeleccionado || paisSeleccionado === '') {
          selectCliente.innerHTML = '<option value="">Selecciona un país primero...</option>';
          selectCliente.disabled = true;
          return;
       }
 
       // Mostrar loading
       selectCliente.innerHTML = '<option value="">Cargando clientes...</option>';
       selectCliente.disabled = true;
 
       google.script.run.withSuccessHandler(res => {
          selectCliente.disabled = false;
          if (res.error) {
             selectCliente.innerHTML = '<option value="">Error al cargar clientes</option>';
             console.error('Error al obtener clientes:', res.mensaje);
             return;
          }
 
          selectCliente.innerHTML = '<option value="">Selecciona un cliente...</option>';
 
          if (res.data && res.data.length > 0) {
             res.data.forEach(cliente => {
                let nombreCompleto = `${cliente.nombre} ${cliente.apellido}`.trim();
                if (!nombreCompleto) nombreCompleto = cliente.nombre || 'Sin nombre';
                let opt = document.createElement('option');
                opt.value = nombreCompleto;
                opt.innerText = nombreCompleto;
                opt.dataset.dni = cliente.dni || '';
                opt.dataset.telefono = cliente.telefono || '';
                opt.dataset.correo = cliente.correo || '';
                selectCliente.appendChild(opt);
             });
          }
 
          // Si no hay clientes después del filtro, mostrar mensaje
          if (!res.data || res.data.length === 0) {
             selectCliente.innerHTML = '<option value="">No hay clientes agregados en ese país</option>';
          }
       }).withFailureHandler(err => {
          selectCliente.disabled = false;
          selectCliente.innerHTML = '<option value="">Error al cargar clientes</option>';
          console.error('Error al obtener clientes:', err);
       }).obtenerClientesVendedor(vendedor, paisSeleccionado);
    }

    // --- FUNCIÓN AUXILIAR: Convertir monto a ARS ---
    function convertirAArs(monto, pais) {
       if (pais === 'ARGENTINA') return monto;
       let cotizacion = COTIZACIONES[pais] || 1;
       return monto * cotizacion;
    }
 
    // --- FUNCIÓN AUXILIAR: Formatear monto en moneda del país ---
    function formatearMonedaPais(monto, pais) {
       if (pais === 'ARGENTINA') return formatNumberAr(monto);
       if (pais === 'CHILE') return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(monto);
       if (pais === 'MEXICO') return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(monto);
       if (pais === 'ESPANA') return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(monto);
       if (pais === 'BRASIL') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(monto);
       if (pais === 'URUGUAY') return new Intl.NumberFormat('es-UY', { style: 'currency', currency: 'UYU' }).format(monto);
       if (pais === 'EEUU' || pais === 'RDM') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(monto);
       return formatNumberAr(monto);
    }

    function guardarObjetivosFrontend() {
       let trimestre = document.getElementById('selTrimestreHeader').value;
       let filas = [];
 
       // Guardar objetivos por rango (si existen)
       for (let i = 0; i < 4; i++) {
          let elPctB = document.getElementById(`pctB-${i}`);
          let elPctC = document.getElementById(`pctC-${i}`);
          if (elPctB || elPctC) {
             filas.push({
                rango: i + 1,
                pctBotas: parseFloat(elPctB ? elPctB.value || "0" : "0"),
                pctCerts: parseFloat(elPctC ? elPctC.value || "0" : "0"),
                botas: document.getElementById(`botas-${i}`) ? document.getElementById(`botas-${i}`).value || "0" : "0",
                certs: document.getElementById(`certs-${i}`) ? document.getElementById(`certs-${i}`).value || "0" : "0",
                factBotas: parseCurrency(document.getElementById(`factB-${i}`) ? document.getElementById(`factB-${i}`).value || "0" : "0"),
                factCerts: parseCurrency(document.getElementById(`factC-${i}`) ? document.getElementById(`factC-${i}`).value || "0" : "0")
             });
          }
       }
 
       // Guardar objetivos especiales (si existen y están en modo edición)
       let objetivosEspeciales = [];
       // Buscar todos los elementos con IDs que empiezan con "pctB-esp-" o "pctC-esp-"
       let allInputs = document.querySelectorAll('.obj-input[id^="pctB-esp-"], .obj-input[id^="pctC-esp-"]');
       let especialIds = new Set();
       allInputs.forEach(el => {
          let id = el.id;
          if (id.startsWith('pctB-esp-') || id.startsWith('pctC-esp-')) {
             // Los IDs son pctB-esp-0, pctC-esp-0, etc.
             let match = id.match(/^(pctB|pctC)-esp-(\d+)$/);
             if (match) especialIds.add(match[2]);
          }
       });
 
       especialIds.forEach(idStr => {
          let idx = 'esp-' + idStr;
          let elPctB = document.getElementById(`pctB-${idx}`);
          let elPctC = document.getElementById(`pctC-${idx}`);
          if (!elPctB && !elPctC) return;
 
          // Obtener el vendedor del atributo data-vendedor de la tarjeta
          let objCard = elPctB ? elPctB.closest('.obj-card') : (elPctC ? elPctC.closest('.obj-card') : null);
          let vendedor = '';
          if (objCard) {
             // Primero intentar obtener del atributo data-vendedor
             vendedor = objCard.getAttribute('data-vendedor') || '';
             // Si no está en el atributo, intentar extraer del título como fallback
             if (!vendedor || vendedor.trim() === '') {
                let titleEl = objCard.querySelector('.obj-title');
                if (titleEl) {
                   let titleText = titleEl.textContent || '';
                   // Extraer el nombre del vendedor del título "⭐ ESPECIAL - NOMBRE"
                   let match = titleText.match(/ESPECIAL\s*-\s*(.+)/);
                   if (match) vendedor = match[1].trim();
                }
             }
          }
 
          objetivosEspeciales.push({
             vendedor: vendedor,
             trimestre: trimestre,
             pctBotas: parseFloat(elPctB ? elPctB.value || "0" : "0"),
             pctCerts: parseFloat(elPctC ? elPctC.value || "0" : "0"),
             botas: document.getElementById(`botas-${idx}`) ? document.getElementById(`botas-${idx}`).value || "0" : "0",
             certs: document.getElementById(`certs-${idx}`) ? document.getElementById(`certs-${idx}`).value || "0" : "0",
             factBotas: parseCurrency(document.getElementById(`factB-${idx}`) ? document.getElementById(`factB-${idx}`).value || "0" : "0"),
             factCerts: parseCurrency(document.getElementById(`factC-${idx}`) ? document.getElementById(`factC-${idx}`).value || "0" : "0")
          });
       });
 
       let btn = document.querySelector('button[onclick*="guardarObjetivosFrontend"]');
       if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">hourglass_empty</span> Guardando...';
       }
 
       // Guardar objetivos por rango primero
       let promesaRangos = new Promise((resolve, reject) => {
          if (filas.length > 0) {
             google.script.run.withSuccessHandler(res => {
                if (res.error) reject(res.mensaje);
                else resolve(res);
             }).withFailureHandler(err => reject(err.message)).guardarObjetivosBackend(trimestre, filas);
          } else {
             resolve({ error: false });
          }
       });
 
       // Guardar objetivos especiales
       let promesasEspeciales = objetivosEspeciales.map(obj => {
          return new Promise((resolve, reject) => {
             google.script.run.withSuccessHandler(res => {
                if (res.error) reject(res.mensaje);
                else resolve(res);
             }).withFailureHandler(err => reject(err.message)).guardarObjetivoEspecial(obj);
          });
       });
 
       Promise.all([promesaRangos, ...promesasEspeciales]).then(() => {
          if (btn) {
             btn.disabled = false;
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar Objetivos';
          }
          mostrarAlerta("Objetivos actualizados correctamente.");
          toggleEditMode();
          let trim = document.getElementById('selTrimestreHeader').value;
          cargar(trim);
       }).catch(err => {
          if (btn) {
             btn.disabled = false;
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar Objetivos';
          }
          alert("Error: " + err);
       });
    }

    function renderHistorialMovimientos(data) {
       let container = document.getElementById('historial-content');
       if (!container) return;
 
       // Filtrar por tipo según el filtro activo
       let dataFiltrada = data.filter(mov => mov.tipo === FILTRO_TIPO_HISTORIAL);
 
       if (!dataFiltrada || dataFiltrada.length === 0) {
          container.innerHTML = `<div style="padding:30px; text-align:center; color:#94a3b8;">No hay ${FILTRO_TIPO_HISTORIAL.toLowerCase()} registrados</div>`;
          return;
       }
 
       // Ordenar: fecha (más reciente primero), luego concepto alfabético, luego descripción alfabética
       dataFiltrada.sort((a, b) => {
          // Ordenar por fecha (más reciente primero)
          let fechaA = parseFecha(a.fecha || '01/01/1900');
          let fechaB = parseFecha(b.fecha || '01/01/1900');
          if (fechaB.getTime() !== fechaA.getTime()) {
             return fechaB.getTime() - fechaA.getTime();
          }
          
          // Si la fecha es igual, ordenar por concepto alfabético
          let conceptoA = (a.concepto || '').toLowerCase();
          let conceptoB = (b.concepto || '').toLowerCase();
          if (conceptoA !== conceptoB) {
             return conceptoA.localeCompare(conceptoB);
          }
          
          // Si concepto es igual, ordenar por descripción alfabética
          let descA = (a.descripcion || '').toLowerCase();
          let descB = (b.descripcion || '').toLowerCase();
          return descA.localeCompare(descB);
       });
 
       let html = '<table style="width:100%; border-collapse: collapse;"><thead><tr style="background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border-color);">';
       html += '<th style="padding:12px; text-align:center; font-weight:600; color:#94a3b8; font-size:12px; text-transform:uppercase;">FECHA</th>';
       html += '<th style="padding:12px; text-align:center; font-weight:600; color:#94a3b8; font-size:12px; text-transform:uppercase;">TIPO</th>';
       html += '<th style="padding:12px; text-align:center; font-weight:600; color:#94a3b8; font-size:12px; text-transform:uppercase;">CONCEPTO</th>';
       html += '<th style="padding:12px; text-align:center; font-weight:600; color:#94a3b8; font-size:12px; text-transform:uppercase;">DESCRIPCIÓN</th>';

    function convertirFechaDDMMYYYYaYYYYMMDD(fechaStr) {
       if (!fechaStr) return '';
       let partes = fechaStr.split('/');
       if (partes.length === 3) {
          return `${partes[2]}-${partes[1]}-${partes[0]}`;
       }
       return '';
    }
 
    function convertirFechaYYYYMMDDaDDMMYYYY(fechaStr) {
       if (!fechaStr) return '';
       let partes = fechaStr.split('-');
       if (partes.length === 3) {
          return `${partes[2]}/${partes[1]}/${partes[0]}`;
       }
       return fechaStr;
    }
 
    function toggleEdicionMovimiento(filaIndex) {
       // Verificar si estaba en modo edición (se está desactivando)
       let estabaEnEdicion = FILAS_EN_EDICION[filaIndex] === true;
       
       // Alternar estado de edición
       FILAS_EN_EDICION[filaIndex] = !FILAS_EN_EDICION[filaIndex];
       
       // Si se está desactivando el modo edición, guardar cambios pendientes
       if (estabaEnEdicion && CAMBIOS_PENDIENTES[filaIndex]) {
          // Hay cambios pendientes, guardarlos
          guardarCambiosPendientes(filaIndex);
       } else if (!estabaEnEdicion) {
          // Se está activando el modo edición, limpiar cambios pendientes
          CAMBIOS_PENDIENTES[filaIndex] = {};
          renderHistorialMovimientos(HISTORIAL_CAJA_COMPLETO);
       } else {
          // Se está desactivando pero no hay cambios, solo desactivar modo edición
          FILAS_EN_EDICION[filaIndex] = false;
          renderHistorialMovimientos(HISTORIAL_CAJA_COMPLETO);
       }
    }
 
    function guardarCambiosPendientes(filaIndex) {
       let cambios = CAMBIOS_PENDIENTES[filaIndex];
       if (!cambios || Object.keys(cambios).length === 0) {
          // No hay cambios, solo desactivar modo edición y recargar datos
          FILAS_EN_EDICION[filaIndex] = false;
          cargarHistorialMovimientos();
          cargarDatosBalance();
          cargarMediosPago();
          actualizarAvisoPendientes();
          return;
       }
 
       // Obtener el movimiento completo primero
       google.script.run.withSuccessHandler(mov => {
          if (mov.error) {
             mostrarAlerta('Error al obtener movimiento: ' + mov.mensaje);
             // Desactivar modo edición y recargar datos
             FILAS_EN_EDICION[filaIndex] = false;
             cargarHistorialMovimientos();
             return;
          }
 
          // Aplicar todos los cambios pendientes
          // El vencimiento ya está en formato YYYY-MM-DD en CAMBIOS_PENDIENTES
          let vencimientoFinal = cambios.vencimiento !== undefined ? cambios.vencimiento : (mov.data.vencimiento || '');
 
          let datosActualizados = {
             fecha: mov.data.fecha,
             tipo: mov.data.tipo,
             concepto: mov.data.concepto,
             descripcion: mov.data.descripcion,
             formaPago: cambios.formaPago !== undefined ? cambios.formaPago : mov.data.formaPago,
             monto: cambios.monto !== undefined ? cambios.monto : mov.data.monto,
             observaciones: cambios.observaciones !== undefined ? cambios.observaciones : mov.data.observaciones,
             estado: mov.data.estado,
             vencimiento: vencimientoFinal,
             pais: mov.data.pais,
             filaIndex: filaIndex,
             actualizarCotizacion: cambios.monto !== undefined,
             pagos: [{
                forma: cambios.formaPago !== undefined ? cambios.formaPago : mov.data.formaPago,
                monto: cambios.monto !== undefined ? cambios.monto : mov.data.monto
             }]
          };
 
          // Guardar en el backend
          google.script.run.withSuccessHandler(res => {
             if (res.error) {
                mostrarAlerta('Error al guardar cambios: ' + res.mensaje);
                // Limpiar cambios pendientes aunque haya error
                delete CAMBIOS_PENDIENTES[filaIndex];
                // Recargar datos sin recargar toda la página
                setTimeout(() => {
                   cargarHistorialMovimientos();
                   cargarDatosBalance();
                   cargarMediosPago();
                   actualizarAvisoPendientes();
                }, 1000);
             } else {
                // Limpiar cambios pendientes
                delete CAMBIOS_PENDIENTES[filaIndex];
                // Desactivar modo edición
                FILAS_EN_EDICION[filaIndex] = false;
                // Recargar datos sin recargar toda la página
                cargarHistorialMovimientos();
                cargarDatosBalance();
                cargarMediosPago();
                actualizarAvisoPendientes();
             }
          }).withFailureHandler(err => {
             mostrarAlerta('Error de conexión al guardar: ' + err.message);
             // Limpiar cambios pendientes
             delete CAMBIOS_PENDIENTES[filaIndex];
             // Recargar datos sin recargar toda la página
             setTimeout(() => {
                cargarHistorialMovimientos();
                cargarDatosBalance();
                cargarMediosPago();
                actualizarAvisoPendientes();
             }, 1000);
          }).procesarMovimientoCaja(datosActualizados);
       }).obtenerMovimientoCaja(filaIndex);
    }
 
    function editarCampoMovimiento(filaIndex, campo, nuevoValor) {
       // Validar que nuevoValor no sea undefined o null
       if (nuevoValor === undefined || nuevoValor === null) {
          nuevoValor = '';
       }
 
       // Inicializar cambios pendientes para esta fila si no existe
       if (!CAMBIOS_PENDIENTES[filaIndex]) {
          CAMBIOS_PENDIENTES[filaIndex] = {};
       }
 
       // Procesar el valor según el campo
       let valorProcesado = nuevoValor;
       let valorParaMostrar = nuevoValor;
       
       if (campo === 'monto') {
          valorProcesado = parseFloat(nuevoValor.toString().replace(/[$.]/g, '').replace(',', '.').trim()) || 0;
          valorParaMostrar = valorProcesado;
       } else if (campo === 'vencimiento') {
          // Guardar en formato YYYY-MM-DD (formato del input date) para el backend
          valorProcesado = nuevoValor;
          // Convertir a DD/MM/YYYY solo para mostrar en la UI
          valorParaMostrar = convertirFechaYYYYMMDDaDDMMYYYY(nuevoValor);
       }
 
       // Guardar el cambio pendiente en formato para backend (NO guardar en backend todavía)
       CAMBIOS_PENDIENTES[filaIndex][campo] = valorProcesado;
 
       // Actualizar localmente para mostrar el cambio en la UI
       let movIndex = HISTORIAL_CAJA_COMPLETO.findIndex(m => m.filaIndex === filaIndex);
       if (movIndex !== -1) {
          if (campo === 'vencimiento') {
             HISTORIAL_CAJA_COMPLETO[movIndex].vencimiento = valorParaMostrar;
          } else if (campo === 'monto') {
             HISTORIAL_CAJA_COMPLETO[movIndex].monto = valorParaMostrar;
          } else if (campo === 'formaPago') {
             HISTORIAL_CAJA_COMPLETO[movIndex].formaPago = valorProcesado;
          } else if (campo === 'observaciones') {
             HISTORIAL_CAJA_COMPLETO[movIndex].observaciones = valorProcesado;
          }
          // NO re-renderizar si es el campo de vencimiento para evitar que pierda el foco
          // Solo re-renderizar para otros campos
          if (campo !== 'vencimiento') {
             renderHistorialMovimientos(HISTORIAL_CAJA_COMPLETO);
          }
       }
    }

          google.script.run.withSuccessHandler((res) => {
             if (res.error) {
                mostrarAlerta('Error al cargar movimiento: ' + res.mensaje);
                return;
             }
 
             let mov = res.data;
             
             // Establecer filaIndex
             document.getElementById('cajaFilaIndex').value = filaIndex;
             
             // Establecer fecha
             if (mov.fecha) {
                let partesFecha = mov.fecha.split('/');

                   document.getElementById('fechaCaja').value = `${partesFecha[2]}-${partesFecha[1]}-${partesFecha[0]}`;
                }
             }
             
             // Establecer tipo
             document.getElementById('tipoCaja').value = mov.tipo || 'EGRESO';

             let establecerRestoCamposModal = (mov) => {

                document.getElementById('estadoCaja').value = mov.estado || 'PAGADO';

    // NUEVA FUNCIÓN: Mostrar aviso de pagos pendientes (vencidos o por vencer)
    function actualizarAvisoPendientes() {
       let container = document.getElementById('pending-payments-container');
       if (!container) return;
 
       // Consultar movimientos pendientes en CAJA para el país actual
       google.script.run.withSuccessHandler(res => {
          if (res.error || !res.data || res.data.length === 0) {
             container.style.display = 'none';
             return;
          }
 
         // Filtrar solo los PENDIENTES que sean EGRESOS del país seleccionado Y que tengan fecha de vencimiento
         let pendientes = res.data.filter(m => {
             let estado = (m.estado || '').toString().toUpperCase().trim();
             let tipo = (m.tipo || '').toString().toUpperCase().trim();
             let vencimiento = (m.vencimiento || '').toString().trim();
             return estado === 'PENDIENTE' && tipo === 'EGRESO' && vencimiento !== '';
          });
 
         // Ordenar del más pronto al más lejano
         pendientes.sort((a, b) => {
             let fechaA = parseFecha(a.vencimiento);
             let fechaB = parseFecha(b.vencimiento);
             return fechaA - fechaB;
          });
 
          if (pendientes.length === 0) {
             container.style.display = 'none';
             container.innerHTML = '';
             return;
          }
 
          let html = `
             <div class="pending-payments-widget">
                <div class="pending-header">
                   <span class="material-symbols-outlined">warning</span>
                   PAGOS PENDIENTES - ${PAIS_CAJA_ACTUAL} (${pendientes.length})
                </div>
                <div class="pending-list">
          `;
 
          pendientes.forEach(p => {
             let esVencido = esFechaVencida(p.vencimiento);
             let vencInfo = `Vence: ${p.vencimiento}`;
             html += `
                <div class="pending-item">
                   <div class="pending-info">
                      <div class="pending-title">${p.concepto} - ${p.descripcion}</div>
                      <div class="pending-meta">
                         <span style="color:var(--accent); font-weight:700;">${formatNumberAr(p.monto)}</span>
                         <span>|</span>
                         <span style="${esVencido ? 'color:#ef4444; font-weight:bold;' : ''}">${vencInfo}</span>
                      </div>
                   </div>
                   <button class="btn-pay-now" onclick="cambiarEstadoMovimientoCaja(${p.filaIndex}, 'PAGADO')">
                      MARCAR PAGADO
                   </button>
                </div>
             `;
          });
 
          html += `</div></div>`;
          container.innerHTML = html;
          container.style.display = 'block';
       }).obtenerHistorialCaja(PAIS_CAJA_ACTUAL, 0, 2026);
    }

    function esFechaVencida(fechaStr) {
       if (!fechaStr) return false;
       let partes = fechaStr.split('/');
       if (partes.length !== 3) return false;
       let fechaVto = new Date(partes[2], partes[1] - 1, partes[0]);
       let hoy = new Date();
       hoy.setHours(0, 0, 0, 0);
       return fechaVto < hoy;
    }

       document.getElementById('tab-botas').style.display = 'none';
       document.getElementById('tab-certs').style.display = 'none';
 
       document.getElementById('tab-' + tabName).style.display = 'block';
    }
 
    function actualizarTarjetasGeneral(mes, nombreVendedor) {
       if (!mes) mes = new Date().getMonth() + 1;

       // Forzar año 2026 (igual que el backend)
       const anioFiltro = 2026;
 
       // Filtrar las filas por año antes de generar la matriz
       let filasFiltradas = HISTORIAL_CACHE.filter(fila => {
          if (!fila || !fila[0]) return false;
          let fecha = parseFecha(fila[0]);
          return fecha.getFullYear() === anioFiltro;
       });
 
       // Regenerar matrices solo con datos del año seleccionado
       let resumenBotasFiltrado = generarMatrizResumenCompleja(filasFiltradas, 'GRUPO_BOTAS', nombreVendedor);
       let resumenCertsFiltrado = generarMatrizResumenCompleja(filasFiltradas, 'GRUPO_CERTS', nombreVendedor);
 
       const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
       let nombreMes = MESES[mes - 1];
 
       let dBotas = resumenBotasFiltrado[nombreMes];
       let dCerts = resumenCertsFiltrado[nombreMes];
 
       let html = `<div class="month-grid">
              ${construirTarjetaMes(dBotas, nombreMes, 'BOTAS')}
              ${construirTarjetaMes(dCerts, nombreMes, 'CERTIFICACIONES')}
          </div>`;
 
       document.getElementById('general-cards-container').innerHTML = html;
    }
 
    function construirGridTarjetas(matriz, titulo) {
       const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
       let html = '';
       MESES.forEach(m => {
          html += construirTarjetaMes(matriz[m], m, titulo);
       });
       return html;

    // --- LOGICA MATRIZ (REUTILIZADA) ---
    function generarMatrizResumenCompleja(filas, tipoGrupo, nombreVendedor) {
       const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
       const GET_TRIM = (idx) => {
          if (idx <= 2) return 'OBJETIVOS 1°T';
          if (idx <= 5) return 'OBJETIVOS 2°T';
          if (idx <= 8) return 'OBJETIVOS 3°T';
          return 'OBJETIVOS 4°T';
       };
       const PAISES_STRUCT = [
          { key: 'ARGENTINA' }, { key: 'CHILE' }, { key: 'MEXICO' }, { key: 'ESPAÑA' },
          { key: 'BRASIL' }, { key: 'URUGUAY' }, { key: 'RDM' }, { key: 'EEUU' }
       ];
       let matriz = {};
       MESES.forEach((m, idx) => {
          matriz[m] = { total: 0, totalSinIva: 0, cantidad: 0, mesIndex: idx };
          PAISES_STRUCT.forEach(p => { matriz[m][p.key] = { original: 0, ars: 0 }; });
       });
       const GRUPO_BOTAS_ITEMS = ['BOTAS', 'INDU - ACCE', 'REPUESTOS'];
       const GRUPO_CERTS_ITEMS = ['CURSOS', 'TALLERES', 'EVENTOS', 'TORNEOS'];
 
       filas.forEach(f => {
          let fecha = parseFecha(f[0]);
          let concepto = (f[5] || "").toUpperCase();
          let entraEnGrupo = false;
          if (tipoGrupo === 'GRUPO_BOTAS') entraEnGrupo = GRUPO_BOTAS_ITEMS.some(item => concepto.includes(item));
          else if (tipoGrupo === 'GRUPO_CERTS') entraEnGrupo = GRUPO_CERTS_ITEMS.some(item => concepto.includes(item));
 
          if (entraEnGrupo) {
             let mesNombre = MESES[fecha.getMonth()];
             let paisRaw = (f[3] || "").toUpperCase();
             let paisKey = paisRaw;
             if (paisRaw === 'USA' || paisRaw === 'EEUU') paisKey = 'EEUU';
 
             // Total con IVA (columna 9) y sin IVA (columna 10)
             let montoConIva = typeof f[9] === 'number' ? f[9] : parseCurrency(f[9]);
             let montoSinIva = typeof f[10] === 'number' ? f[10] : parseCurrency(f[10]);
             let cotizacionGuardada = 1;
 
             // FIX DE LA MONEDA
             if (f[12]) {
                cotizacionGuardada = typeof f[12] === 'number' ? f[12] : parseCurrency(f[12]);
             } else {
                cotizacionGuardada = COTIZACIONES[paisKey] || 1;
             }
 
             let montoArs = montoConIva;
             if (paisKey !== 'ARGENTINA') montoArs = montoConIva * cotizacionGuardada;
 
             let montoArsSinIva = montoSinIva;
             if (paisKey !== 'ARGENTINA') montoArsSinIva = montoSinIva * cotizacionGuardada;
 
             if (matriz[mesNombre] && matriz[mesNombre][paisKey]) {
                matriz[mesNombre][paisKey].original += montoConIva;
                matriz[mesNombre][paisKey].ars += montoArs;
                matriz[mesNombre].total += montoArs;
                matriz[mesNombre].totalSinIva += montoArsSinIva;
 
                let sumarCantidad = false;
                if (tipoGrupo === 'GRUPO_BOTAS' && concepto.includes('BOTAS')) sumarCantidad = true;
                if (tipoGrupo === 'GRUPO_CERTS' && concepto.includes('CURSOS')) sumarCantidad = true;
                if (sumarCantidad) { let qty = parseInt(f[7]) || 0; matriz[mesNombre].cantidad += qty; }
             }
          }
       });
 
       for (let m in matriz) {
          let d = matriz[m];
          let trimestreName = GET_TRIM(d.mesIndex);
 
          // Verificar si el vendedor tiene objetivo especial para este trimestre
          let objetivoEspecial = null;
          if (nombreVendedor && ALL_OBJECTIVES_ESPECIALES[trimestreName] && ALL_OBJECTIVES_ESPECIALES[trimestreName][nombreVendedor]) {
             objetivoEspecial = ALL_OBJECTIVES_ESPECIALES[trimestreName][nombreVendedor];
          }
 
          let rangoAlcanzado = 0;
          let porcentajeRango = 0;
          let objetivoSiguiente = 0;
          let cantidadObjetivo = 0;
 
          if (objetivoEspecial) {
             // Usar objetivo especial
             let objetivoMensual = (tipoGrupo === 'GRUPO_BOTAS' ? objetivoEspecial.factBotas : objetivoEspecial.factCerts) / 3;
             if (objetivoMensual > 0) {
                porcentajeRango = (tipoGrupo === 'GRUPO_BOTAS' ? objetivoEspecial.pctBotas : objetivoEspecial.pctCerts) || 0;
                objetivoSiguiente = objetivoMensual;
                cantidadObjetivo = (tipoGrupo === 'GRUPO_BOTAS') ? objetivoEspecial.botas : objetivoEspecial.certs;
                rangoAlcanzado = d.total >= objetivoMensual ? 1 : 0; // 1 si alcanzó, 0 si no
             }
          } else {
             // Usar rangos comunes
             let objsTrim = ALL_OBJECTIVES.filter(o => o.trimestre === trimestreName).sort((a, b) => a.rango - b.rango);
             for (let i = objsTrim.length - 1; i >= 0; i--) {
                let targetMensual = (tipoGrupo === 'GRUPO_BOTAS' ? objsTrim[i].factBotas : objsTrim[i].factCerts) / 3;
                if (d.total >= targetMensual && targetMensual > 0) {
                   rangoAlcanzado = objsTrim[i].rango;
                   porcentajeRango = (tipoGrupo === 'GRUPO_BOTAS' ? objsTrim[i].pctBotas : objsTrim[i].pctCerts) || 0;
                   break;
                }
             }
             let nextRangeIndex = rangoAlcanzado;
             if (nextRangeIndex >= objsTrim.length) nextRangeIndex = objsTrim.length - 1;
             let targetObj = objsTrim[nextRangeIndex];
             if (targetObj) {
                objetivoSiguiente = (tipoGrupo === 'GRUPO_BOTAS' ? targetObj.factBotas : targetObj.factCerts) / 3;
                cantidadObjetivo = (tipoGrupo === 'GRUPO_BOTAS') ? targetObj.botas : targetObj.certs;
             }
          }
 
          d.rangoLabel = objetivoEspecial ? "ESPECIAL" : (rangoAlcanzado > 0 ? "RANGO " + rangoAlcanzado : "-");
          d.objetivo = objetivoSiguiente;
          d.cantidadObjetivo = cantidadObjetivo;
          d.comision = d.total * (porcentajeRango / 100);
          if (objetivoSiguiente > 0) {
             let pct = (d.total / objetivoSiguiente) * 100;
             if (pct > 100) pct = 100;
             d.pct = pct;
          } else { d.pct = 0; }
       }
       return matriz;
    }
 
    function obtenerMonedaPais(pais) {
       if (pais == 'CHILE') return 'CLP'; if (pais == 'MEXICO') return 'MXN'; if (pais == 'ESPAÑA') return 'EUR';
       if (pais == 'BRASIL') return 'BRL'; if (pais == 'URUGUAY') return 'UYU'; if (pais == 'RDM' || pais == 'EEUU') return 'USD';
       return 'ARS';
    }
 
    function fmt(num) {
       if (!num || num === 0) return '-';
       return new Intl.NumberFormat('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);
    }
 
    function construirTablaHistorialAcciones(datos, nombreVendedor) {
       // Permitir editar si es ADMIN o ROOT (cualquier hoja), o VENDEDOR en su propia hoja
       let puedeEditar = USUARIO_ACTUAL && (
          USUARIO_ACTUAL.rol === 'ADMIN' ||
          USUARIO_ACTUAL.rol === 'ROOT' ||
          (USUARIO_ACTUAL.rol === 'VENDEDOR' && USUARIO_ACTUAL.hoja && USUARIO_ACTUAL.hoja.toUpperCase() === nombreVendedor.toUpperCase())
       );
       let html = '<table><thead><tr>';
       let headers = [
          { n: "FECHA", c: "col-sm" },
          { n: "ESTADO", c: "col-sm" },
          { n: "CHEQUEADO", c: "col-min" },
          { n: "PAIS", c: "col-sm" },
          { n: "CLIENTE", c: "col-md" },
          { n: "CONCEPTO", c: "col-md" },
          { n: "FORMA DE PAGO", c: "col-md" },
          { n: "CANTIDAD", c: "col-min" },
          { n: "PRECIO", c: "col-sm" },
          { n: "TOTAL", c: "col-sm" },
          { n: "TOTAL (SIN IVA)", c: "col-sm" },
          { n: "OBSERVACIONES", c: "col-lg text-left" }
       ];
       if (puedeEditar) headers.push({ n: "ACC", c: "col-min" });
       headers.forEach(h => html += `<th class="${h.c}">${h.n}</th>`);
       html += '</tr></thead><tbody>';
 
       for (let r = 0; r < datos.length; r++) {
          let row = datos[r];
          let id = row[row.length - 1];
          let precio = typeof row[8] === 'number' ? row[8] : parseCurrency(row[8]);
          let total = typeof row[9] === 'number' ? row[9] : parseCurrency(row[9]);
          let totalSinIva = typeof row[10] === 'number' ? row[10] : parseCurrency(row[10]);
          let datosPuros = row.slice(0, row.length - 1);
          let args = `${id},` + datosPuros.map(d => `'${d.replace(/'/g, "\\'")}'`).join(',');
 
          let obs = row[11] || '';
          let obsHtml = obs;
          if (obs.length > 20) {
             obsHtml = `<div class="obs-container">
                <span class="obs-text">${obs}</span>
                <span class="view-more-btn">Ver más...</span>
                <div class="obs-full">${obs}</div>
             </div>`;
          }
 
          html += `<tr>
                 <td>${row[0]}</td>
                 <td>${row[1]}</td>
                 <td>${puedeEditar ? `<input type="checkbox" ${row[2] == 'SI' ? 'checked' : ''} onclick="toggleCheck(this, ${id}, '${nombreVendedor}')">` : `<input type="checkbox" ${row[2] == 'SI' ? 'checked' : ''} disabled>`}</td>
                 <td>${row[3]}</td>
                 <td>${row[4]}</td>
                 <td>${row[5]}</td>
                 <td>${row[6]}</td>
                 <td>${row[7]}</td>
                 <td>${formatNumberAr(precio)}</td>
                 <td>${formatNumberAr(total)}</td>
                 <td>${formatNumberAr(totalSinIva)}</td>
                 <td class="text-left">${obsHtml}</td>`;
 
          if (puedeEditar) {
             html += `<td>
                     <button class="action-btn btn-edit" onclick="clickEditar(${args})"><span class="material-symbols-outlined">edit</span></button>
                     <button class="action-btn btn-del" onclick="clickBorrar(${id}, '${nombreVendedor}')"><span class="material-symbols-outlined">delete</span></button>
                 </td>`;
          }
 
          html += `</tr>`;
       }
       return html + '</tbody></table>';
    }
 
    function parseFecha(s) {
       if (!s) return new Date(0);
       if (s instanceof Date) return s;
       let p = s.split('/');
       return new Date(p[2], p[1] - 1, p[0]);
    }

       } else if (USUARIO_ACTUAL.rol === 'ADMIN' || USUARIO_ACTUAL.rol === 'ROOT') {
          vendedorParaClientes = vendedorNombre || HOJA_ACTUAL || 'Adrian';

    function enviarVenta(e) {
       e.preventDefault();
 
       let btn = document.getElementById('btnGuardar');
       if (!btn) return;
 
       btn.disabled = true;
       btn.innerText = "Guardando...";
 
       // Obtener valores del formulario
       let fechaInput = document.getElementById('fechaInput');
       let paisInput = document.getElementById('paisInput');
       let estadoInput = document.getElementById('estadoInput');
       let clienteInput = document.getElementById('clienteInput');
       let conceptoInput = document.getElementById('conceptoInput');
       let pagoInput = document.getElementById('pagoInput');
       let cantInput = document.getElementById('cantInput');
       let precioInput = document.getElementById('precioInput');
       let obsInput = document.getElementById('obsInput');
       let filaIndexInput = document.getElementById('filaIndex');
       let selVendedor = document.getElementById('selVendedor');
 
       // Validar campos requeridos
       if (!fechaInput.value || !paisInput.value || !clienteInput.value || !conceptoInput.value || !cantInput.value || !precioInput.value) {
          alert('Por favor completa todos los campos requeridos');
          btn.disabled = false;
          btn.innerText = "Guardar Venta";
          return;
       }
 
       // Obtener vendedor
       let vendedorVal = '';
       if (selVendedor && selVendedor.value) {
          vendedorVal = selVendedor.value;
       } else if (USUARIO_ACTUAL && USUARIO_ACTUAL.hoja) {
          vendedorVal = USUARIO_ACTUAL.hoja;
       } else if (HOJA_ACTUAL && HOJA_ACTUAL !== 'HOME' && HOJA_ACTUAL !== 'MENU_VENTAS' && HOJA_ACTUAL !== 'MENU_ADMIN' && HOJA_ACTUAL !== 'MENU_STOCK') {
          vendedorVal = HOJA_ACTUAL;
       } else {
          vendedorVal = 'Adrian';
       }
 
       // Procesar precio
       let precioLimpio = parseCurrency(precioInput.value);
 
       // Procesar país
       let pais = paisInput.value.toUpperCase();
       if (pais === 'USA') pais = 'EEUU';
       // Clave para buscar cotización (backend guarda España como ESPANA)
       let paisCotKey = (pais === 'ESPAÑA') ? 'ESPANA' : pais;

       // Obtener cotización del momento para guardarla con la venta (necesaria para España y otros países)
       let moneda = obtenerMonedaPais(pais);
       let cotizacionActual = 1;
       if (moneda !== 'ARS') {
          cotizacionActual = COTIZACIONES[paisCotKey] || COTIZACIONES[moneda] || 1;
       }
 
       // Preparar datos
       let datos = {
          vendedor: vendedorVal,
          fecha: fechaInput.value,
          pais: paisInput.value,
          estado: estadoInput.value,
          cliente: clienteInput.value,
          concepto: conceptoInput.value,
          formaPago: pagoInput.value,
          cantidad: cantInput.value,
          precio: precioLimpio,
          comentario: obsInput.value || '',
          filaIndex: filaIndexInput.value || '',
          cotizacion: cotizacionActual
       };
 
       // Determinar si es edición o creación
       let esEdicion = datos.filaIndex && datos.filaIndex !== '';
       let funcionBackend = esEdicion ? 'editarVenta' : 'guardarVenta';
 
       // Enviar al backend
       google.script.run
          .withSuccessHandler(function (res) {
             btn.disabled = false;
             btn.innerText = esEdicion ? "ACTUALIZAR" : "Guardar Venta";
 
             if (res && res.error) {
                alert('Error: ' + (res.mensaje || 'Error desconocido'));
             } else {
                mostrarAlerta(res && res.mensaje ? res.mensaje : (esEdicion ? 'Venta actualizada correctamente' : 'Venta guardada correctamente'));
                cerrarModals();
                // Solo resetear formulario si es una creación (no edición)
                if (!esEdicion) {
                   document.getElementById('formVenta').reset();
                   document.getElementById('filaIndex').value = '';
                   DATOS_FORMULARIO_VENTA = null; // Limpiar datos guardados
                }
                if (HOJA_ACTUAL) {
                   cargar(HOJA_ACTUAL);
                }
             }
          })
          .withFailureHandler(function (error) {
             console.error('Error en guardar venta:', error);
             btn.disabled = false;
             btn.innerText = esEdicion ? "ACTUALIZAR" : "Guardar Venta";
             alert('Error al guardar: ' + error.toString());
          })[funcionBackend](datos);
    }
