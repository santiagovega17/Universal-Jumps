    function poblarSelectsCaja(callback) {
       let selConcepto = document.getElementById('conceptoCajaSelect');
       let selPais = document.getElementById('paisCajaSelect');
       if (!selConcepto || !selPais) {
          if (callback) callback();
          return;
       }
 
       let paisSeleccionado = selPais.value;
 
       // Limpiar el select de concepto y descripción
       selConcepto.innerHTML = '<option value="">Cargando...</option>';
       let descSelect = document.getElementById('descCajaSelect');
       if (descSelect) {
          descSelect.innerHTML = '<option value="">Selecciona Concepto</option>';
          descSelect.disabled = true;
       }
 
       // Si no hay país seleccionado, dejar mensaje
       if (!paisSeleccionado || paisSeleccionado === '') {
          selConcepto.innerHTML = '<option value="">Selecciona un país primero...</option>';
          if (callback) callback();
          return;
       }
 
       // Obtener conceptos del backend filtrados por país
       google.script.run.withSuccessHandler((res) => {
          if (res.error) {
             selConcepto.innerHTML = '<option value="">Error al cargar conceptos</option>';
             if (callback) callback();
             return;
          }
 
          selConcepto.innerHTML = '<option value="">Selecciona...</option>';
 
          if (res.data && res.data.length > 0) {
             res.data.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                selConcepto.appendChild(opt);
             });
          } else {
             selConcepto.innerHTML = '<option value="">No hay conceptos agregados en ese país</option>';
          }
 
          // Actualizar medios de pago también
          actualizarMediosPagoCaja(paisSeleccionado);
          
          // Llamar callback si existe
          if (callback) callback();
       }).obtenerConceptosPorPais(paisSeleccionado);
    }
 
    function actualizarMediosPagoCaja(pais) {
       // Limpiar el contenedor de pagos y agregar nueva fila con medios del país
       let container = document.getElementById('pagos-container');
       if (!container) return;
 
       container.innerHTML = '';
 
       google.script.run.withSuccessHandler((res) => {
          if (!res.error && res.data && res.data.length > 0) {
             agregarFilaPago('', '', res.data);
          } else {
             agregarFilaPago('', '', []);
          }

    function addConfig(tipo, inputId, padre = '', pais) {
       let val = document.getElementById(inputId).value.trim();
       if (!val) return;
 
       let sentido = '';
       if (tipo === 'CONCEPTO') {
          sentido = document.getElementById('sentido-concepto').value;
       }
 
       // Capitalizar medios de pago (primera letra de cada palabra en mayúscula)
       if (tipo === 'MEDIO_PAGO') {
          val = val.toLowerCase().split(' ').map(palabra => {
             return palabra.charAt(0).toUpperCase() + palabra.slice(1);
          }).join(' ');
       } else {
          val = val.toUpperCase();
       }
 
       google.script.run.withSuccessHandler(() => {
          if (!GLOBAL_CONFIG[pais]) GLOBAL_CONFIG[pais] = { conceptos: [], medios: [], descripciones: {}, sentidos: {} };
 
          if (tipo === 'MEDIO_PAGO') GLOBAL_CONFIG[pais].medios.push(val);
          if (tipo === 'CONCEPTO') {
             GLOBAL_CONFIG[pais].conceptos.push(val);
             GLOBAL_CONFIG[pais].sentidos[val] = sentido;
          }
          if (tipo === 'DESCRIPCION') {
             if (!GLOBAL_CONFIG[pais].descripciones[padre]) GLOBAL_CONFIG[pais].descripciones[padre] = [];
             GLOBAL_CONFIG[pais].descripciones[padre].push(val);
          }
 
          if (pais === PAIS_CAJA_ACTUAL) poblarSelectsCaja();
          if (tipo === 'DESCRIPCION') renderDescripcionesConfig(padre, pais);
          else renderConfigModalContent(padre, null);

          // El backend ya añade el nuevo concepto/descripción a movimientos desde mes actual en adelante (guardarItemConfig)
          if (typeof cargarHistorialMovimientos === 'function') cargarHistorialMovimientos();
          if (typeof actualizarAvisoPendientes === 'function') actualizarAvisoPendientes();
       }).guardarItemConfig(tipo, val, padre, pais, sentido);
    }

    // Renderizar tarjetas de productos en la grilla agrupadas por MARCA > MODELO > COLOR
    /**
     * Función auxiliar para optimizar URLs de Cloudinary
     * Inyecta parámetros de transformación: f_auto, q_auto, c_fill, w_ancho, h_alto
     * @param {string} url - URL de la imagen (Cloudinary u otra)
     * @param {number} ancho - Ancho deseado en píxeles
     * @param {number} alto - Alto deseado en píxeles
     * @returns {string} - URL optimizada o la original si no es Cloudinary
     */
    function obtenerUrlMin(url, ancho, alto) {
       if (!url || typeof url !== 'string') {
          return url;
       }
       
       // Verificar si es una URL de Cloudinary
       // Las URLs de Cloudinary tienen el formato: https://res.cloudinary.com/...
       if (!url.includes('res.cloudinary.com')) {
          // No es una URL de Cloudinary, devolver sin modificar
          return url;
       }
       
       // Si ya tiene transformaciones, extraer la base y el path
       // Formato típico: https://res.cloudinary.com/CLOUD_NAME/image/upload/vTIMESTAMP/PATH.jpg
       // O con transformaciones: https://res.cloudinary.com/CLOUD_NAME/image/upload/TRANSFORM/PATH.jpg
       
       try {
          const urlObj = new URL(url);
          const pathParts = urlObj.pathname.split('/');
          
          // Buscar el índice de 'upload' en la ruta
          const uploadIndex = pathParts.indexOf('upload');
          if (uploadIndex === -1 || uploadIndex === pathParts.length - 1) {
             return url; // No se encontró 'upload' o está mal formada
          }
          
          // Construir la ruta de transformación
          // Insertar transformaciones después de 'upload'
          const transformaciones = `f_auto,q_auto,c_fill,w_${ancho},h_${alto}`;
          
          // Reconstruir la URL
          const baseParts = pathParts.slice(0, uploadIndex + 1); // Hasta 'upload'
          const remainingParts = pathParts.slice(uploadIndex + 1); // Desde después de 'upload'
          
          // Insertar transformaciones antes del resto del path
          const newPathParts = [...baseParts, transformaciones, ...remainingParts];
          const newPath = newPathParts.join('/');
          
          return `${urlObj.origin}${newPath}${urlObj.search}${urlObj.hash}`;
       } catch (e) {
          // Si hay algún error al parsear la URL, devolver la original
          return url;
       }
    }

    // Cargar marcas disponibles en el selector
    function cargarMarcasDisponibles() {
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             mostrarAlerta('Error al cargar marcas: ' + res.mensaje);
             return;
          }
          
          let selectMarca = document.getElementById('productoMarca');
          if (!selectMarca) return;
          
          // Limpiar opciones excepto la primera
          selectMarca.innerHTML = '<option value="">Selecciona una marca...</option>';
          
          // Agregar marcas
          if (res.data && res.data.marcas && res.data.marcas.length > 0) {
             res.data.marcas.forEach(marca => {
                let option = document.createElement('option');
                option.value = marca;
                option.textContent = marca;
                selectMarca.appendChild(option);
             });
          }
       }).obtenerMarcasModelos();
    }
 
    // Actualizar tipos cuando se selecciona una marca
    function actualizarTipos() {
       let selectMarca = document.getElementById('productoMarca');
       let selectTipo = document.getElementById('productoTipo');
       let selectModelo = document.getElementById('productoModelo');
       if (!selectMarca || !selectTipo || !selectModelo) return;
       let marca = selectMarca.value;
       if (!marca) {
          selectTipo.disabled = true;
          selectTipo.innerHTML = '<option value="">Selecciona marca primero...</option>';
          selectModelo.disabled = true;
          selectModelo.innerHTML = '<option value="">Selecciona tipo primero...</option>';
          return;
       }
       google.script.run.withSuccessHandler(res => {
          if (res.error) { selectTipo.disabled = true; return; }
          selectTipo.innerHTML = '<option value="">Selecciona un tipo...</option>';
          const tipos = res.data && res.data.tiposPorMarca && res.data.tiposPorMarca[marca] ? res.data.tiposPorMarca[marca] : [];
          if (tipos.length > 0) {
             selectTipo.disabled = false;
             tipos.forEach(t => { let o = document.createElement('option'); o.value = t; o.textContent = t; selectTipo.appendChild(o); });
          } else {
             selectTipo.innerHTML = '<option value="General">General</option>';
             selectTipo.disabled = false;
          }
          selectModelo.disabled = true;
          selectModelo.innerHTML = '<option value="">Selecciona tipo primero...</option>';
          actualizarModelos();
       }).obtenerMarcasModelos();
    }

    // Subir imagen a Cloudinary
    function subirImagenACloudinary(file) {
       return new Promise((resolve, reject) => {
          if (!file) {
             resolve(''); // Si no hay imagen, devolver string vacío
             return;
          }
 
          let formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', CLOUDINARY_PRESET);
 
          fetch(CLOUDINARY_UPLOAD_URL, {
             method: 'POST',
             body: formData
          })
          .then(response => response.json())
          .then(data => {
             if (data.secure_url) {
                resolve(data.secure_url);
             } else {
                reject(new Error('Error al subir imagen: ' + (data.error?.message || 'Respuesta inválida')));
             }
          })
          .catch(error => {
             reject(error);
          });
       });
    }

       e.preventDefault();
       
       let btn = document.getElementById('btnGuardarProducto');
       let btnTextoOriginal = btn.innerText;
       btn.disabled = true;
       btn.innerText = 'Guardando...';
 
       let marca = document.getElementById('productoMarca').value.trim();
       let tipo = (document.getElementById('productoTipo') && document.getElementById('productoTipo').value) ? document.getElementById('productoTipo').value.trim() : 'General';
       let modelo = document.getElementById('productoModelo').value.trim();
       let color = document.getElementById('productoColor').value.trim();
       let descripcion = document.getElementById('productoDescripcion').value.trim();
       let divideTalles = document.getElementById('productoDivideTalles') && document.getElementById('productoDivideTalles').checked ? 'SI' : 'NO';
       let activo = document.getElementById('productoActivo').checked ? 'SI' : 'NO';
       let imagenInput = document.getElementById('productoImagen');
       let archivoImagen = imagenInput.files[0];
 
       // Validaciones
       if (!marca) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('La marca es requerida');
          return;
       }
 
       if (!modelo) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('La dureza es requerida');
          return;
       }
 
       if (!color) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('El color es requerido');
          return;
       }
 
       // Si hay imagen, subirla primero a Cloudinary
       if (archivoImagen) {
          subirImagenACloudinary(archivoImagen)
             .then(imagenUrl => {
                crearProductoEnBackend(marca, tipo, modelo, color, descripcion, imagenUrl, divideTalles, activo, btn, btnTextoOriginal);
             })
             .catch(error => {
                btn.disabled = false;
                btn.innerText = btnTextoOriginal;
                mostrarAlerta('Error al subir imagen: ' + error.message);
             });
       } else {
          // Si no hay imagen, crear el producto directamente
          crearProductoEnBackend(marca, tipo, modelo, color, descripcion, '', divideTalles, activo, btn, btnTextoOriginal);
       }
    }
 
    function crearProductoEnBackend(marca, tipo, modelo, color, descripcion, imagenUrl, divideTalles, activo, btn, btnTextoOriginal) {
       let datos = {
          marca: marca, tipo: tipo || 'General', modelo: modelo,
          color: color, descripcion: descripcion, imagenUrl: imagenUrl,
          divideTalles: divideTalles || 'SI', activo: activo, pais: PAIS_STOCK_ACTUAL
       };
 
       google.script.run.withSuccessHandler(res => {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          if (res.error) {
             mostrarAlerta('Error: ' + res.mensaje);
          } else {
             mostrarAlerta(res.mensaje || 'Producto creado correctamente');
             cerrarModalNuevoProducto();
             // Recargar el stock para mostrar el nuevo producto
             cargarStock();
          }
       }).withFailureHandler(error => {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('Error al crear producto: ' + error.message);
       }).crearProductoBota(datos);
    }
 
    function abrirModalAjusteStock(idProducto, nombreProducto, colorProducto, sinTalles) {
       let modal = document.getElementById('modalAjusteStock');
       let form = document.getElementById('formAjusteStock');
       if (!modal || !form) return;
       form.reset();
       let nombreCompleto = nombreProducto || 'Producto';
       if (colorProducto && colorProducto.trim() !== '') nombreCompleto += ` - ${colorProducto}`;
       document.getElementById('ajusteIdProducto').value = idProducto;
       document.getElementById('ajusteProductoNombre').value = nombreCompleto;
       let selTalle = document.getElementById('ajusteTalle');
       if (selTalle) {
          if (sinTalles) {
             selTalle.innerHTML = '<option value="UNICO" selected>Único</option>';
             selTalle.required = false;
          } else {
             selTalle.innerHTML = '<option value="">Selecciona un talle...</option><option value="XS">XS</option><option value="S">S</option><option value="M">M</option><option value="L">L</option>';
             selTalle.required = true;
          }
       }
       
       // Establecer fecha actual por defecto
       let hoy = new Date();
       let fechaStr = hoy.getFullYear() + '-' + 
                      String(hoy.getMonth() + 1).padStart(2, '0') + '-' + 
                      String(hoy.getDate()).padStart(2, '0');
       document.getElementById('ajusteFecha').value = fechaStr;
       
       // Establecer tipo por defecto (INGRESO)
       setTipoAjuste('INGRESO');
       
       // Abrir modal
       modal.classList.add('open');
    }
 
    // Cerrar modal de ajuste de stock
    function cerrarModalAjusteStock() {
       let modal = document.getElementById('modalAjusteStock');
       if (modal) {
          modal.classList.remove('open');
          // Resetear tipo a INGRESO
          setTipoAjuste('INGRESO');
       }
    }
 
    // Establecer tipo de ajuste (INGRESO/EGRESO)
    function setTipoAjuste(tipo) {
       let btnIngreso = document.getElementById('btn-ajuste-ingreso');
       let btnEgreso = document.getElementById('btn-ajuste-egreso');
       
       // Almacenar el tipo en el elemento para poder leerlo después
       if (!btnIngreso || !btnEgreso) return;
       
       if (tipo === 'EGRESO') {
          btnEgreso.classList.add('active-egreso');
          btnIngreso.classList.remove('active-ingreso');
          btnEgreso.dataset.tipo = 'EGRESO';
          btnIngreso.dataset.tipo = '';
       } else {
          btnIngreso.classList.add('active-ingreso');
          btnEgreso.classList.remove('active-egreso');
          btnIngreso.dataset.tipo = 'INGRESO';
          btnEgreso.dataset.tipo = '';
       }
    }
 
    // Enviar ajuste de stock
    function enviarAjusteStock(e) {
       e.preventDefault();
       
       let btn = document.getElementById('btnGuardarAjuste');
       let btnTextoOriginal = btn.innerText;
       btn.disabled = true;
       btn.innerText = 'Registrando...';
 
       let idProducto = document.getElementById('ajusteIdProducto').value;
       let talle = document.getElementById('ajusteTalle').value;
       let cantidad = parseInt(document.getElementById('ajusteCantidad').value);
       let motivo = document.getElementById('ajusteMotivo').value.trim();
       let fecha = document.getElementById('ajusteFecha').value;
       
       // Determinar tipo según los botones
       let btnIngreso = document.getElementById('btn-ajuste-ingreso');
       let btnEgreso = document.getElementById('btn-ajuste-egreso');
       let tipo = (btnIngreso && btnIngreso.dataset.tipo === 'INGRESO') ? 'INGRESO' : 'EGRESO';
 
       // Validaciones
       if (!idProducto) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('Error: ID de producto no encontrado');
          return;
       }
 
       if (!talle) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('Selecciona un talle');
          return;
       }
 
       if (!cantidad || cantidad <= 0) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('La cantidad debe ser un número positivo');
          return;
       }
 
       if (!motivo) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('El motivo/observación es requerido');
          return;
       }
 
       if (!fecha) {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('La fecha es requerida');
          return;
       }
 
       let datos = {
          idProducto: idProducto,
          talle: talle,
          tipo: tipo,
          cantidad: cantidad,
          observacion: motivo,
          fecha: fecha,
          pais: PAIS_STOCK_ACTUAL
       };
 
       google.script.run.withSuccessHandler(res => {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          if (res.error) {
             mostrarAlerta('Error: ' + res.mensaje);
          } else {
             mostrarAlerta(res.mensaje || 'Ajuste registrado correctamente');
             cerrarModalAjusteStock();
             // Recargar el stock para mostrar los cambios
             cargarStock();
          }
       }).withFailureHandler(error => {
          btn.disabled = false;
          btn.innerText = btnTextoOriginal;
          mostrarAlerta('Error al registrar ajuste: ' + error.message);
       }).registrarMovimientoStock(datos);
    }
 
    // --- CONFIGURACIÓN DE MARCAS Y MODELOS ---
 
    // Abrir modal de configuración de marcas y modelos
    function abrirModalConfigMarcas() {
       let modal = document.getElementById('modalConfigMarcas');
       if (modal) {
          modal.classList.add('open');
          // Resetear el select a "Nueva marca..."
          let select = document.getElementById('selectMarcaExistente');
          if (select) {
             select.value = '';
          }
          // Mostrar el input de nueva marca por defecto (con un pequeño delay para asegurar que los elementos estén disponibles)
          setTimeout(() => {
             actualizarInputMarca();
          }, 100);
          cargarMarcasEnSelect();
          cargarListaMarcasModelos();
       }
    }
 
    // Cargar marcas en el select
    function cargarMarcasEnSelect() {
       google.script.run.withSuccessHandler(res => {
          if (res.error) return;
          
          let select = document.getElementById('selectMarcaExistente');
          if (!select) return;
          
          // Limpiar opciones excepto "Nueva marca..."
          select.innerHTML = '<option value="">Nueva marca...</option>';
          
          if (res.data && res.data.marcas && res.data.marcas.length > 0) {
             res.data.marcas.forEach(marca => {
                let option = document.createElement('option');
                option.value = marca;
                option.textContent = marca;
                select.appendChild(option);
             });
          }
          
          // Asegurar que el input de nueva marca esté visible si no hay selección
          actualizarInputMarca();
       }).obtenerMarcasModelos();
    }
 
    // Actualizar input de nueva marca según selección
    function actualizarInputMarca() {
       let select = document.getElementById('selectMarcaExistente');
       let inputNuevaMarca = document.getElementById('inputNuevaMarca');
       let inputMarca = document.getElementById('nuevaMarca');
       
       if (!select || !inputNuevaMarca || !inputMarca) return;
       
       if (select.value === '') {
          // Mostrar input para nueva marca
          inputNuevaMarca.style.display = 'block';
          inputMarca.required = true;
          inputMarca.value = '';
       } else {
          // Ocultar input, usar marca seleccionada
          inputNuevaMarca.style.display = 'none';
          inputMarca.required = false;
          inputMarca.value = '';
       }
    }
 
    // Cerrar modal de configuración
    function cerrarModalConfigMarcas() {
       let modal = document.getElementById('modalConfigMarcas');
       if (modal) {
          modal.classList.remove('open');
          // Resetear formulario
          let form = document.getElementById('formMarcaModelo');
          if (form) {
             form.reset();
             document.getElementById('selectMarcaExistente').value = '';
             document.getElementById('inputNuevaMarca').style.display = 'none';
          }
       }
    }
 
    // Cargar lista de marcas y modelos
    function cargarListaMarcasModelos() {
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             document.getElementById('lista-marcas-modelos').innerHTML = `
                <div style="padding:20px; text-align:center; color:#ef4444;">
                   Error: ${res.mensaje}
                </div>
             `;
             return;
          }
          
          let html = '';
          
          if (!res.data || !res.data.marcas || res.data.marcas.length === 0) {
             html += '<div style="padding:20px; text-align:center; color:#94a3b8;">No hay marcas, tipos y durezas configurados.</div>';
          } else {
             html += '<div style="display:flex; flex-direction:column; gap:15px;">';
             const modelosPorMarcaTipo = res.data.modelosPorMarcaTipo || {};
             const modelosConProductosActivos = res.data.modelosConProductosActivos || {};
             res.data.marcas.forEach(marca => {
                const tipos = res.data.tiposPorMarca && res.data.tiposPorMarca[marca] ? res.data.tiposPorMarca[marca] : ['General'];
                html += `<div class="card" style="padding:15px;"><h4 style="color:white; font-size:16px; font-weight:600; margin:0 0 10px 0;">${marca}</h4>`;
                tipos.forEach(tipo => {
                   const claveMT = marca + '|' + tipo;
                   const modelos = modelosPorMarcaTipo[claveMT] || (tipo === 'General' && res.data.modelos && res.data.modelos[marca]) || [];
                   if (modelos.length > 0) {
                      html += `<div style="margin-bottom:10px;"><div style="color:#94a3b8; font-size:12px; margin-bottom:6px;">${tipo}</div><div style="display:flex; flex-wrap:wrap; gap:8px;">`;
                      modelos.forEach(modelo => {
                         const claveFull = marca + '|' + tipo + '|' + modelo;
                         const tieneProductosActivos = modelosConProductosActivos[claveFull] === true;
                         const puedeEliminar = !tieneProductosActivos;
                         const esc = s => (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                         html += `<div style="display:flex; align-items:center; gap:8px; background:#1e293b; padding:6px 12px; border-radius:6px;">
                            <span style="color:#94a3b8; font-size:13px;">${modelo}</span>
                            <button onclick="eliminarMarcaModeloFrontend('${esc(marca)}','${esc(tipo)}','${esc(modelo)}')" 
                               style="background:transparent; border:none; color:${puedeEliminar ? '#ef4444' : '#64748b'}; cursor:${puedeEliminar ? 'pointer' : 'not-allowed'}; padding:0; font-size:16px;" 
                               title="${puedeEliminar ? 'Eliminar' : 'Tiene productos activos'}">
                               <span class="material-symbols-outlined" style="font-size:18px;">delete</span>
                            </button>
                         </div>`;
                      });
                      html += '</div></div>';
                   }
                });
                html += '</div>';
             });
             html += '</div>';
          }
          
          document.getElementById('lista-marcas-modelos').innerHTML = html;
       }).obtenerMarcasModelos();
    }
 
    // Guardar nueva marca y modelo
    function guardarMarcaModelo(e) {
       e.preventDefault();
       
       let selectMarca = document.getElementById('selectMarcaExistente');
       let inputMarca = document.getElementById('nuevaMarca');
       let tipo = (document.getElementById('nuevoTipo') && document.getElementById('nuevoTipo').value) ? document.getElementById('nuevoTipo').value.trim() : 'General';
       let modelo = document.getElementById('nuevoModelo').value.trim();
       let marca = '';
       if (selectMarca && selectMarca.value && selectMarca.value !== '') {
          marca = selectMarca.value.trim();
       } else if (inputMarca) {
          marca = inputMarca.value.trim();
       }
       if (!marca || !modelo) {
          mostrarAlerta('La marca y la dureza son requeridas');
          return;
       }
       
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             mostrarAlerta('Error: ' + res.mensaje);
          } else {
             mostrarAlerta(res.mensaje || 'Marca, tipo y dureza guardados correctamente');
             document.getElementById('formMarcaModelo').reset();
             document.getElementById('selectMarcaExistente').value = '';
             document.getElementById('inputNuevaMarca').style.display = 'none';
             cargarMarcasEnSelect();
             cargarListaMarcasModelos();
             // Si el modal de producto está abierto, recargar marcas
             if (document.getElementById('modalNuevoProducto').classList.contains('open')) {
                cargarMarcasDisponibles();
             }
          }
       }).withFailureHandler(err => {
          mostrarAlerta('Error: ' + err.message);
       }).guardarMarcaModelo({ marca: marca, tipo: tipo || 'General', modelo: modelo });
    }
 
    function eliminarMarcaModeloFrontend(marca, tipo, modelo) {
       let msg = tipo ? `¿Eliminar "${marca} - ${tipo} - ${modelo}"?` : `¿Eliminar la dureza "${modelo}" de la marca "${marca}"?`;
       abrirConfirmacion(msg, () => {
          google.script.run.withSuccessHandler(res => {
             if (res.error) {
                mostrarAlerta('Error: ' + res.mensaje);
             } else {
                mostrarAlerta(res.mensaje || 'Marca, tipo y dureza eliminados correctamente');
                cargarListaMarcasModelos();
                // Si el modal de producto está abierto, recargar marcas
                if (document.getElementById('modalNuevoProducto').classList.contains('open')) {
                   cargarMarcasDisponibles();
                   // Si la marca eliminada estaba seleccionada, limpiar
                   let selectMarca = document.getElementById('productoMarca');
                   if (selectMarca && selectMarca.value === marca) {
                      selectMarca.value = '';
                      actualizarModelos();
                   }
                }
             }
          }).withFailureHandler(err => {
             mostrarAlerta('Error: ' + err.message);
          }).eliminarMarcaModelo({ marca: marca, tipo: tipo || 'General', modelo: modelo });
       });
    }
 
    // --- FUNCIONES PARA SELECTOR DE VISTA Y PAÍSES EN STOCK ---
    
    /**
     * Cambiar vista (STOCK o MOVIMIENTOS)
     */
    function switchVistaStock(vista) {
       if (VISTA_STOCK_ACTUAL === vista) return; // Ya está en esa vista, no hacer nada
       
       VISTA_STOCK_ACTUAL = vista;
       
       // Recargar inmediatamente
       cargarStock();
    }
    
    /**
     * Cambiar país en stock
     */
    function switchPaisStock(pais) {
       PAIS_STOCK_ACTUAL = pais;
 
       // Definir colores de países (igual que en balance de caja)
       const paisesStock = [
          { key: 'ARGENTINA', colorHeader: '#75AADB', colorBorder: '#6C8EBF' },
          { key: 'CHILE', colorHeader: '#0039A6', colorBorder: '#002E83' },
          { key: 'MEXICO', colorHeader: '#006847', colorBorder: '#005638' },
          { key: 'ESPANA', colorHeader: '#AA151B', colorBorder: '#8B1116' },
          { key: 'EEUU', colorHeader: '#B22234', colorBorder: '#9B1C2C' }
       ];
 
       // Actualizar visualmente las pestañas (igual que en balance de caja)
       document.querySelectorAll('[data-pais]').forEach(el => {
          el.classList.remove('active-view');
          if (el.getAttribute('data-pais') === pais) {
             el.classList.add('active-view');
             let paisData = paisesStock.find(p => p.key === pais);
             if (paisData) {
                el.style.background = paisData.colorHeader;
                el.style.borderColor = paisData.colorBorder;
                el.style.color = 'white';
             }
          } else {
             // Resetear estilos para pestañas no activas
             el.style.background = '';
             el.style.borderColor = '';
             el.style.color = '';
          }
       });
 
       // Recargar stock para el nuevo país
       cargarStock();
    }
 
    // Desactivar producto (solo si todos los talles están en 0)
    function desactivarProducto(idProducto, todosTallesEnCero) {
       if (!todosTallesEnCero) {
          mostrarAlerta('No se puede desactivar el producto. Todos los talles deben estar en 0 para desactivarlo.');
          return;
       }
 
       abrirConfirmacion('¿Estás seguro de desactivar este producto?', () => {
          google.script.run.withSuccessHandler(res => {
             if (res.error) {
                mostrarAlerta('Error: ' + res.mensaje);
             } else {
                mostrarAlerta('Producto desactivado correctamente');
                cargarStock();
             }
          }).withFailureHandler(err => {
             mostrarAlerta('Error: ' + err.message);
          }).actualizarEstadoProducto({ id: idProducto, activo: 'NO' });
       });
    }
 
    // Activar producto
    function activarProducto(idProducto) {
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             mostrarAlerta('Error: ' + res.mensaje);
          } else {
             mostrarAlerta('Producto activado correctamente');
             cargarStock();
          }
       }).withFailureHandler(err => {
          mostrarAlerta('Error: ' + err.message);
       }).actualizarEstadoProducto({ id: idProducto, activo: 'SI' });
    }
 </script>
