<script>
    /**
     * Ventas – lógica por vendedor: historial, filtros, modal venta, consolidado/tarjetas.
     */
    // --- VENTAS Y VENDEDOR ---

    var TAMANO_PAGINA_VENTAS = 25;
    /** Filas del historial mostradas; se amplía de a CARGA_HISTORIAL_VENTAS con "Ver más". */
    var VENTAS_HISTORIAL_LIMITE_MOSTRAR = 10;
    var CARGA_HISTORIAL_VENTAS = 10;
    var VENTAS_HISTORIAL_VENDEDOR = '';
    /** Respaldo si el backend no responde o la tabla está vacía */
    var DEFAULT_FORMAS_PAGO_VENTA = [
       'Mercado Pago', 'Transferencia', 'Efectivo', 'Cta corriente', 'Mercado Libre', 'Amazon', 'Prisma', 'Paypal',
       'Banco Bci (CL)', 'Dólar App (MX)', 'Banco Sadabell (ESP)', 'Banco Itaú (URU)'
    ];

    var SIMPLE_ICONS_SVG_CDN = 'https://cdn.jsdelivr.net/npm/simple-icons@13.16.0/icons/';
    var COMISIONES_VENDEDOR_CACHE = {};
    var COMISIONES_VENDEDOR_ESTADO = { vendedor: '', requestKey: '' };

    /**
     * logoSlug: SVG en jsDelivr (Simple Icons). logoUrl: imagen propia/CDN.
     * icon: Material Symbols si no hay imagen, o respaldo si el logo remoto falla (404).
     * Medios sin marca en el catálogo: agregar fila aquí o confiar en inferIconForNombreDesconocido + icono genérico.
     */
    var METADATA_FORMA_PAGO_VENTA = {
       'Mercado Pago': { logoSlug: 'mercadopago', icon: 'payments' },
       'Transferencia': { icon: 'account_balance' },
       'Efectivo': { icon: 'payments' },
       'Cta corriente': { icon: 'credit_card' },
       'Mercado Libre': {
          logoUrl: 'https://http2.mlstatic.com/frontend-assets/ml-web-navigation/ui-navigation/6.6.73/mercadolibre/logo__large_plus@2x.png',
          icon: 'storefront'
       },
       'Amazon': { logoSlug: 'amazonpay', icon: 'shopping_cart' },
       'Prisma': { icon: 'credit_card' },
       'Paypal': { logoSlug: 'paypal', icon: 'account_balance_wallet' },
       'Banco Bci (CL)': { icon: 'account_balance' },
       'Dólar App (MX)': { icon: 'attach_money' },
       'Banco Sadabell (ESP)': { icon: 'account_balance' },
       'Banco Itaú (URU)': { icon: 'account_balance' }
    };

    function getFormaPagoCardMeta(nombre) {
       var n = (nombre || '').trim();
       if (METADATA_FORMA_PAGO_VENTA[n]) return METADATA_FORMA_PAGO_VENTA[n];
       var lower = n.toLowerCase();
       if (lower.indexOf('mercado pago') >= 0) return METADATA_FORMA_PAGO_VENTA['Mercado Pago'];
       if (lower.indexOf('transfer') >= 0) return METADATA_FORMA_PAGO_VENTA['Transferencia'];
       if (lower.indexOf('efectivo') >= 0 || lower.indexOf('cash') >= 0) return METADATA_FORMA_PAGO_VENTA['Efectivo'];
       if (lower.indexOf('cta') >= 0 && lower.indexOf('corriente') >= 0) return METADATA_FORMA_PAGO_VENTA['Cta corriente'];
       if (lower.indexOf('mercado libre') >= 0 || lower.indexOf('meli') >= 0) return METADATA_FORMA_PAGO_VENTA['Mercado Libre'];
       if (lower.indexOf('amazon') >= 0) return METADATA_FORMA_PAGO_VENTA['Amazon'];
       if (lower.indexOf('paypal') >= 0) return METADATA_FORMA_PAGO_VENTA['Paypal'];
       if (lower.indexOf('prisma') >= 0) return METADATA_FORMA_PAGO_VENTA['Prisma'];
       if (lower.indexOf('bci') >= 0) return METADATA_FORMA_PAGO_VENTA['Banco Bci (CL)'];
       if (lower.indexOf('dólar app') >= 0 || lower.indexOf('dolar app') >= 0) return METADATA_FORMA_PAGO_VENTA['Dólar App (MX)'];
       if (lower.indexOf('sabadell') >= 0 || lower.indexOf('sadabell') >= 0) return METADATA_FORMA_PAGO_VENTA['Banco Sadabell (ESP)'];
       if (lower.indexOf('itaú') >= 0 || lower.indexOf('itau') >= 0) return METADATA_FORMA_PAGO_VENTA['Banco Itaú (URU)'];
       return { icon: inferIconForNombreDesconocido(n) };
    }

    /** Icono Material de respaldo cuando no hay logo conocido o la imagen remota falla. */
    function inferIconForNombreDesconocido(nombre) {
       var s = (nombre || '').toLowerCase();
       if (/banco|bank/.test(s)) return 'account_balance';
       if (/transfer/.test(s)) return 'account_balance';
       if (/tarjeta|card|visa|master|naranja|cabal/.test(s)) return 'credit_card';
       if (/efectivo|cash|billete/.test(s)) return 'payments';
       if (/qr|mercado pago|mp\b/.test(s)) return 'qr_code_2';
       return 'payments';
    }

    function formaPagoCardFallbackIcon(meta, nombre) {
       if (meta && meta.icon) return meta.icon;
       return inferIconForNombreDesconocido(nombre);
    }

    function bindFormaPagoLogoImgFallbacks(root) {
       if (!root || !root.querySelectorAll) return;
       var imgs = root.querySelectorAll('img.formas-pago-card-logo-img[data-fallback-icon]');
       for (var i = 0; i < imgs.length; i++) {
          (function (img) {
             var fb = img.getAttribute('data-fallback-icon') || 'payments';
             img.onerror = function () {
                img.onerror = null;
                var w = img.parentNode;
                if (!w) return;
                w.className = 'formas-pago-card-logo formas-pago-card-logo--icon';
                w.innerHTML = '<span class="material-symbols-outlined">' + fb + '</span>';
             };
          })(imgs[i]);
       }
    }

    function nombresFormasPagoDesdeRespuesta(res) {
       if (res && !res.error && res.data && res.data.length) {
          return res.data.map(function (r) { return (r.nombre || '').toString().trim(); }).filter(Boolean);
       }
       return DEFAULT_FORMAS_PAGO_VENTA.slice();
    }

    function aplicarOpcionesFormasPagoVenta(selectEl, nombres, valorPreferido) {
       if (!selectEl) return;
       var esFiltroHistorialPago = selectEl.id === 'fPago';
       var vprev = valorPreferido !== undefined && valorPreferido !== null ? String(valorPreferido).trim() : String(selectEl.value || '').trim();
       selectEl.innerHTML = '';
       if (esFiltroHistorialPago) {
          var optTodos = document.createElement('option');
          optTodos.value = '';
          optTodos.textContent = 'Pago...';
          selectEl.appendChild(optTodos);
       }
       nombres.forEach(function (nombre) {
          var opt = document.createElement('option');
          opt.value = nombre;
          opt.textContent = nombre;
          selectEl.appendChild(opt);
       });
       if (!selectEl.options.length) {
          var o = document.createElement('option');
          o.value = '';
          o.textContent = 'Sin medios configurados';
          selectEl.appendChild(o);
          return;
       }
       if (esFiltroHistorialPago && (!vprev || vprev === '')) {
          selectEl.value = '';
       } else if (vprev && Array.prototype.some.call(selectEl.options, function (o) { return o.value === vprev; })) {
          selectEl.value = vprev;
       }
    }

    function poblarSelectFormasPagoVenta(selectId, valorPreferido, onDone) {
       var sel = document.getElementById(selectId);
       if (!sel) {
          if (typeof onDone === 'function') onDone();
          return;
       }
       google.script.run
          .withSuccessHandler(function (res) {
             aplicarOpcionesFormasPagoVenta(sel, nombresFormasPagoDesdeRespuesta(res), valorPreferido);
             if (typeof onDone === 'function') onDone();
          })
          .withFailureHandler(function () {
             aplicarOpcionesFormasPagoVenta(sel, DEFAULT_FORMAS_PAGO_VENTA.slice(), valorPreferido);
             if (typeof onDone === 'function') onDone();
          })
          .obtenerFormasPagoVenta();
    }

    /** Milisegundos para ordenar: DD/MM/AAAA o ISO (YYYY-MM-DD…). */
    function historialFechaMs(celda) {
       if (celda === undefined || celda === null) return 0;
       var s = String(celda).trim();
       if (!s) return 0;
       if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
          var tIso = Date.parse(s.length >= 10 ? s.substring(0, 10) : s);
          return isNaN(tIso) ? 0 : tIso;
       }
       var t = parseFecha(celda).getTime();
       return isNaN(t) ? 0 : t;
    }

    /** Orden: fecha más reciente primero; mismo día → mayor índice de fila primero. */
    function compareFilasHistorialNuevoPrimero(a, b) {
       var ta = historialFechaMs(a[0]);
       var tb = historialFechaMs(b[0]);
       if (tb !== ta) return tb - ta;
       var ida = parseInt(a[a.length - 1], 10);
       var idb = parseInt(b[b.length - 1], 10);
       if (isNaN(ida)) ida = 0;
       if (isNaN(idb)) idb = 0;
       return idb - ida;
    }

    function aplicarFiltrosHistorial(sellerName, opts) {
       opts = opts || {};
       if (!opts.preserveLimite) {
          VENTAS_HISTORIAL_LIMITE_MOSTRAR = CARGA_HISTORIAL_VENTAS;
       }
       VENTAS_HISTORIAL_VENDEDOR = sellerName || VENTAS_HISTORIAL_VENDEDOR;
       var nombreVendedor = sellerName || VENTAS_HISTORIAL_VENDEDOR;

       let mes = document.getElementById('fMes') ? document.getElementById('fMes').value : '';
       let anio = document.getElementById('fAnio') ? document.getElementById('fAnio').value : '';
       let estado = document.getElementById('fEstado') ? document.getElementById('fEstado').value.toUpperCase() : '';
       let pais = document.getElementById('fPais') ? document.getElementById('fPais').value.toUpperCase() : '';
       let concepto = document.getElementById('fConcepto') ? document.getElementById('fConcepto').value.toUpperCase() : '';
       let pago = document.getElementById('fPago') ? document.getElementById('fPago').value.toUpperCase() : '';
 
       let filtrados = HISTORIAL_CACHE.filter(row => {
          let f = parseFecha(row[0]);
          let matchMes = (mes === "" || (f.getMonth() + 1) == mes);
          let matchAnio = (anio === "" || f.getFullYear() == anio);
          let matchEstado = (estado === "" || row[1].toUpperCase().includes(estado));
          let matchPais = (pais === "" || row[3].toUpperCase().includes(pais));
          let matchConcepto = (concepto === "" || row[5].toUpperCase().includes(concepto));
          let matchPago = (pago === "" || row[6].toUpperCase().includes(pago));
          return matchMes && matchAnio && matchEstado && matchPais && matchConcepto && matchPago;
       });
       filtrados.sort(compareFilasHistorialNuevoPrimero);
       var visibles = filtrados.slice(0, VENTAS_HISTORIAL_LIMITE_MOSTRAR);
       var html = construirTablaHistorialAcciones(visibles, nombreVendedor);
       var restantes = filtrados.length - visibles.length;
       if (restantes > 0) {
          html += '<div class="ventas-historial-ver-mas-wrap"><button type="button" class="btn-submit ventas-historial-ver-mas" onclick="cargarMasHistorialVentas()">Ver más <span class="ventas-historial-ver-mas-meta">(' + restantes + ' más)</span></button></div>';
       }
       var cont = document.getElementById('contenedorHistorial');
       if (cont) {
          cont.innerHTML = html;
          bindVentasHistorialMiniLogos(cont);
       }
    }

    function cargarMasHistorialVentas() {
       VENTAS_HISTORIAL_LIMITE_MOSTRAR += CARGA_HISTORIAL_VENTAS;
       aplicarFiltrosHistorial(VENTAS_HISTORIAL_VENDEDOR, { preserveLimite: true });
    }

    function puedeEditarObjetivosVentas(nombreVendedor) {
       if (!USUARIO_ACTUAL || !nombreVendedor) return false;
       var rol = String((typeof getRolEfectivo === 'function' ? getRolEfectivo() : USUARIO_ACTUAL.rol) || '').toUpperCase();
       if (rol === 'ADMIN' || rol === 'ROOT') return true;
       return false;
    }

    function calcObjMetaObjetivosVendedor(input, targetId) {
       var num = parseCurrency(input.value);
       var el = document.getElementById(targetId);
       if (el) el.innerText = formatNumberAr(num);
    }

    function tituloRangoObjetivoVendedor(rango) {
       var n = Number(rango);
       if (n === 0) return 'RANGO MÍNIMO';
       return 'RANGO ' + n;
    }

    /** Una sola fila por número de rango (evita tarjetas duplicadas si el backend repite identificador). */
    function dedupeObjetivosPorRango(arr) {
       var map = {};
       (arr || []).forEach(function (r) {
          var k = Number(r.rango);
          if (!Number.isFinite(k)) return;
          if (!map[k]) map[k] = r;
       });
       return Object.keys(map).sort(function (a, b) { return Number(a) - Number(b); }).map(function (k) { return map[k]; });
    }

    function pintarGrillaObjetivosVendedor(data, nombreVendedor) {
       var cont = document.getElementById('vobj-grid-container');
       if (!cont) return;
       var src = dedupeObjetivosPorRango(Array.isArray(data) ? data.slice() : []);
       var puede = puedeEditarObjetivosVentas(nombreVendedor);
       var chk = document.getElementById('chkVobjRangoMin');
       var wantMin = chk && chk.checked;
       var rows = src;
       if (!wantMin) {
          rows = rows.filter(function (r) { return Number(r.rango) !== 0; });
       } else if (!rows.some(function (r) { return Number(r.rango) === 0; }) && puede) {
          rows = [{ rango: 0, pctBotas: 0, pctCerts: 0, botas: 0, certs: 0, factBotas: 0, factCerts: 0 }].concat(rows);
       }
       rows = dedupeObjetivosPorRango(rows);
       rows.sort(function (a, b) { return (Number(a.rango) || 0) - (Number(b.rango) || 0); });

       var html = '<div class="obj-grid-container">';
       if (!rows.length && !puede) {
          html += '<div class="card" style="padding:20px; color:#64748b;">No hay objetivos configurados para este mes.</div></div>';
          cont.innerHTML = html;
          return;
       }
       if (!rows.length) {
          for (var r = 1; r <= 4; r++) {
             rows.push({ rango: r, pctBotas: 0, pctCerts: 0, botas: 0, certs: 0, factBotas: 0, factCerts: 0 });
          }
       }
       rows.forEach(function (row) {
          var rg = Number(row.rango);
          if (!Number.isFinite(rg)) return;
          var suf = 'r' + rg;
          var factB = formatNumberAr(row.factBotas || 0);
          var factC = formatNumberAr(row.factCerts || 0);
          var factBEdit = factB.replace('ARS', '').trim();
          var factCEdit = factC.replace('ARS', '').trim();
          var metaTot = (Number(row.factBotas) || 0) + (Number(row.factCerts) || 0);
          html += '<div class="obj-card" data-rango="' + rg + '">' +
             '<div class="obj-header-row"><div class="obj-title">' + tituloRangoObjetivoVendedor(rg) + '</div></div>' +
             '<div class="obj-row" style="margin:0 0 10px 0;padding:8px;background:rgba(255,255,255,0.04);border-radius:6px;">' +
             '<span class="obj-label">Facturación total:</span> ' +
             '<span class="obj-val" id="vobj-meta-total-' + suf + '">' + formatNumberAr(metaTot) + '</span></div>' +
             '<div class="obj-content">' +
             '<div class="obj-sub-section">' +
             '<div class="obj-sub-title"><span class="material-symbols-outlined">steps</span> BOTAS</div>' +
             '<div class="obj-row"><span class="obj-label">% Comisión:</span> ' +
             '<div><span class="view-mode obj-val">' + (row.pctBotas || 0) + '</span>' +
             '<input type="number" class="obj-input edit-mode hidden" value="' + (row.pctBotas || 0) + '" id="vobj-pctB-' + suf + '"> %</div></div>' +
             '<div class="obj-row"><span class="obj-label">Unidades:</span> ' +
             '<div><span class="view-mode obj-val">' + row.botas + '</span>' +
             '<input type="number" class="obj-input edit-mode hidden" value="' + row.botas + '" id="vobj-botas-' + suf + '"></div></div>' +
             '<div class="obj-row"><span class="obj-label">Facturación:</span> ' +
             '<div><span class="view-mode obj-val">' + factB + '</span>' +
             '<input type="text" class="obj-input edit-mode hidden" value="' + factBEdit + '" id="vobj-factB-' + suf + '" onkeyup="formatoMoneda(this); calcObjMetaObjetivosVendedor(this, \'vobj-mensB-' + suf + '\'); actualizarVobjMetaTotalRow(' + rg + ')"></div></div>' +
             '<div class="obj-row edit-mode hidden"><span class="obj-label" title="Mientras editás, acá se ve el mismo importe formateado en pesos (ARS), para confirmar el valor sin leer el texto crudo del campo.">Vista previa:</span> <span class="obj-val" style="color:var(--accent)" id="vobj-mensB-' + suf + '">' + factB + '</span></div>' +
             '</div>' +
             '<div class="obj-sub-section">' +
             '<div class="obj-sub-title"><span class="material-symbols-outlined">verified</span> CERTIFICACIONES</div>' +
             '<div class="obj-row"><span class="obj-label">% Comisión:</span> ' +
             '<div><span class="view-mode obj-val">' + (row.pctCerts || 0) + '</span>' +
             '<input type="number" class="obj-input edit-mode hidden" value="' + (row.pctCerts || 0) + '" id="vobj-pctC-' + suf + '"> %</div></div>' +
             '<div class="obj-row"><span class="obj-label">Unidades:</span> ' +
             '<div><span class="view-mode obj-val">' + row.certs + '</span>' +
             '<input type="number" class="obj-input edit-mode hidden" value="' + row.certs + '" id="vobj-certs-' + suf + '"></div></div>' +
             '<div class="obj-row"><span class="obj-label">Facturación:</span> ' +
             '<div><span class="view-mode obj-val">' + factC + '</span>' +
             '<input type="text" class="obj-input edit-mode hidden" value="' + factCEdit + '" id="vobj-factC-' + suf + '" onkeyup="formatoMoneda(this); calcObjMetaObjetivosVendedor(this, \'vobj-mensC-' + suf + '\'); actualizarVobjMetaTotalRow(' + rg + ')"></div></div>' +
             '<div class="obj-row edit-mode hidden"><span class="obj-label" title="Mientras editás, acá se ve el mismo importe formateado en pesos (ARS), para confirmar el valor sin leer el texto crudo del campo.">Vista previa:</span> <span class="obj-val" style="color:var(--accent)" id="vobj-mensC-' + suf + '">' + factC + '</span></div>' +
             '</div></div></div>';
       });
       html += '</div>';
       cont.innerHTML = html;
    }

    function actualizarVobjMetaTotalRow(rango) {
       var suf = 'r' + rango;
       var el = document.getElementById('vobj-meta-total-' + suf);
       if (!el) return;
       var fb = document.getElementById('vobj-factB-' + suf);
       var fc = document.getElementById('vobj-factC-' + suf);
       var sum = parseCurrency(fb ? fb.value : '0') + parseCurrency(fc ? fc.value : '0');
       el.textContent = formatNumberAr(sum);
    }

    function esEdicionObjetivosVendedorActiva() {
       var btn = document.getElementById('btnVobjEdit');
       return !!(btn && btn.innerHTML.indexOf('Guardar') >= 0);
    }

    function actualizarEstadoChkVobjRangoMin() {
       var chk = document.getElementById('chkVobjRangoMin');
       if (!chk) return;
       chk.disabled = !esEdicionObjetivosVendedorActiva();
    }

    function onChkVobjRangoMinChange() {
       var nom = window.VENTAS_VENDEDOR_OBJETIVOS_NOMBRE;
       if (window.VENTAS_VOBJ_LAST_DATA && nom) {
          pintarGrillaObjetivosVendedor(window.VENTAS_VOBJ_LAST_DATA, nom);
       } else if (typeof refrescarPanelObjetivosVendedor === 'function') {
          refrescarPanelObjetivosVendedor();
       }
    }

    function refrescarPanelObjetivosVendedor() {
       var nom = window.VENTAS_VENDEDOR_OBJETIVOS_NOMBRE;
       var cont = document.getElementById('vobj-grid-container');
       if (!nom || !cont) return;
       var sm = document.getElementById('selVobjMes');
       var sa = document.getElementById('selVobjAnio');
       if (!sm || !sa) return;
       var mes = parseInt(sm.value, 10) || 1;
       var baseAnio = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
       var anio = parseInt(sa.value, 10) || baseAnio;
       cont.innerHTML = '<div class="card" style="padding:20px;color:#94a3b8;">Cargando objetivos...</div>';
       google.script.run.withSuccessHandler(function (res) {
          if (!document.getElementById('vobj-grid-container')) return;
          if (res && res.error) {
             document.getElementById('vobj-grid-container').innerHTML = '<div class="card" style="padding:16px;color:#ef4444;">' + (res.mensaje || 'Error') + '</div>';
             return;
          }
          window.VENTAS_VOBJ_LAST_DATA = dedupeObjetivosPorRango((res && res.data) ? res.data.slice() : []);
          var chk = document.getElementById('chkVobjRangoMin');
          if (chk) {
             chk.checked = window.VENTAS_VOBJ_LAST_DATA.some(function (r) { return Number(r.rango) === 0; });
          }
          pintarGrillaObjetivosVendedor(window.VENTAS_VOBJ_LAST_DATA, nom);
          actualizarEstadoChkVobjRangoMin();
       }).withFailureHandler(function () {
          var c = document.getElementById('vobj-grid-container');
          if (c) c.innerHTML = '<div class="card" style="padding:16px;color:#ef4444;">Error de conexión</div>';
       }).obtenerObjetivosBackend(anio, mes, nom);
    }

    function toggleEditModeObjetivosVendedor() {
       var root = document.getElementById('tab-objetivos');
       if (!root) return;
       var btn = document.getElementById('btnVobjEdit');
       var isEditing = btn && btn.innerHTML.indexOf('Guardar') >= 0;
       root.querySelectorAll('.view-mode').forEach(function (el) { el.classList.toggle('hidden'); });
       root.querySelectorAll('.edit-mode').forEach(function (el) {
          el.classList.toggle('hidden');
          el.classList.add('editable');
       });
       if (btn) {
          if (isEditing) {
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">edit</span> Editar objetivos';
             btn.setAttribute('onclick', 'toggleEditModeObjetivosVendedor()');
          } else {
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar objetivos';
             btn.setAttribute('onclick', 'guardarObjetivosVendedorVentas()');
          }
       }
       actualizarEstadoChkVobjRangoMin();
    }

    function guardarObjetivosVendedorVentas() {
       var nom = window.VENTAS_VENDEDOR_OBJETIVOS_NOMBRE;
       if (!nom || !puedeEditarObjetivosVentas(nom)) return;
       var sm = document.getElementById('selVobjMes');
       var sa = document.getElementById('selVobjAnio');
       if (!sm || !sa) return;
       var mes = parseInt(sm.value, 10) || 1;
       var baseAnio = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
       var anio = parseInt(sa.value, 10) || baseAnio;
       var chkMin = document.getElementById('chkVobjRangoMin');
       var incluirRangoMin = !chkMin || chkMin.checked;
       var filas = [];
       document.querySelectorAll('#vobj-grid-container .obj-card[data-rango]').forEach(function (card) {
          var r = parseInt(card.getAttribute('data-rango'), 10);
          if (!Number.isFinite(r)) return;
          if (r === 0 && !incluirRangoMin) return;
          var suf = 'r' + r;
          var elPctB = document.getElementById('vobj-pctB-' + suf);
          var elPctC = document.getElementById('vobj-pctC-' + suf);
          if (!elPctB && !elPctC) return;
          filas.push({
             rango: r,
             pctBotas: parseFloat(elPctB ? elPctB.value || '0' : '0'),
             pctCerts: parseFloat(elPctC ? elPctC.value || '0' : '0'),
             botas: document.getElementById('vobj-botas-' + suf) ? document.getElementById('vobj-botas-' + suf).value || '0' : '0',
             certs: document.getElementById('vobj-certs-' + suf) ? document.getElementById('vobj-certs-' + suf).value || '0' : '0',

    function esFechaVencida(fechaStr) {
       if (!fechaStr) return false;
       let partes = fechaStr.split('/');
       if (partes.length !== 3) return false;
       let fechaVto = new Date(partes[2], partes[1] - 1, partes[0]);
       let hoy = new Date();
       hoy.setHours(0, 0, 0, 0);
       return fechaVto < hoy;
    }

    function formatearMontoComisionesVendedor(valor) {
       var n = Number(valor) || 0;
       if (typeof formatNumberAr === 'function') return formatNumberAr(n);
       return new Intl.NumberFormat('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
    }

    function formatearPorcentajeComisionesVendedor(valor) {
       var n = Number(valor) || 0;
       return n.toFixed(1) + '%';
    }

    function formatearDeltaComisionesVendedor(actual, previo) {
       var a = Number(actual) || 0;
       var p = Number(previo) || 0;
       if (!p) {
          if (!a) return '0%';
          return '+100%';
       }
       var delta = ((a - p) / p) * 100;
       var prefijo = delta > 0 ? '+' : '';
       return prefijo + delta.toFixed(1) + '%';
    }

    function textoRangoComisionesVendedor(rango) {
       if (typeof textoRangoComisionesUi === 'function') return textoRangoComisionesUi(rango);
       if (rango === 0 || rango === '0') return 'MIN';
       if (rango == null) return '-';
       var n = Number(rango);
       if (!Number.isFinite(n)) return '-';
       return n > 0 ? 'R' + n : '-';
    }

    function textoRangoCompletoComisionesVendedor(rango) {
       if (rango === 0 || rango === '0') return 'RANGO MÍNIMO';
       if (rango == null || rango === '' || !Number.isFinite(Number(rango))) return '-';
       return 'RANGO ' + Number(rango);
    }

    function formatearFechaComisionesVendedor(valor) {
       if (!valor) return '-';
       var fecha = valor instanceof Date ? valor : new Date(valor);
       if (isNaN(fecha.getTime()) && typeof parseFecha === 'function') {
          try { fecha = parseFecha(valor); } catch (_) { }
       }
       if (!fecha || isNaN(fecha.getTime())) return escapeHtmlText(valor);
       var dd = String(fecha.getDate()).padStart(2, '0');
       var mm = String(fecha.getMonth() + 1).padStart(2, '0');
       var yyyy = fecha.getFullYear();
       return dd + '/' + mm + '/' + yyyy;
    }

    function extraerDeltaNumerica(textoDelta) {

    function construirGraficoComisionesMensual(historico, focoMonthIndex) {
       var meses = Array.isArray(historico) ? historico : [];
       if (!meses.length) {
          return '<div class="comisiones-chart-empty">No hay meses para graficar.</div>';
       }
       var width = 900;
       var height = 280;
       var padLeft = 28;
       var padRight = 18;
       var padTop = 20;
       var padBottom = 42;
       var plotWidth = width - padLeft - padRight;
       var plotHeight = height - padTop - padBottom;
       var maxValor = 0;
       meses.forEach(function (mes) {
          maxValor = Math.max(maxValor, Number(mes.totalFacturado) || 0, Number(mes.totalComision) || 0);
       });
       if (maxValor <= 0) maxValor = 1;

       function xForIndex(index) {
          if (meses.length === 1) return padLeft + plotWidth / 2;
          return padLeft + (plotWidth / (meses.length - 1)) * index;
       }
       function yForValue(valor) {
          return padTop + plotHeight - ((Number(valor) || 0) / maxValor) * plotHeight;
       }

       var factPoints = [];
       var comPoints = [];
       var labelsHtml = '';
       var pointsHtml = '';
       var gridHtml = '';

       for (var g = 0; g <= 4; g++) {
          var gy = padTop + (plotHeight / 4) * g;
          gridHtml += '<line x1="' + padLeft + '" y1="' + gy + '" x2="' + (width - padRight) + '" y2="' + gy + '" class="comisiones-chart-gridline"></line>';
       }

       meses.forEach(function (mes, idx) {
          var x = xForIndex(idx);
          var fact = Number(mes.totalFacturado) || 0;
          var com = Number(mes.totalComision) || 0;
          var yFact = yForValue(fact);
          var yCom = yForValue(com);
          factPoints.push(x + ',' + yFact);
          comPoints.push(x + ',' + yCom);

          var activeCls = mes.monthIndex === focoMonthIndex ? ' comisiones-chart-label--active' : '';
          labelsHtml += '<div class="comisiones-chart-xlabel' + activeCls + '" style="left:' + (((x - padLeft) / plotWidth) * 100) + '%;">' + escapeHtmlText((mes.nombreMes || '').substring(0, 3)) + '</div>';

          pointsHtml += '<circle cx="' + x + '" cy="' + yFact + '" r="' + (mes.monthIndex === focoMonthIndex ? 5 : 4) + '" class="comisiones-chart-point comisiones-chart-point--fact"><title>' + escapeHtmlText((mes.nombreMes || '-') + ' | Facturación: ' + formatearMontoComisionesVendedor(fact)) + '</title></circle>';
          pointsHtml += '<circle cx="' + x + '" cy="' + yCom + '" r="' + (mes.monthIndex === focoMonthIndex ? 5 : 4) + '" class="comisiones-chart-point comisiones-chart-point--comision"><title>' + escapeHtmlText((mes.nombreMes || '-') + ' | Comisión: ' + formatearMontoComisionesVendedor(com)) + '</title></circle>';
       });

       var html = '<div class="comisiones-chart-shell">';
       html += '<div class="comisiones-chart-legend">';
       html += '<span class="comisiones-chart-legend-item"><span class="comisiones-chart-legend-swatch comisiones-chart-legend-swatch--fact"></span>Facturación</span>';
       html += '<span class="comisiones-chart-legend-item"><span class="comisiones-chart-legend-swatch comisiones-chart-legend-swatch--comision"></span>Comisión</span>';
       html += '</div>';
       html += '<div class="comisiones-line-chart-wrap">';
       html += '<svg class="comisiones-line-chart" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">';
       html += gridHtml;
       html += '<polyline class="comisiones-line-chart-path comisiones-line-chart-path--fact" points="' + factPoints.join(' ') + '"></polyline>';
       html += '<polyline class="comisiones-line-chart-path comisiones-line-chart-path--comision" points="' + comPoints.join(' ') + '"></polyline>';
       html += pointsHtml;
       html += '</svg>';
       html += '<div class="comisiones-chart-xlabels">' + labelsHtml + '</div>';
       html += '</div></div>';
       return html;
    }

    function obtenerPeriodoResumenComisiones() {

    function filtrarHistoricoGraficosComisiones(historico) {
       var meses = Array.isArray(historico) ? historico.slice() : [];
       var anioBase = COMISIONES_VENDEDOR_ESTADO && Number(COMISIONES_VENDEDOR_ESTADO.anioBase);
       var now = new Date();
       if (anioBase === now.getFullYear()) {
          meses = meses.filter(function (mes) {
             return Number(mes.monthIndex) <= now.getMonth();
          });
       }
       return meses;
    }

    function onScrollGraficoComisiones(el) {

       var group = el.getAttribute('data-scroll-group') || 'comisiones';
       var peers = document.querySelectorAll('.comisiones-line-chart-scroll[data-scroll-group="' + group + '"]');

    function inicializarScrollGraficosComisiones() {

    function construirGraficoLineaComisiones(historico, focoMonthIndex, chartKey, titulo, chartType) {
       var meses = filtrarHistoricoGraficosComisiones(historico);
       if (!meses.length) {
          return '<div class="dash-chart-card comisiones-split-chart-card"><div class="comisiones-split-chart-head"><div class="comisiones-chart-title">' + escapeHtmlText(titulo) + '</div></div><div class="comisiones-chart-empty">No hay meses para graficar.</div></div>';
       }
       var width = Math.max(560, 88 + (Math.max(meses.length - 1, 1) * 120));
       var height = 250;
       var padLeft = 28;
       var padRight = 18;
       var padTop = 18;
       var padBottom = 42;
       var plotWidth = width - padLeft - padRight;
       var plotHeight = height - padTop - padBottom;
       var maxValor = 0;
       meses.forEach(function (mes) {
          maxValor = Math.max(maxValor, Number(mes[chartKey]) || 0);
       });
       if (maxValor <= 0) maxValor = 1;

       function xForIndex(index) {
          if (meses.length === 1) return padLeft + plotWidth / 2;
          return padLeft + (plotWidth / (meses.length - 1)) * index;
       }
       function yForValue(valor) {
          return padTop + plotHeight - ((Number(valor) || 0) / maxValor) * plotHeight;
       }

       var points = [];
       var labelsHtml = '';

       meses.forEach(function (mes, idx) {
          var val = Number(mes[chartKey]) || 0;
          var x = xForIndex(idx);
          var y = yForValue(val);
          points.push(x + ',' + y);
          labelsHtml += '<div class="comisiones-chart-xlabel' + (mes.monthIndex === focoMonthIndex ? ' comisiones-chart-label--active' : '') + '" style="left:' + (((x - padLeft) / plotWidth) * 100) + '%;">' + escapeHtmlText((mes.nombreMes || '').substring(0, 3)) + '</div>';
       });

       var html = '<div class="dash-chart-card comisiones-split-chart-card">';
       html += '<div class="comisiones-split-chart-head">';
       html += '<div class="comisiones-chart-title">' + escapeHtmlText(titulo) + '</div>';
       html += '</div>';
       html += '<div class="comisiones-line-chart-scroll" data-scroll-group="comisiones" onscroll="onScrollGraficoComisiones(this)">';
       html += '<div class="comisiones-line-chart-wrap comisiones-line-chart-wrap--split" style="width:' + width + 'px;">';
       html += '<svg class="comisiones-line-chart" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">';
       html += '<polyline class="comisiones-line-chart-path comisiones-line-chart-path--' + chartType + '" points="' + points.join(' ') + '"></polyline>';
       html += '</svg>';
       html += '<div class="comisiones-chart-xlabels">' + labelsHtml + '</div>';
       html += '</div></div></div>';
       return html;
    }

    function refrescarPanelComisionesVendedor(forceReload) {
       var resumenEl = document.getElementById('comisionesVendedorResumen');
       if (!resumenEl) return;
       var vendedor = COMISIONES_VENDEDOR_ESTADO && COMISIONES_VENDEDOR_ESTADO.vendedor
          ? COMISIONES_VENDEDOR_ESTADO.vendedor
          : (typeof VENTAS_VENDEDOR_OBJETIVOS_NOMBRE !== 'undefined' ? VENTAS_VENDEDOR_OBJETIVOS_NOMBRE : '');
       if (!vendedor) return;

       var filtros = obtenerFiltrosComisionesVendedor();
       var cacheKey = [vendedor, filtros.anio, filtros.periodo].join('|');
       COMISIONES_VENDEDOR_ESTADO.vendedor = vendedor;
       COMISIONES_VENDEDOR_ESTADO.requestKey = cacheKey;

       if (!forceReload && COMISIONES_VENDEDOR_CACHE[cacheKey]) {
          renderComisionesVendedor(COMISIONES_VENDEDOR_CACHE[cacheKey]);
          return;
       }

       renderLoadingComisionesVendedor();
       google.script.run
          .withSuccessHandler(function (res) {
             if (!COMISIONES_VENDEDOR_ESTADO || COMISIONES_VENDEDOR_ESTADO.requestKey !== cacheKey) return;
             if (!res || res.error) {
                renderErrorComisionesVendedor(res && res.mensaje ? res.mensaje : 'Respuesta inválida del servidor.');
                return;
             }
             COMISIONES_VENDEDOR_CACHE[cacheKey] = res.data || {};
             renderComisionesVendedor(COMISIONES_VENDEDOR_CACHE[cacheKey]);
          })
          .withFailureHandler(function (err) {
             if (!COMISIONES_VENDEDOR_ESTADO || COMISIONES_VENDEDOR_ESTADO.requestKey !== cacheKey) return;
             renderErrorComisionesVendedor(err && err.message ? err.message : 'Error de conexión');
          })
          .obtenerComisionesVendedor(vendedor, filtros.anio, filtros.mes, filtros.trimestre);
    }

    // --- LOGICA MATRIZ (REUTILIZADA) ---
    /** Facturación ARS por mes: botas (grupo) + certificaciones (grupo), para umbral de rango combinado. */
    function calcTotalesBotasCertsPorMes(filas, anioResumen) {
       const MESES = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
       var anioObj = parseInt(anioResumen, 10);
       if (!Number.isFinite(anioObj)) anioObj = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
       var out = {};
       MESES.forEach(function (m, idx) { out[m] = { botas: 0, certs: 0, total: 0, mesIndex: idx }; });
       const GRUPO_BOTAS_ITEMS = ['BOTAS', 'INDU - ACCE', 'REPUESTOS'];
       const GRUPO_CERTS_ITEMS = ['CURSOS', 'TALLERES', 'EVENTOS', 'TORNEOS'];
       (filas || []).forEach(function (f) {
          if (!f || !f[0]) return;
          var fecha = parseFecha(f[0]);
          var concepto = (f[5] || '').toUpperCase();
          var enBotas = GRUPO_BOTAS_ITEMS.some(function (item) { return concepto.includes(item); });
          var enCerts = GRUPO_CERTS_ITEMS.some(function (item) { return concepto.includes(item); });
          if (!enBotas && !enCerts) return;
          var mesNombre = MESES[fecha.getMonth()];
          if (!out[mesNombre]) return;
          var paisRaw = (f[3] || '').toUpperCase();
          var paisKey = paisRaw;
          if (paisRaw === 'USA' || paisRaw === 'EEUU') paisKey = 'EEUU';
          var montoConIva = parseNumeric(f[9]);
          var cotizacionGuardada = 1;
          if (f[12] != null && f[12] !== '') cotizacionGuardada = parseNumeric(f[12]);
          else cotizacionGuardada = COTIZACIONES[paisKey] || 1;
          var montoArs = montoConIva;
          if (paisKey !== 'ARGENTINA') montoArs = montoConIva * cotizacionGuardada;
          if (enBotas) out[mesNombre].botas += montoArs;
          if (enCerts) out[mesNombre].certs += montoArs;
       });
       MESES.forEach(function (m) {
          out[m].total = out[m].botas + out[m].certs;
       });
       return out;
    }

    function obtenerObjetivosPorVendedorMes(anio, mesNum, nombreVendedor) {
       var ai = parseInt(anio, 10);
       var mn = parseInt(mesNum, 10);
       if (!Number.isFinite(ai) || !Number.isFinite(mn)) return [];
       var vendedorKey = (nombreVendedor || '').toString().trim().toUpperCase();

       function lista(an, mm) {
          var personalizados = ALL_OBJECTIVES
             .filter(function (o) {
                return o && Number.isFinite(Number(o.rango)) && parseInt(o.anio, 10) === an && parseInt(o.mes, 10) === mm &&
                   (o.vendedor || '').toString().trim().toUpperCase() === vendedorKey;
             })
             .sort(function (a, b) { return (a.rango || 0) - (b.rango || 0); });
          if (personalizados.length > 0) return personalizados;
          return ALL_OBJECTIVES
             .filter(function (o) {
                return o && Number.isFinite(Number(o.rango)) && parseInt(o.anio, 10) === an && parseInt(o.mes, 10) === mm &&
                   (!o.vendedor || o.vendedor.toString().trim() === '');
             })
             .sort(function (a, b) { return (a.rango || 0) - (b.rango || 0); });
       }

       var L = lista(ai, mn);
       if (L.length === 0) {
          var pm = mn - 1;
          var py = ai;
          if (pm < 1) {
             pm = 12;
             py -= 1;
          }
          L = lista(py, pm);
       }
       return L;
    }

    /**
     * Avance ARS vs lista de rangos (misma lógica que resumen/objetivos).
     * `objsTrim` debe estar ordenada por rango; puede venir del backend o de ALL_OBJECTIVES.
     */
    function aplicarProgresoSobreListaObjetivos(totalCombinado, objsTrim, nombreMes) {
       var lista = Array.isArray(objsTrim) ? objsTrim : [];
       var rangoAlcanzadoNum = null;
       var targetObj = null;
       var i;
       for (i = lista.length - 1; i >= 0; i--) {
          var o = lista[i];
          var metaComb = (Number(o.factBotas) || 0) + (Number(o.factCerts) || 0);
          if (totalCombinado >= metaComb && metaComb > 0) {
             rangoAlcanzadoNum = o.rango;
             targetObj = o;
             break;
          }
       }
       if (targetObj == null && lista.length > 0) {
          targetObj = lista[0];
       }
       var metaCombinada = 0;
       if (targetObj) {
          metaCombinada = (Number(targetObj.factBotas) || 0) + (Number(targetObj.factCerts) || 0);
       }
       var pct = 0;
       if (metaCombinada > 0) {
          pct = Math.min(100, (totalCombinado / metaCombinada) * 100);
       }
       var rangoLabel = '-';
       if (rangoAlcanzadoNum !== null && rangoAlcanzadoNum !== undefined) {
          rangoLabel = rangoAlcanzadoNum === 0 ? 'MÍNIMO' : ('RANGO ' + rangoAlcanzadoNum);
       }
       var sinObjetivos = lista.length === 0;
       return {
          totalCombinado: totalCombinado,
          metaCombinada: metaCombinada,
          pct: pct,
          rangoLabel: rangoLabel,
          sinObjetivos: sinObjetivos,
          mesNombre: nombreMes || ''
       };
    }

    /**
     * Progreso para un mes calendario usando caché ALL_OBJECTIVES + historial (p. ej. resúmenes).
     */
    function calcularProgresoObjetivoMes(filas, anio, mesNum, nombreVendedor) {
       var MESES = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
       var mn = parseInt(mesNum, 10);
       var ai = parseInt(anio, 10);
       if (!Number.isFinite(mn) || mn < 1 || mn > 12) {
          return { totalCombinado: 0, metaCombinada: 0, pct: 0, rangoLabel: '-', sinObjetivos: true, mesNombre: '' };
       }
       if (!Number.isFinite(ai)) ai = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
       var nombreMes = MESES[mn - 1];
       var comboPorMes = calcTotalesBotasCertsPorMes(filas || [], ai);
       var combo = comboPorMes[nombreMes] || { botas: 0, certs: 0, total: 0 };
       var totalCombinado = combo.total != null ? combo.total : (combo.botas + combo.certs);
       var objsTrim = obtenerObjetivosPorVendedorMes(ai, mn, nombreVendedor);
       return aplicarProgresoSobreListaObjetivos(totalCombinado, objsTrim, nombreMes);
    }

    function generarMatrizResumenCompleja(filas, tipoGrupo, nombreVendedor, anioResumen, totalesComboPorMes) {
       const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
       var anioObj = parseInt(anioResumen, 10);
       if (!Number.isFinite(anioObj)) anioObj = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
       var comboPorMes = totalesComboPorMes;
       if (!comboPorMes) comboPorMes = calcTotalesBotasCertsPorMes(filas, anioObj);
       const PAISES_STRUCT = [
          { key: 'ARGENTINA' }, { key: 'CHILE' }, { key: 'MEXICO' }, { key: 'ESPAÑA' },
          { key: 'BRASIL' }, { key: 'URUGUAY' }, { key: 'RDM' }, { key: 'EEUU' }
       ];
       let matriz = {};
       MESES.forEach((m, idx) => {
          matriz[m] = { total: 0, totalSinIva: 0, cantidad: 0, mesIndex: idx };
          PAISES_STRUCT.forEach(p => { matriz[m][p.key] = { original: 0, ars: 0 }; });
       });
       const GRUPO_BOTAS_ITEMS = ['BOTAS', 'INDU - ACCE', 'REPUESTOS'];
       const GRUPO_CERTS_ITEMS = ['CURSOS', 'TALLERES', 'EVENTOS', 'TORNEOS'];
 
       filas.forEach(f => {
          let fecha = parseFecha(f[0]);
          let concepto = (f[5] || "").toUpperCase();
          let entraEnGrupo = false;
          if (tipoGrupo === 'GRUPO_BOTAS') entraEnGrupo = GRUPO_BOTAS_ITEMS.some(item => concepto.includes(item));
          else if (tipoGrupo === 'GRUPO_CERTS') entraEnGrupo = GRUPO_CERTS_ITEMS.some(item => concepto.includes(item));
 
          if (entraEnGrupo) {
             let mesNombre = MESES[fecha.getMonth()];
             let paisRaw = (f[3] || "").toUpperCase();
             let paisKey = paisRaw;
             if (paisRaw === 'USA' || paisRaw === 'EEUU') paisKey = 'EEUU';
 
             // Total con IVA (columna 9) y sin IVA (columna 10) - vienen de API/DB con punto decimal
             let montoConIva = parseNumeric(f[9]);
             let montoSinIva = parseNumeric(f[10]);
             let cotizacionGuardada = 1;

             // Cotización: API/DB usa punto decimal (1.520919). parseCurrency corrompe esos valores
             if (f[12] != null && f[12] !== '') {
                cotizacionGuardada = parseNumeric(f[12]);
             } else {
                cotizacionGuardada = COTIZACIONES[paisKey] || 1;
             }
 
             let montoArs = montoConIva;
             if (paisKey !== 'ARGENTINA') montoArs = montoConIva * cotizacionGuardada;
 
             let montoArsSinIva = montoSinIva;
             if (paisKey !== 'ARGENTINA') montoArsSinIva = montoSinIva * cotizacionGuardada;
 
             if (matriz[mesNombre] && matriz[mesNombre][paisKey]) {
                matriz[mesNombre][paisKey].original += montoConIva;
                matriz[mesNombre][paisKey].ars += montoArs;
                matriz[mesNombre].total += montoArs;
                matriz[mesNombre].totalSinIva += montoArsSinIva;
 
                let sumarCantidad = false;
                if (tipoGrupo === 'GRUPO_BOTAS' && concepto.includes('BOTAS')) sumarCantidad = true;
                if (tipoGrupo === 'GRUPO_CERTS' && concepto.includes('CURSOS')) sumarCantidad = true;
                if (sumarCantidad) { let qty = parseInt(f[7]) || 0; matriz[mesNombre].cantidad += qty; }
             }
          }
       });
 
       for (let m in matriz) {
          let d = matriz[m];
          let mesCal = d.mesIndex + 1;

          let combo = comboPorMes[m] || { botas: 0, certs: 0, total: 0 };
          let totalCombinado = combo.total || (combo.botas + combo.certs);

          let rangoAlcanzadoNum = null;
          let pctRangoBotas = 0;
          let pctRangoCerts = 0;
          let targetObj = null;
          let objsTrim = obtenerObjetivosPorVendedorMes(anioObj, mesCal, nombreVendedor);

          for (let i = objsTrim.length - 1; i >= 0; i--) {
             let o = objsTrim[i];
             let metaComb = (Number(o.factBotas) || 0) + (Number(o.factCerts) || 0);
             if (totalCombinado >= metaComb && metaComb > 0) {
                rangoAlcanzadoNum = o.rango;
                pctRangoBotas = Number(o.pctBotas) || 0;
                pctRangoCerts = Number(o.pctCerts) || 0;
                targetObj = o;
                break;
             }
          }

          if (targetObj == null && objsTrim.length > 0) {
             targetObj = objsTrim[0];
             rangoAlcanzadoNum = null;
             pctRangoBotas = 0;
             pctRangoCerts = 0;
          }

          let metaCombinada = 0;
          if (targetObj) {
             metaCombinada = (Number(targetObj.factBotas) || 0) + (Number(targetObj.factCerts) || 0);
          }

          let cantidadObjetivo = (tipoGrupo === 'GRUPO_BOTAS') ? (targetObj ? targetObj.botas : 0) : (targetObj ? targetObj.certs : 0);
          let porcentajeLinea = tipoGrupo === 'GRUPO_BOTAS' ? pctRangoBotas : pctRangoCerts;

          let rangoLabel = '-';
          if (rangoAlcanzadoNum !== null && rangoAlcanzadoNum !== undefined) {
             rangoLabel = rangoAlcanzadoNum === 0 ? 'MÍNIMO' : ('RANGO ' + rangoAlcanzadoNum);
          }

          d.rangoLabel = rangoLabel;
          d.metaCombinada = metaCombinada;
          d.totalCombinado = totalCombinado;
          d.objetivo = metaCombinada;
          d.cantidadObjetivo = cantidadObjetivo;
          d.comision = d.total * (porcentajeLinea / 100);
          if (metaCombinada > 0) {
             let pctBar = (totalCombinado / metaCombinada) * 100;
             if (pctBar > 100) pctBar = 100;
             d.pct = pctBar;
          } else { d.pct = 0; }
       }
       return matriz;
    }
 
    function obtenerMonedaPais(pais) {
      if (typeof obtenerMonedaDefaultPorPaisUi === 'function') return obtenerMonedaDefaultPorPaisUi(pais);
      if (pais == 'CHILE') return 'CLP'; if (pais == 'MEXICO') return 'MXN'; if (pais == 'ESPAÑA') return 'EUR';
      if (pais == 'BRASIL') return 'BRL'; if (pais == 'URUGUAY') return 'UYU'; if (pais == 'RDM' || pais == 'EEUU') return 'USD';
      return 'ARS';
   }

   function obtenerMonedasPaisVenta(pais) {
      if (typeof obtenerMonedasPorPaisUi === 'function') return obtenerMonedasPorPaisUi(pais);
      return [obtenerMonedaPais(pais)];
   }

   function obtenerCotizacionActualVenta(pais, moneda) {
      var paisNormalizado = (pais || '').toString().toUpperCase();
      if (paisNormalizado === 'USA') paisNormalizado = 'EEUU';
      var paisCotKey = (paisNormalizado === 'ESPAÑA') ? 'ESPANA' : paisNormalizado;
      var monedaNorm = (moneda || '').toString().toUpperCase();
      if (!monedaNorm || monedaNorm === 'ARS') return 1;
      return Number(COTIZACIONES[monedaNorm] || COTIZACIONES[paisCotKey] || 0);
   }

   function actualizarIndicadorTipoCambioVenta() {
      var info = document.getElementById('ventaTipoCambioInfo');
      var paisInput = document.getElementById('paisInput');
      var monedaInput = document.getElementById('monedaInput');
      if (!info || !paisInput || !monedaInput) return;

      var pais = (paisInput.value || '').toString().trim();
      var moneda = (monedaInput.value || '').toString().trim().toUpperCase();

      if (!pais) {
         info.textContent = 'TIPO DE CAMBIO OFICIAL: SELECCIONÁ PAÍS Y MONEDA';
         info.classList.remove('is-warning');
         return;
      }

      if (!moneda || moneda === 'ARS') {
         info.textContent = 'TIPO DE CAMBIO OFICIAL: NO REQUIERE CONVERSIÓN';
         info.classList.remove('is-warning');
         return;
      }

      var cotizacion = obtenerCotizacionActualVenta(pais, moneda);
      if (!cotizacion || cotizacion <= 0) {
         info.textContent = 'TIPO DE CAMBIO OFICIAL: NO DISPONIBLE';
         info.classList.add('is-warning');
         return;
      }

      info.classList.remove('is-warning');
      info.textContent = 'TIPO DE CAMBIO OFICIAL: 1 ' + moneda + ' = ' + formatCurrency(cotizacion, 'ARS');
   }

   function actualizarSelectorMonedaVenta(monedaSeleccionada) {
      var paisInput = document.getElementById('paisInput');
      var monedaInput = document.getElementById('monedaInput');
      if (!paisInput || !monedaInput) return;
      var pais = (paisInput.value || '').toString().trim();
      var opciones = obtenerMonedasPaisVenta(pais);
      var seleccion = (monedaSeleccionada || monedaInput.value || obtenerMonedaPais(pais)).toString().toUpperCase();
      monedaInput.innerHTML = '';
      opciones.forEach(function (codigo) {
         var opt = document.createElement('option');
         opt.value = codigo;
         opt.textContent = codigo;
         monedaInput.appendChild(opt);
      });
      if (opciones.indexOf(seleccion) >= 0) monedaInput.value = seleccion;
      else monedaInput.value = opciones[0] || obtenerMonedaPais(pais);
      actualizarIndicadorTipoCambioVenta();
      calcularTotal();
    }

    // --- MODALS ---
    function esVendedorValido(nombre) {
       var invalidos = ['TODAS', 'TODOS', 'HOME', 'MENU_VENTAS', 'MENU_ADMIN', 'MENU_STOCK', 'CLIENTES', 'CONSOLIDADO', 'GESTION_USUARIOS', 'CAJA', 'STOCK', 'CAMBIAR_TRIMESTRE', 'CONFIGURACION_VENTAS'];
       var n = (nombre || '').toString().trim().toUpperCase();
       if (!n) return false;
       if (invalidos.indexOf(n) >= 0) return false;
       if (n === '%') return false;
       if (n.indexOf('OBJETIVOS') === 0) return false;
       return true;
    }
    function vendedorParaGuardar(nombre, selVendedor) {
       if (esVendedorValido(nombre)) return nombre;
       if (selVendedor && selVendedor.options && selVendedor.options[0]) return selVendedor.options[0].value;
       return 'Adrian';
    }
    function poblarSelectVendedoresVenta(vendedorSugerido, incluirInactivoActual, onDone) {
       var sel = document.getElementById('selVendedor');
       var sugerido = (vendedorSugerido || '').toString().trim();
       if (!sel) {
          if (typeof onDone === 'function') onDone(sugerido || '');
          return;
       }

       google.script.run.withSuccessHandler(function (res) {
          var activos = Array.isArray(res && res.activos) ? res.activos : [];
          var inactivos = Array.isArray(res && res.inactivos) ? res.inactivos : [];

          activos.sort(function (a, b) { return (a.nombre || '').localeCompare((b.nombre || '')); });
          inactivos.sort(function (a, b) { return (a.nombre || '').localeCompare((b.nombre || '')); });

          sel.innerHTML = '';
          activos.forEach(function (v) {
             var opt = document.createElement('option');
             opt.value = (v && v.nombre ? v.nombre : '').toString();
             opt.textContent = opt.value;
             sel.appendChild(opt);
          });

          if (incluirInactivoActual && sugerido) {
             var existeEnActivos = activos.some(function (v) {
                return ((v && v.nombre) || '').toString().trim().toUpperCase() === sugerido.toUpperCase();
             });
             if (!existeEnActivos) {
                var inactivoMatch = inactivos.find(function (v) {
                   return ((v && v.nombre) || '').toString().trim().toUpperCase() === sugerido.toUpperCase();
                });
                if (inactivoMatch) {
                   var optInactivo = document.createElement('option');
                   optInactivo.value = inactivoMatch.nombre;
                   optInactivo.textContent = inactivoMatch.nombre + ' (inactivo)';
                   sel.appendChild(optInactivo);
                }
             }
          }

          if (!sel.options.length) {
             var empty = document.createElement('option');
             empty.value = '';
             empty.textContent = 'Sin vendedores activos';
             sel.appendChild(empty);
          }

          if (sugerido) sel.value = sugerido;
          if (!sel.value && sel.options.length) sel.selectedIndex = 0;

          if (typeof onDone === 'function') onDone(sel.value || '');
       }).withFailureHandler(function () {
          if (sugerido) sel.value = sugerido;
          if (typeof onDone === 'function') onDone(sel.value || sugerido || '');
       }).obtenerListaVendedores();
    }
    function abrirModalVenta() {
       var raw = HOJA_ACTUAL || (USUARIO_ACTUAL && USUARIO_ACTUAL.hoja) || 'Adrian';
       var vendedorNombre = esVendedorValido(raw) ? raw : 'Adrian';
       abrirModal('crear', null, null, vendedorNombre);
    }
    function abrirModal(modo, datos, id, vendedorNombre) {
       document.getElementById('formVenta').reset(); document.getElementById('filaIndex').value = '';
       var vendedorBase = vendedorNombre || HOJA_ACTUAL || (USUARIO_ACTUAL && USUARIO_ACTUAL.hoja);
       var vendedorSugerido = esVendedorValido(vendedorBase) ? vendedorBase : '';
       var grupoVendedor = document.getElementById('grupoVendedor');
       if (grupoVendedor) {
          var r = (USUARIO_ACTUAL && (typeof getRolEfectivo === 'function' ? getRolEfectivo() : USUARIO_ACTUAL.rol) || '').toString().toUpperCase();
          grupoVendedor.style.display = (r === 'ADMIN' || r === 'ROOT') ? 'block' : 'none';
       }
       let title = document.getElementById('modalTitle'); let btn = document.getElementById('btnGuardar');

       poblarSelectVendedoresVenta(vendedorSugerido, modo === 'editar', function (vendedorFinal) {
          let vendedorParaClientes = '';
          if (USUARIO_ACTUAL) {
             var rolEff = (typeof getRolEfectivo === 'function') ? getRolEfectivo() : USUARIO_ACTUAL.rol;
             var hojaEff = (typeof getHojaEfectiva === 'function') ? getHojaEfectiva() : USUARIO_ACTUAL.hoja;
             if (rolEff === 'VENDEDOR') {
                vendedorParaClientes = hojaEff;
             } else if (rolEff === 'ADMIN' || rolEff === 'ROOT') {
                vendedorParaClientes = vendedorFinal;
             }
          }

          var pagoValorEdit = (modo === 'editar' && datos && datos[6] !== undefined) ? datos[6] : null;
          poblarSelectFormasPagoVenta('pagoInput', pagoValorEdit, function () {
             if (modo === 'editar') {
                title.innerText = "EDITAR"; btn.innerText = "ACTUALIZAR"; document.getElementById('filaIndex').value = id;
                let f = datos[0].split('/'); document.getElementById('fechaInput').value = `${f[2]}-${f[1]}-${f[0]}`;
                document.getElementById('estadoInput').value = datos[1]; document.getElementById('paisInput').value = datos[3];
                actualizarSelectorMonedaVenta(datos[13] || obtenerMonedaPais(datos[3]));
                document.getElementById('clienteInput').value = datos[4];
                var clienteCombo = document.getElementById('clienteComboText');
                if (clienteCombo) clienteCombo.value = datos[4];
                document.getElementById('conceptoInput').value = datos[5];
                document.getElementById('cantInput').value = datos[7];
                let precioRaw = datos[8].toString().replace(/[$.]/g, '').replace(',', '.');
                document.getElementById('precioInput').value = formatNumberAr(precioRaw).replace('ARS', '').trim();
                if (datos[11]) document.getElementById('obsInput').value = datos[11];
                calcularTotal();
                actualizarIndicadorTipoCambioVenta();
                if (vendedorParaClientes) {
                   setTimeout(() => actualizarSelectorClientes(vendedorParaClientes), 100);
                }
             } else {
                title.innerText = "AGREGAR VENTA";
                btn.innerText = "GUARDAR";
                if (typeof getFechaHoyISO === 'function') document.getElementById('fechaInput').value = getFechaHoyISO();
                actualizarSelectorMonedaVenta();
                actualizarIndicadorTipoCambioVenta();
                if (vendedorParaClientes) {
                   setTimeout(() => actualizarSelectorClientes(vendedorParaClientes), 100);
                }
             }
             document.getElementById('modalVenta').classList.add('open');
          });
       });
    }

    function enviarVenta(e) {
       e.preventDefault();
 
       let btn = document.getElementById('btnGuardar');
       if (!btn) return;
 
       btn.disabled = true;
       btn.innerText = "Guardando...";
 
       // Obtener valores del formulario
       let fechaInput = document.getElementById('fechaInput');
       let paisInput = document.getElementById('paisInput');
       let estadoInput = document.getElementById('estadoInput');
       let clienteInput = document.getElementById('clienteInput');
       let conceptoInput = document.getElementById('conceptoInput');
       let pagoInput = document.getElementById('pagoInput');
       let cantInput = document.getElementById('cantInput');
       let precioInput = document.getElementById('precioInput');
       let obsInput = document.getElementById('obsInput');
       let filaIndexInput = document.getElementById('filaIndex');
       let selVendedor = document.getElementById('selVendedor');
       let monedaInput = document.getElementById('monedaInput');
 
       // Validación de campos requeridos y numéricos
       if (typeof validarCampos === 'function') {
          var err = validarCampos([
             { id: 'fechaInput', nombre: 'Fecha', requerido: true, mensaje: 'Selecciona la fecha.' },
             { id: 'paisInput', nombre: 'País', requerido: true, mensaje: 'Selecciona el país.' },
             { id: 'clienteInput', nombre: 'Cliente', requerido: true, mensaje: 'Selecciona el cliente.' },
             { id: 'conceptoInput', nombre: 'Concepto', requerido: true, mensaje: 'Selecciona el concepto.' },
             { id: 'cantInput', nombre: 'Cantidad', requerido: true, min: 0.01, mensaje: 'La cantidad debe ser mayor que 0.' },
             { id: 'precioInput', nombre: 'Precio', requerido: true, min: 0, mensaje: 'El precio no puede ser negativo.' },
             { id: 'pagoInput', nombre: 'Forma de pago', requerido: true, mensaje: 'Selecciona la forma de pago.' }
          ]);
          if (err) {
             mostrarAlerta(err);
             btn.disabled = false;
             btn.innerText = "Guardar Venta";
             return;
          }
       } else if (!fechaInput.value || !paisInput.value || !clienteInput.value || !conceptoInput.value || !cantInput.value || !precioInput.value) {
          mostrarAlerta('Por favor completa todos los campos requeridos.');
          btn.disabled = false;
          btn.innerText = "Guardar Venta";
          return;
       }
 
       // Obtener vendedor (nunca enviar 'TODAS' ni valores inválidos)
       let vendedorRaw = '';
       if (selVendedor && selVendedor.value) {
          vendedorRaw = selVendedor.value;
       } else if (USUARIO_ACTUAL && USUARIO_ACTUAL.hoja) {
          vendedorRaw = USUARIO_ACTUAL.hoja;
       } else if (HOJA_ACTUAL) {
          vendedorRaw = HOJA_ACTUAL;
       }
       let vendedorVal = vendedorParaGuardar(vendedorRaw, selVendedor);
 
       // Procesar precio
       let precioLimpio = parseCurrency(precioInput.value);
 
       // Procesar país
       let pais = paisInput.value.toUpperCase();
       if (pais === 'USA') pais = 'EEUU';
       // Clave para buscar cotización (backend guarda España como ESPANA)
       let moneda = monedaInput && monedaInput.value ? monedaInput.value.toUpperCase() : obtenerMonedaPais(pais);
       let cotizacionActual = obtenerCotizacionActualVenta(pais, moneda) || 1;
 
       // Preparar datos
       let datos = {
          vendedor: vendedorVal,
          fecha: fechaInput.value,
          pais: paisInput.value,
          estado: estadoInput.value,
          cliente: clienteInput.value,
          concepto: conceptoInput.value,
          formaPago: pagoInput.value,
          cantidad: cantInput.value,
          precio: precioLimpio,
          monedaCodigo: moneda,
          comentario: obsInput.value || '',
          filaIndex: filaIndexInput.value || '',
          cotizacion: cotizacionActual,
          cotizacionMoneda: cotizacionActual
       };
 
       // Determinar si es edición o creación
       let esEdicion = datos.filaIndex && datos.filaIndex !== '';
       let funcionBackend = esEdicion ? 'editarVenta' : 'guardarVenta';
 
       // Enviar al backend
       google.script.run
          .withSuccessHandler(function (res) {
             btn.disabled = false;
             btn.innerText = esEdicion ? "ACTUALIZAR" : "Guardar Venta";
 
             if (res && res.error) {
                alert('Error: ' + (res.mensaje || 'Error desconocido'));
             } else {
                if (typeof mostrarToast === 'function') mostrarToast(res && res.mensaje ? res.mensaje : (esEdicion ? 'Venta actualizada correctamente' : 'Venta guardada correctamente'));
                cerrarModals();
                // Solo resetear formulario si es una creación (no edición)
                if (!esEdicion) {
                   document.getElementById('formVenta').reset();
                   document.getElementById('filaIndex').value = '';
                   DATOS_FORMULARIO_VENTA = null; // Limpiar datos guardados
                }
                if (HOJA_ACTUAL) {
                   if (typeof VENTAS_CACHE !== 'undefined') {
                      VENTAS_CACHE.vendedor = '';
                      VENTAS_CACHE.data = null;
                      VENTAS_CACHE.ts = 0;
                   }
                   cargar(HOJA_ACTUAL);
                }
             }
          })
          .withFailureHandler(function (error) {
             console.error('Error en guardar venta:', error);
             btn.disabled = false;
             btn.innerText = esEdicion ? "ACTUALIZAR" : "Guardar Venta";
             alert('Error al guardar: ' + error.toString());
          })[funcionBackend](datos);
    }
 
    function clickEditar(id, vendedorNombre, ...d) { abrirModal('editar', d, id, vendedorNombre); }
    function clickBorrar(id, v) {
       abrirConfirmacion("¿Eliminar esta venta permanentemente?", () => {
          google.script.run
             .withSuccessHandler(() => {
                if (typeof VENTAS_CACHE !== 'undefined') {
                   VENTAS_CACHE.vendedor = '';
                   VENTAS_CACHE.data = null;
                   VENTAS_CACHE.ts = 0;
                }
                cargar(HOJA_ACTUAL);
             })
             .withFailureHandler(function () {
                mostrarAlerta('Error de conexión. Revisa tu red e intenta de nuevo.');
             })
             .borrarVenta({ vendedor: v, filaIndex: id });
       });
    }
    function toggleCheck(e, id, v) { e.disabled = true; google.script.run.withSuccessHandler(() => e.disabled = false).actualizarCheck({ vendedor: v, filaIndex: id, valor: e.checked ? 'SI' : 'NO' }); }

    function escapeHtmlAttr(s) {
       return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
    }

    function escapeHtmlText(s) {
       return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
    }

    /** Logo: URL propia, SVG Simple Icons, o icono Material. Imágenes remotas llevan data-fallback-icon por si 404. */
    function formaPagoCardLogoHtml(meta, nombre) {
       var fb = escapeHtmlAttr(formaPagoCardFallbackIcon(meta, nombre));
       var u = meta && meta.logoUrl;
       if (u) {
          return '<div class="formas-pago-card-logo" aria-hidden="true">' +
             '<img class="formas-pago-card-logo-img formas-pago-card-logo-img--brand" src="' + escapeHtmlAttr(u) +
             '" alt="" loading="lazy" data-fallback-icon="' + fb + '" /></div>';
       }
       var slug = meta && meta.logoSlug;
       if (slug) {
          var url = SIMPLE_ICONS_SVG_CDN + encodeURIComponent(slug) + '.svg';
          return '<div class="formas-pago-card-logo" aria-hidden="true">' +
             '<img class="formas-pago-card-logo-img formas-pago-card-logo-img--simpleicons" src="' + escapeHtmlAttr(url) +
             '" alt="" loading="lazy" data-fallback-icon="' + fb + '" /></div>';
       }
       var ic = formaPagoCardFallbackIcon(meta, nombre);
       return '<div class="formas-pago-card-logo formas-pago-card-logo--icon" aria-hidden="true">' +
          '<span class="material-symbols-outlined">' + ic + '</span></div>';
    }

    function renderConfiguracionVentas() {
       var titulo = '<div class="dash-section-title">CONFIGURACIÓN</div>';
      document.getElementById('app').innerHTML = titulo + '<div id="config-formas-pago-body" class="formas-pago-config-body"><div class="formas-pago-config-loading"><span>Cargando...</span></div></div>';

       google.script.run
          .withSuccessHandler(function (res) {
             var rows = (res && !res.error && res.data) ? res.data : [];
             if (!rows.length) {
                rows = DEFAULT_FORMAS_PAGO_VENTA.map(function (n, i) {
                   return { id: '', nombre: n, orden: i, enUso: false };
                });
             }
             var header = '<div class="formas-pago-config-toolbar">' +
                '<h3 class="formas-pago-config-toolbar-title">Medios de pago</h3>' +
                '<button type="button" class="btn-submit formas-pago-config-add-btn" onclick="abrirModalFormaPagoVentaConfig()">' +
                '<span class="material-symbols-outlined">add</span>Nuevo medio</button></div>';
             var grid = '<div class="formas-pago-config-grid">';
             rows.forEach(function (row) {
                var nombre = (row.nombre || '').toString();
                var id = (row.id || '').toString();
                var tieneId = !!id;
                var enUso = !!row.enUso;
                var meta = getFormaPagoCardMeta(nombre);
                var delDisabled = !tieneId || enUso;
                var delTitle = enUso
                   ? 'No se puede eliminar: ya hay ventas o caja con este medio.'
                   : (!tieneId ? 'Ejecutá la migración SQL en Supabase para poder eliminar.' : 'Eliminar medio de pago');
                grid += '<div class="formas-pago-card">' +
                   '<div class="formas-pago-card-row">' +
                   formaPagoCardLogoHtml(meta, nombre) +
                   '<div class="formas-pago-card-title">' + escapeHtmlText(nombre) + '</div>' +
                   '<div class="formas-pago-card-actions">' +
                   '<button type="button" class="formas-pago-card-btn formas-pago-card-btn--eliminar"' +
                   (delDisabled ? ' disabled aria-disabled="true"' : '') +
                   ' data-id="' + escapeHtmlAttr(id) + '" data-nombre="' + escapeHtmlAttr(nombre) + '"' +
                   ' title="' + escapeHtmlAttr(delTitle) + '" onclick="clickEliminarFormaPagoVenta(this)">' +
                   '<span class="material-symbols-outlined">delete</span>Eliminar</button></div></div></div>';
             });
             grid += '</div>';
             var wrap = document.getElementById('config-formas-pago-body');
             wrap.innerHTML = header + grid;
             bindFormaPagoLogoImgFallbacks(wrap);
          })
          .withFailureHandler(function () {
             document.getElementById('config-formas-pago-body').innerHTML = '<div class="formas-pago-config-loading formas-pago-config-loading--error"><p>No se pudieron cargar los medios de pago. Revisá la conexión o la migración de base de datos.</p></div>';
          })
          .obtenerFormasPagoVenta();
    }

    function abrirModalFormaPagoVentaConfig() {
       var modal = document.getElementById('modalFormaPagoVenta');
       var titleEl = document.getElementById('modalTitleFormaPagoVenta');
       var nombreInput = document.getElementById('formaPagoVentaNombreInput');
       var btn = document.getElementById('btnGuardarFormaPagoVenta');
       if (!modal || !nombreInput) return;
       titleEl.innerText = 'NUEVO MEDIO DE PAGO';
       if (btn) btn.innerText = 'GUARDAR';
       nombreInput.value = '';
       modal.classList.add('open');
       setTimeout(function () { nombreInput.focus(); }, 100);
    }

    function cerrarModalFormaPagoVentaConfig() {
       var m = document.getElementById('modalFormaPagoVenta');
       if (m) m.classList.remove('open');
    }

    function enviarFormaPagoVentaConfig(e) {
       e.preventDefault();
       var nombre = (document.getElementById('formaPagoVentaNombreInput').value || '').trim();
       var btn = document.getElementById('btnGuardarFormaPagoVenta');
       if (!nombre) {
          mostrarAlerta('Ingresá un nombre.');
          return;
       }
       if (btn) { btn.disabled = true; }

       function fin() {
          if (btn) { btn.disabled = false; }
       }

       google.script.run
          .withSuccessHandler(function (res) {
             fin();
             if (res && res.error) {
                mostrarAlerta(res.mensaje || 'No se pudo crear.');
                return;
             }
             cerrarModalFormaPagoVentaConfig();
             poblarSelectFormasPagoVenta('pagoInput');
             renderConfiguracionVentas();
             if (typeof mostrarToast === 'function') mostrarToast('Medio de pago creado.');
          })
          .withFailureHandler(function (err) {
             fin();
             mostrarAlerta('Error: ' + (err && err.message ? err.message : err));
          })
          .crearFormaPagoVenta({ nombre: nombre });
    }

    function clickEliminarFormaPagoVenta(btn) {
       if (!btn || btn.disabled || btn.getAttribute('aria-disabled') === 'true') return;
       var id = btn.getAttribute('data-id');
       var nombre = btn.getAttribute('data-nombre') || '';
       if (!id) return;
       abrirConfirmacion('¿Eliminar el medio de pago "' + nombre + '"?', function () {
          google.script.run
             .withSuccessHandler(function (res) {
                if (res && res.error) {
                   mostrarAlerta(res.mensaje || 'No se pudo eliminar.');
                   return;
                }
                poblarSelectFormasPagoVenta('pagoInput');
                renderConfiguracionVentas();
                if (typeof mostrarToast === 'function') mostrarToast('Eliminado.');
             })
             .withFailureHandler(function () {
                mostrarAlerta('Error de conexión.');
             })
             .borrarFormaPagoVenta({ id: id });
       });
    }
</script>
