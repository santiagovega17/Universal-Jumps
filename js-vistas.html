<script>
    function cargar(hoja) {
       // El estado de carga ya se muestra en navegar(), no es necesario mostrarlo aquí
       // document.getElementById('loader').style.display = 'block'; 
       // document.getElementById('app').innerHTML = '';
 
       if (hoja.includes('OBJETIVOS')) {
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'OBJETIVOS' && HOJA_ACTUAL !== 'CAMBIAR_TRIMESTRE') return;
             if (res.error) {
                if (typeof getHtmlErrorRedConReintentar === 'function') {
                   window._reintentarCarga = function () { cargar(hoja); };
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div>' + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar');
                } else {
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (res.mensaje || '') + '</div>';
                }
             } else {
                renderObjetivos(res.data, res.especiales || []);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'OBJETIVOS' && HOJA_ACTUAL !== 'CAMBIAR_TRIMESTRE') return;
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { cargar(hoja); };
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div>' + getHtmlErrorRedConReintentar(err && err.message ? err.message : 'Error de conexión');
             } else {
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">OBJETIVOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (err && err.message ? err.message : '') + '</div>';
             }
          }).obtenerObjetivosBackend(hoja);
          return;
       }
 
       if (hoja === 'CONSOLIDADO') {
          if (typeof poblarAnioConsolidado === 'function') poblarAnioConsolidado();
          let anioConsolidadoVentas = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
          let selAnioVentas = document.getElementById('selAnioConsolidadoVentas');
          if (selAnioVentas && selAnioVentas.value) anioConsolidadoVentas = parseInt(selAnioVentas.value) || anioConsolidadoVentas;
          let selConsolidadoVentas = document.getElementById('consolidado-ventas-filters');
          if (selConsolidadoVentas) selConsolidadoVentas.style.display = 'flex';
 
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'CONSOLIDADO') return;
             if (res.error) {
                if (typeof getHtmlErrorRedConReintentar === 'function') {
                   window._reintentarCarga = function () { cargar('CONSOLIDADO'); };
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div>' + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar');
                } else {
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (res.mensaje || '') + '</div>';
                }
             } else {
                renderConsolidado(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'CONSOLIDADO') return;
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { cargar('CONSOLIDADO'); };
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div>' + getHtmlErrorRedConReintentar(err && err.message ? err.message : 'Error de conexión');
             } else {
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (err && err.message ? err.message : '') + '</div>';
             }
          }).obtenerReporteConsolidado(anioConsolidadoVentas);
          return;
       }
 
       if (hoja === '%') {
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== '%') return;
             if (res.error) {
                if (typeof getHtmlErrorRedConReintentar === 'function') {
                   window._reintentarCarga = function () { cargar('%'); };
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div>' + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar');
                } else {
                   document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (res.mensaje || '') + '</div>';
                }
             } else {
                renderComisiones(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== '%') return;
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { cargar('%'); };
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div>' + getHtmlErrorRedConReintentar(err && err.message ? err.message : 'Error de conexión');
             } else {
                document.getElementById('app').innerHTML = '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (err && err.message ? err.message : '') + '</div>';
             }
          }).obtenerTodasLasComisiones();
          return;
       }
 
       // Cargar objetivos en paralelo (no bloquea la carga de datos del vendedor)
       google.script.run.withSuccessHandler(resObjs => {
          // Validar que resObjs existe y tiene data
          if (resObjs && !resObjs.error && resObjs.data && Array.isArray(resObjs.data)) {
             ALL_OBJECTIVES = resObjs.data.filter(o => o && !o.esEspecial); // Solo rangos comunes
             // Organizar objetivos especiales por trimestre y vendedor
             ALL_OBJECTIVES_ESPECIALES = {};
             resObjs.data.filter(o => o && o.esEspecial).forEach(obj => {
                if (obj.trimestre && obj.vendedor) {
                   if (!ALL_OBJECTIVES_ESPECIALES[obj.trimestre]) {
                      ALL_OBJECTIVES_ESPECIALES[obj.trimestre] = {};
                   }
                   ALL_OBJECTIVES_ESPECIALES[obj.trimestre][obj.vendedor] = obj;
                }
             });
          } else {
             // Si hay error o no hay datos, inicializar vacío
             ALL_OBJECTIVES = [];
             ALL_OBJECTIVES_ESPECIALES = {};
          }
       }).withFailureHandler(err => {
          // Si falla obtenerTodosLosObjetivos, inicializar vacío
          console.error('Error al obtener objetivos:', err);
          ALL_OBJECTIVES = [];
          ALL_OBJECTIVES_ESPECIALES = {};
       }).obtenerTodosLosObjetivos();
 
       // Cargar datos del vendedor de forma independiente (no espera a los objetivos)
       if (hoja !== 'CONSOLIDADO' && hoja !== '%' && typeof VENTAS_CACHE !== 'undefined' && VENTAS_CACHE.vendedor === hoja && VENTAS_CACHE.data && (Date.now() - VENTAS_CACHE.ts) < VENTAS_CACHE_TTL_MS) {
          NAVEGANDO = false;
          if (typeof debugLog === 'function') debugLog('VENTAS', 'Vendedor desde caché', { vendedor: hoja, segundos: Math.round((Date.now() - VENTAS_CACHE.ts) / 1000) });
          renderVendedor(VENTAS_CACHE.data, hoja);
          return;
       }
       try {
          google.script.run.withSuccessHandler(data => {
             try {
                NAVEGANDO = false;
                if (HOJA_ACTUAL !== hoja) return;
                if (!data) {
                   let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: No se recibieron datos</div>`;
                   return;
                }
                if (data.error) {
                   let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${data.mensaje || 'Error desconocido'}</div>`;
                   return;
                }
                if (hoja === 'CONSOLIDADO') {
                   if (data.data) renderConsolidado(data.data);
                   else console.error('No hay datos para consolidado');
                } else if (hoja === '%') {
                   if (data.data) renderComisiones(data.data);
                   else console.error('No hay datos para comisiones');
                } else {
                   if (data.data) {
                      if (typeof VENTAS_CACHE !== 'undefined') {
                         VENTAS_CACHE.vendedor = hoja;
                         VENTAS_CACHE.data = data.data;
                         VENTAS_CACHE.ts = Date.now();
                      }
                      renderVendedor(data.data, hoja);
                   } else console.error('No hay datos para vendedor:', hoja);
                }
             } catch (renderError) {
                NAVEGANDO = false;
                console.error('Error al renderizar:', renderError);
                if (HOJA_ACTUAL !== hoja) return;
                let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al renderizar: ${renderError.message}</div>`;
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             console.error('Error al obtener datos de hoja:', err);
             if (HOJA_ACTUAL !== hoja) return;
             let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
             let errorMsg = err && err.message ? err.message : (err && err.toString ? err.toString() : 'Error desconocido');
             document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${errorMsg}</div>`;
          }).obtenerDatosDeHoja(hoja);
       } catch (e) {
          NAVEGANDO = false;
          console.error('Error al iniciar carga:', e);
          let titulo = hoja === 'OBJETIVOS' ? 'OBJETIVOS' : 'VENTAS: ' + hoja.toUpperCase();
          document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al iniciar carga: ${e.message}</div>`;
       }
    }
 
    function renderMantenimiento() {
       let html = `<div class="back-nav" onclick="navegar(null, 'HOME')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>
           <div class="home-grid"><div class="home-card disabled"><div class="home-icon"><span class="material-symbols-outlined">construction</span></div><div class="home-title">Próximamente</div></div></div>`;
       document.getElementById('app').innerHTML = html;
    }
 
    function renderComisiones(dataComisiones) {
       let html = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>
          <div class="dash-section-title">COMISIONES</div>`;
 
       const trimestres = ['T1', 'T2', 'T3', 'T4'];
 
       trimestres.forEach(trimKey => {
          let trimData = dataComisiones[trimKey];
          if (!trimData) return;
 
          html += `<div style="margin-top: 30px; margin-bottom: 40px;">
                <div style="color: var(--accent); font-weight: 700; font-size: 20px; margin-bottom: 20px; text-align: center; text-transform: uppercase;">${trimData.nombre}</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">`;
 
          if (trimData.vendedores && trimData.vendedores.length > 0) {
             trimData.vendedores.forEach(v => {
                let ventas = trimData.ventas[v.nombre] || {
                   mes1: 0, mes2: 0, mes3: 0, total: 0,
                   rangoMes1: 0, porcentajeMes1: 0,
                   rangoMes2: 0, porcentajeMes2: 0,
                   rangoMes3: 0, porcentajeMes3: 0,
                   nombreMes1: 'Mes 1',
                   nombreMes2: 'Mes 2',
                   nombreMes3: 'Mes 3'
                };
 
                let rangoTexto1 = ventas.rangoMes1 > 0 ? `R${ventas.rangoMes1}` : '-';
                let porcentajeTexto1 = ventas.porcentajeMes1 > 0 ? `${ventas.porcentajeMes1.toFixed(1)}%` : '-';
                let rangoTexto2 = ventas.rangoMes2 > 0 ? `R${ventas.rangoMes2}` : '-';
                let porcentajeTexto2 = ventas.porcentajeMes2 > 0 ? `${ventas.porcentajeMes2.toFixed(1)}%` : '-';
                let rangoTexto3 = ventas.rangoMes3 > 0 ? `R${ventas.rangoMes3}` : '-';
                let porcentajeTexto3 = ventas.porcentajeMes3 > 0 ? `${ventas.porcentajeMes3.toFixed(1)}%` : '-';
 
                html += `
                      <div class="method-card" style="background: var(--sidebar); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;">
                         <div style="font-size: 16px; font-weight: 700; color: white; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; text-align: center;">${v.nombre}</div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes1 || 'Mes 1'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes1)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto1}</span>
                                  <span style="color: ${ventas.porcentajeMes1 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto1}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes2 || 'Mes 2'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes2)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto2}</span>
                                  <span style="color: ${ventas.porcentajeMes2 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto2}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes3 || 'Mes 3'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes3)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto3}</span>
                                  <span style="color: ${ventas.porcentajeMes3 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto3}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--border-color);">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                               <span style="font-size: 13px; color: var(--accent); font-weight: 700; text-transform: uppercase;">Total</span>
                               <span style="color: var(--accent); font-weight: 800; font-size: 18px;">${formatNumberAr(ventas.total)}</span>
                            </div>
                         </div>
                      </div>`;
             });
          } else {
             html += `<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #94a3b8;">No hay datos disponibles</div>`;
          }
 
          html += `</div></div>`;
       });
 
       document.getElementById('app').innerHTML = html;
    }
 
    // NUEVA FUNCIÓN: Renderizar gestión de usuarios
    function renderGestionUsuarios() {
       var backNav = '<div class="back-nav" onclick="navegar(null, \'MENU_ADMIN\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">GESTIÓN DE USUARIOS</div>';
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { renderGestionUsuarios(); };
                document.getElementById('app').innerHTML = backNav + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar usuarios');
             } else {
                mostrarAlerta('Error al cargar vendedores: ' + (res.mensaje || ''));
             }
             return;
          }
 
          let html = `<div class="back-nav" onclick="navegar(null, 'MENU_ADMIN')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>
             <div class="dash-section-title">GESTIÓN DE USUARIOS</div>
             <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; margin-top: 20px;">
                <button class="btn-submit" onclick="abrirModalVendedor('crear')" style="padding: 8px 16px; font-size: 13px; width: auto; flex-shrink: 0;">
                   <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle; margin-right: 4px;">add</span>
                   Agregar Usuario
                </button>
             </div>
             <div style="background: var(--sidebar); border-radius: 12px; padding: 20px;">
                <table style="width: 100%; border-collapse: collapse;">
                   <thead>
                      <tr style="border-bottom: 2px solid var(--border-color);">
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-sm">Nombre</th>
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-md">Email</th>
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-sm">Rol</th>
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-sm">Estado</th>
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-sm">Tipo Objetivo</th>
                         <th style="text-align: center; padding: 12px; color: var(--accent); font-weight: 600;" class="col-min">Acciones</th>
                      </tr>
                   </thead>
                   <tbody id="vendor-management-table">
                   </tbody>
                </table>
             </div>`;
 
          document.getElementById('app').innerHTML = html;
 
          // Cargar todos los usuarios
          google.script.run.withSuccessHandler(usuariosRes => {
             if (usuariosRes.error) {
                mostrarAlerta('Error: ' + usuariosRes.mensaje);
                return;
             }
 
             let tableBody = document.getElementById('vendor-management-table');
             let tableHtml = '';
 
             // Separar activos e inactivos (excluir ROOT)
             let activos = usuariosRes.usuarios.filter(u => u.activo && u.rol !== 'ROOT');
             let inactivos = usuariosRes.usuarios.filter(u => !u.activo && u.rol !== 'ROOT');
 
             // Renderizar activos primero
             activos.forEach(u => {
                let tipoObjDisplay = u.rol === 'VENDEDOR' ? (u.tipoObjetivo || 'RANGO') : '-';
                tableHtml += `
                      <tr style="border-bottom: 1px solid var(--border-color);">
                         <td style="padding: 15px; text-align: center; color: white; font-weight: 500;">${u.nombre}</td>
                         <td style="padding: 15px; text-align: center; color: #cbd5e1;">${u.email || ''}</td>
                         <td style="padding: 15px; text-align: center; color: #cbd5e1;">${u.rol || 'VENDEDOR'}</td>
                         <td style="padding: 15px; text-align: center;"><span style="color: var(--grass-green); font-weight: 600;">● Activo</span></td>
                         <td style="padding: 15px; text-align: center; color: #cbd5e1;">${tipoObjDisplay}</td>
                         <td style="padding: 15px; text-align: center;">
                            ${(USUARIO_ACTUAL && (USUARIO_ACTUAL.rol === 'ADMIN' || USUARIO_ACTUAL.rol === 'ROOT')) ? `<button class="action-btn btn-edit" style="margin-right: 8px;" onclick="abrirModalVendedor('editar', '${u.nombre}', '${u.email || ''}', '${u.tipoObjetivo || 'RANGO'}', '${u.rol}')" title="Editar">
                               <span class="material-symbols-outlined">edit</span>
                            </button>` : ''}
                            <button class="action-btn" style="background: var(--danger); color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;" onclick="cambiarEstadoUsuario('${u.email}', false)">
                               Desactivar
                            </button>
                         </td>
                      </tr>
                   `;
             });
 
             // Usuarios inactivos
             inactivos.forEach(u => {
                let tipoObjDisplay = u.rol === 'VENDEDOR' ? (u.tipoObjetivo || 'RANGO') : '-';
                tableHtml += `
                      <tr style="border-bottom: 1px solid var(--border-color); opacity: 0.6;">
                         <td style="padding: 15px; text-align: center; color: #94a3b8;">${u.nombre}</td>
                         <td style="padding: 15px; text-align: center; color: #64748b;">${u.email || ''}</td>
                         <td style="padding: 15px; text-align: center; color: #64748b;">${u.rol || 'VENDEDOR'}</td>
                         <td style="padding: 15px; text-align: center;"><span style="color: #64748b; font-weight: 600;">● Inactivo</span></td>
                         <td style="padding: 15px; text-align: center; color: #64748b;">${tipoObjDisplay}</td>

    // NUEVA FUNCIÓN: Filtrar clientes en la tabla por país y búsqueda
    function filtrarClientesTabla() {
       let filtroPais = document.getElementById('selPaisCliente')?.value || '';
       let filtroBuscar = (document.getElementById('buscarCliente')?.value || '').toLowerCase();
 
       let tableBody = document.getElementById('clientes-table-body');
       if (!tableBody) return;
 
       let todasLasFilas = Array.from(tableBody.querySelectorAll('tr'));
       let filasVisibles = 0;
 
       todasLasFilas.forEach(tr => {
          let tds = tr.querySelectorAll('td');
          if (tds.length < 7) {
             tr.style.display = ''; // Mantener filas de mensaje sin datos
             return;
          }
 
          // Índices de las columnas en la tabla (sin ID visible)
          // Nombre=0, Apellido=1, DNI=2, Teléfono=3, Correo=4, Domicilio=5, Provincia=6, País=7
          let idxPais = 7; // Columna País (índice 7)
          let idxNombre = 0; // Columna Nombre
          let idxApellido = 1; // Columna Apellido
          let idxDni = 2; // Columna DNI
          let idxCorreo = 4; // Columna Correo
 
          let pais = (tds[idxPais]?.textContent || '').trim();
          let nombre = (tds[idxNombre]?.textContent || '').toLowerCase();
          let apellido = (tds[idxApellido]?.textContent || '').toLowerCase();
          let dni = (tds[idxDni]?.textContent || '').toLowerCase();
          let correo = (tds[idxCorreo]?.textContent || '').toLowerCase();
 
          let coincidePais = !filtroPais || pais === filtroPais;
          let coincideBuscar = !filtroBuscar || nombre.includes(filtroBuscar) || apellido.includes(filtroBuscar) || dni.includes(filtroBuscar) || correo.includes(filtroBuscar);
 
          if (coincidePais && coincideBuscar) {
             tr.style.display = '';
             filasVisibles++;
          } else {
             tr.style.display = 'none';
          }
       });
 
       // Si no hay filas visibles, mostrar mensaje
       if (filasVisibles === 0 && todasLasFilas.length > 0) {
          let mensajeRow = tableBody.querySelector('tr[data-no-results]');
          if (!mensajeRow) {
             mensajeRow = document.createElement('tr');
             mensajeRow.setAttribute('data-no-results', 'true');
             let colspan = tableBody.querySelector('thead tr th') ? tableBody.querySelectorAll('thead tr th').length : 8;
             mensajeRow.innerHTML = `<td colspan="${colspan}" style="text-align:center; padding:40px; color:#94a3b8;">No se encontraron clientes con los filtros seleccionados</td>`;
             tableBody.appendChild(mensajeRow);
          } else {
             mensajeRow.style.display = '';
          }
       } else {
          let mensajeRow = tableBody.querySelector('tr[data-no-results]');
          if (mensajeRow) mensajeRow.style.display = 'none';
       }
    }

    function enviarCliente(e) {
       e.preventDefault();
       let form = document.getElementById('formCliente');
       let btn = document.getElementById('btnGuardarCliente');

       // Validación: nombre, apellido y opcionalmente correo con formato
       if (typeof validarCampos === 'function') {
          var reglasCliente = [
             { id: 'clienteNombre', nombre: 'Nombre', requerido: true, mensaje: 'El nombre es obligatorio.' },
             { id: 'clienteApellido', nombre: 'Apellido', requerido: true, mensaje: 'El apellido es obligatorio.' }
          ];
          var correoVal = document.getElementById('clienteCorreo') ? document.getElementById('clienteCorreo').value.trim() : '';
          if (correoVal) reglasCliente.push({ id: 'clienteCorreo', nombre: 'Correo', pattern: '^[^@]+@[^@]+\\.[^@]+$', mensaje: 'El correo no tiene un formato válido.' });
          var err = validarCampos(reglasCliente);
          if (err) {
             mostrarAlerta(err);
             return;
          }
       }

       btn.disabled = true;
       btn.innerText = 'Guardando...';

       let indexOriginal = document.getElementById('clienteFilaIndex').value;
       let datos = {
          nombre: document.getElementById('clienteNombre').value.trim(),
          apellido: document.getElementById('clienteApellido').value.trim(),
          dni: document.getElementById('clienteDni').value.trim(),
          telefono: document.getElementById('clienteTelefono').value.trim(),
          correo: document.getElementById('clienteCorreo').value.trim(),
          domicilio: document.getElementById('clienteDomicilio').value.trim(),
          provincia: document.getElementById('clienteProvincia').value.trim(),
          pais: document.getElementById('clientePais').value,
          filaIndex: indexOriginal
       };
 
       // Si está editando, agregar datos originales para que el backend lo encuentre
       if (indexOriginal && CLIENTES_ACTUALES[indexOriginal]) {
          let clienteOriginal = CLIENTES_ACTUALES[indexOriginal];
          datos.nombreOriginal = clienteOriginal.nombre;
          datos.apellidoOriginal = clienteOriginal.apellido;
          datos.filaIndex = 'EDITAR'; // Marca especial para edición
       }
 
       google.script.run
          .withSuccessHandler(res => {
             btn.disabled = false;
             btn.innerText = datos.filaIndex ? 'ACTUALIZAR' : 'GUARDAR';
             if (res.error) {
                mostrarAlerta('Error: ' + res.mensaje);
             } else {
                if (typeof mostrarToast === 'function') mostrarToast(res.mensaje);
                cerrarModals();
 
             // Si venía del formulario de venta, no cargar la vista de clientes
             if (DATOS_FORMULARIO_VENTA) {
                // Solo actualizar el selector de clientes
                actualizarSelectorClientes('TODOS');
 
                // Esperar un momento para que se actualice el selector
                setTimeout(() => {
                   restaurarDatosFormularioVenta();
 
                   // Seleccionar el cliente recién creado
                   let clienteSelect = document.getElementById('clienteInput');
                   let paisSelect = document.getElementById('paisInput');
                   if (clienteSelect && paisSelect && paisSelect.value) {
                      let nombreCompleto = `${datos.nombre} ${datos.apellido}`.trim();
                      if (clienteSelect.querySelector(`option[value="${nombreCompleto}"]`)) {
                         clienteSelect.value = nombreCompleto;
                      }
                   }
 
                   // Abrir el modal de venta
                   abrirModalVenta();
                }, 500);
             } else {
                // Si no viene del formulario de venta, cargar la vista de clientes normalmente
                cargarClientesVendedor('TODOS');
                actualizarSelectorClientes('TODOS');
             }
          }
       })
          .withFailureHandler(function () {
             btn.disabled = false;
             btn.innerText = datos.filaIndex ? 'ACTUALIZAR' : 'GUARDAR';
             mostrarAlerta('Error de conexión. Revisa tu red e intenta de nuevo.');
          })
          .guardarCliente(datos);
    }

    function actualizarSelectorClientes(vendedor) {
       let selectCliente = document.getElementById('clienteInput');
       let paisSelect = document.getElementById('paisInput');
 
       if (!selectCliente) {
          console.error('No se encontró el elemento clienteInput');
          return;
       }
       if (selectCliente.tagName !== 'SELECT') {
          console.error('clienteInput no es un elemento SELECT');
          return;
       }
 
       // Obtener país seleccionado
       let paisSeleccionado = paisSelect ? paisSelect.value : '';
 
       // Si no hay país seleccionado, dejar mensaje
       if (!paisSeleccionado || paisSeleccionado === '') {
          selectCliente.innerHTML = '<option value="">Selecciona un país primero...</option>';
          selectCliente.disabled = true;
          return;
       }

          if (res.data && res.data.length > 0) {
             res.data.forEach(cliente => {
                let nombreCompleto = `${cliente.nombre} ${cliente.apellido}`.trim();

          // Si no hay clientes después del filtro, mostrar mensaje
          if (!res.data || res.data.length === 0) {

          }
       }).withFailureHandler(err => {
          selectCliente.disabled = false;

    function enviarVendedor(e) {
       e.preventDefault();
       let btn = document.getElementById('btnGuardarVendedor');
       btn.disabled = true;
       btn.innerText = VENDEDOR_EDITANDO ? 'Actualizando...' : 'Creando...';
 
       let rolInput = document.getElementById('vendedorRol');
       let rol = rolInput ? rolInput.value : 'VENDEDOR';
       let tipoObjetivoInput = document.getElementById('vendedorTipoObjetivo');
 
       let datos = {
          email: document.getElementById('vendedorEmail').value.trim(),

          tipoObjetivo: (rol === 'VENDEDOR' && tipoObjetivoInput) ? tipoObjetivoInput.value : 'RANGO',

       };
 
       if (!datos.email || !datos.nombre) {

          btn.disabled = false;
          btn.innerText = VENDEDOR_EDITANDO ? 'ACTUALIZAR' : 'CREAR USUARIO';

       }
 
       let funcionBackend = datos.esEdicion ? 'actualizarUsuario' : 'crearNuevoUsuario';
 
       google.script.run.withSuccessHandler(res => {
          btn.disabled = false;
          btn.innerText = VENDEDOR_EDITANDO ? 'ACTUALIZAR' : 'CREAR USUARIO';
          if (res.error) {

             renderGestionUsuarios();

    // --- FUNCIÓN AUXILIAR: Convertir monto a ARS ---
    function convertirAArs(monto, pais) {
       if (pais === 'ARGENTINA') return monto;
       let cotizacion = COTIZACIONES[pais] || 1;
       return monto * cotizacion;
    }
 
    // --- FUNCIÓN AUXILIAR: Formatear monto en moneda del país ---
    function formatearMonedaPais(monto, pais) {
       if (pais === 'ARGENTINA') return formatNumberAr(monto);
       if (pais === 'CHILE') return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(monto);
       if (pais === 'MEXICO') return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(monto);
       if (pais === 'ESPANA') return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(monto);
       if (pais === 'BRASIL') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(monto);
       if (pais === 'URUGUAY') return new Intl.NumberFormat('es-UY', { style: 'currency', currency: 'UYU' }).format(monto);
       if (pais === 'EEUU' || pais === 'RDM') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(monto);
       return formatNumberAr(monto);
    }

                              <div><span class="view-mode obj-val">${formatNumberAr(row.factBotas)}</span><input type="text" class="obj-input edit-mode hidden" value="${formatNumberAr(row.factBotas).replace('ARS', '').trim()}" id="factB-${index}" onkeyup="formatoMoneda(this); calcMens(this, 'mensB-${index}')"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Mensual:</span> <span class="obj-val" style="color:var(--accent)" id="mensB-${index}">${formatNumberAr(mensBotas)}</span></div>
                       </div>
 
                       <div class="obj-sub-section">
                          <div class="obj-sub-title"><span class="material-symbols-outlined">verified</span> CERTIFICACIONES</div>
                          <div class="obj-row"><span class="obj-label">% Comisión:</span> 
                              <div><span class="view-mode obj-val">${row.pctCerts || 0}</span><input type="number" class="obj-input edit-mode hidden" value="${row.pctCerts || 0}" id="pctC-${index}"> %</div>
                          </div>
                          <div class="obj-row"><span class="obj-label">Unidades:</span> 
                              <div><span class="view-mode obj-val">${row.certs}</span><input type="number" class="obj-input edit-mode hidden" value="${row.certs}" id="certs-${index}"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Trimestral:</span> 
                              <div><span class="view-mode obj-val">${formatNumberAr(row.factCerts)}</span><input type="text" class="obj-input edit-mode hidden" value="${formatNumberAr(row.factCerts).replace('ARS', '').trim()}" id="factC-${index}" onkeyup="formatoMoneda(this); calcMens(this, 'mensC-${index}')"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Mensual:</span> <span class="obj-val" style="color:var(--accent)" id="mensC-${index}">${formatNumberAr(mensCerts)}</span></div>
                       </div>
                    </div>
                 </div>`;
          });
       }
 
       // Renderizar objetivos especiales (como tarjetas debajo de los rangos, con mismo formato)
       if (mostrarEspeciales) {
          let especialesAmostrar = esVendedor && objetivoEspecialVendedor ? [objetivoEspecialVendedor] : objetivosEspeciales;
          especialesAmostrar.forEach((esp, index) => {
             let mensBotas = esp.factBotas ? esp.factBotas / 3 : 0;
             let mensCerts = esp.factCerts ? esp.factCerts / 3 : 0;
             let idx = 'esp-' + index;
 
             // Obtener el nombre del vendedor (priorizar vendedor sobre id)
             let nombreVendedor = esp.vendedor || esp.id || '';
             // Si el nombre está vacío o es "ESPECIAL", mostrar mensaje
             if (!nombreVendedor || nombreVendedor.toString().trim() === '' || nombreVendedor.toString().toUpperCase() === 'ESPECIAL') {
                nombreVendedor = 'Vendedor no especificado';
             }
             // Almacenar el nombre original del vendedor en un atributo data para poder recuperarlo al guardar
             let vendedorOriginal = (esp.vendedor || esp.id || '').toString().trim();
             html += `
                 <div class="obj-card" style="border: 2px solid var(--accent);" data-vendedor="${vendedorOriginal}">
                    <div class="obj-header-row">
                       <div class="obj-title">⭐ ESPECIAL - ${nombreVendedor}</div>
                    </div>
                    <div class="obj-content">
                       <div class="obj-sub-section">
                          <div class="obj-sub-title"><span class="material-symbols-outlined">steps</span> BOTAS</div>
                          <div class="obj-row"><span class="obj-label">% Comisión:</span> 
                              <div><span class="view-mode obj-val">${esp.pctBotas || 0}</span><input type="number" class="obj-input edit-mode hidden" value="${esp.pctBotas || 0}" id="pctB-${idx}"> %</div>
                          </div>
                          <div class="obj-row"><span class="obj-label">Unidades:</span> 
                              <div><span class="view-mode obj-val">${esp.botas || 0}</span><input type="number" class="obj-input edit-mode hidden" value="${esp.botas || 0}" id="botas-${idx}"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Trimestral:</span> 
                              <div><span class="view-mode obj-val">${formatNumberAr(esp.factBotas || 0)}</span><input type="text" class="obj-input edit-mode hidden" value="${formatNumberAr(esp.factBotas || 0).replace('ARS', '').trim()}" id="factB-${idx}" onkeyup="formatoMoneda(this); calcMens(this, 'mensB-${idx}')"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Mensual:</span> <span class="obj-val" style="color:var(--accent)" id="mensB-${idx}">${formatNumberAr(mensBotas)}</span></div>
                       </div>
 
                       <div class="obj-sub-section">
                          <div class="obj-sub-title"><span class="material-symbols-outlined">verified</span> CERTIFICACIONES</div>
                          <div class="obj-row"><span class="obj-label">% Comisión:</span> 
                              <div><span class="view-mode obj-val">${esp.pctCerts || 0}</span><input type="number" class="obj-input edit-mode hidden" value="${esp.pctCerts || 0}" id="pctC-${idx}"> %</div>
                          </div>
                          <div class="obj-row"><span class="obj-label">Unidades:</span> 
                              <div><span class="view-mode obj-val">${esp.certs || 0}</span><input type="number" class="obj-input edit-mode hidden" value="${esp.certs || 0}" id="certs-${idx}"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Trimestral:</span> 
                              <div><span class="view-mode obj-val">${formatNumberAr(esp.factCerts || 0)}</span><input type="text" class="obj-input edit-mode hidden" value="${formatNumberAr(esp.factCerts || 0).replace('ARS', '').trim()}" id="factC-${idx}" onkeyup="formatoMoneda(this); calcMens(this, 'mensC-${idx}')"></div>
                          </div>
                          <div class="obj-row"><span class="obj-label">$ Mensual:</span> <span class="obj-val" style="color:var(--accent)" id="mensC-${idx}">${formatNumberAr(mensCerts)}</span></div>
                       </div>
                    </div>
                 </div>`;
          });
       }
 
       html += `</div>`; // Close grid
 
 
       document.getElementById('app').innerHTML = html;
    }
 
    function toggleEditMode() {
       let btn = document.querySelector('button[onclick*="toggleEditMode"]');
       let isEditing = btn && btn.innerHTML.includes('Guardar');
 
       document.querySelectorAll('.view-mode').forEach(el => el.classList.toggle('hidden'));
       document.querySelectorAll('.edit-mode').forEach(el => {
          el.classList.toggle('hidden');
          el.classList.add('editable');
       });
 
       // Cambiar el botón de editar a guardar y viceversa
       if (btn) {
          if (isEditing) {
             // Volver a modo visualización, mostrar botón "Editar Objetivos"
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">edit</span> Editar Objetivos';
             btn.setAttribute('onclick', 'toggleEditMode()');
          } else {
             // Cambiar a modo edición, mostrar botón "Guardar Objetivos"
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar Objetivos';
             btn.setAttribute('onclick', 'guardarObjetivosFrontend();');
          }
       }
    }
 
    function calcMens(input, targetId) {
       let num = parseCurrency(input.value);
       let mens = num / 3;
       document.getElementById(targetId).innerText = formatNumberAr(mens);
    }
 
    function guardarObjetivosFrontend() {
       let trimestre = document.getElementById('selTrimestreHeader').value;
       let filas = [];
 
       // Guardar objetivos por rango (si existen)
       for (let i = 0; i < 4; i++) {
          let elPctB = document.getElementById(`pctB-${i}`);
          let elPctC = document.getElementById(`pctC-${i}`);
          if (elPctB || elPctC) {
             filas.push({
                rango: i + 1,
                pctBotas: parseFloat(elPctB ? elPctB.value || "0" : "0"),
                pctCerts: parseFloat(elPctC ? elPctC.value || "0" : "0"),
                botas: document.getElementById(`botas-${i}`) ? document.getElementById(`botas-${i}`).value || "0" : "0",
                certs: document.getElementById(`certs-${i}`) ? document.getElementById(`certs-${i}`).value || "0" : "0",
                factBotas: parseCurrency(document.getElementById(`factB-${i}`) ? document.getElementById(`factB-${i}`).value || "0" : "0"),
                factCerts: parseCurrency(document.getElementById(`factC-${i}`) ? document.getElementById(`factC-${i}`).value || "0" : "0")
             });
          }
       }
 
       // Guardar objetivos especiales (si existen y están en modo edición)
       let objetivosEspeciales = [];
       // Buscar todos los elementos con IDs que empiezan con "pctB-esp-" o "pctC-esp-"
       let allInputs = document.querySelectorAll('.obj-input[id^="pctB-esp-"], .obj-input[id^="pctC-esp-"]');
       let especialIds = new Set();
       allInputs.forEach(el => {
          let id = el.id;
          if (id.startsWith('pctB-esp-') || id.startsWith('pctC-esp-')) {
             // Los IDs son pctB-esp-0, pctC-esp-0, etc.
             let match = id.match(/^(pctB|pctC)-esp-(\d+)$/);
             if (match) especialIds.add(match[2]);
          }
       });
 
       especialIds.forEach(idStr => {
          let idx = 'esp-' + idStr;
          let elPctB = document.getElementById(`pctB-${idx}`);
          let elPctC = document.getElementById(`pctC-${idx}`);
          if (!elPctB && !elPctC) return;
 
          // Obtener el vendedor del atributo data-vendedor de la tarjeta
          let objCard = elPctB ? elPctB.closest('.obj-card') : (elPctC ? elPctC.closest('.obj-card') : null);
          let vendedor = '';
          if (objCard) {
             // Primero intentar obtener del atributo data-vendedor
             vendedor = objCard.getAttribute('data-vendedor') || '';
             // Si no está en el atributo, intentar extraer del título como fallback
             if (!vendedor || vendedor.trim() === '') {
                let titleEl = objCard.querySelector('.obj-title');
                if (titleEl) {
                   let titleText = titleEl.textContent || '';
                   // Extraer el nombre del vendedor del título "⭐ ESPECIAL - NOMBRE"
                   let match = titleText.match(/ESPECIAL\s*-\s*(.+)/);
                   if (match) vendedor = match[1].trim();
                }
             }
          }
 
          objetivosEspeciales.push({
             vendedor: vendedor,
             trimestre: trimestre,
             pctBotas: parseFloat(elPctB ? elPctB.value || "0" : "0"),
             pctCerts: parseFloat(elPctC ? elPctC.value || "0" : "0"),
             botas: document.getElementById(`botas-${idx}`) ? document.getElementById(`botas-${idx}`).value || "0" : "0",
             certs: document.getElementById(`certs-${idx}`) ? document.getElementById(`certs-${idx}`).value || "0" : "0",
             factBotas: parseCurrency(document.getElementById(`factB-${idx}`) ? document.getElementById(`factB-${idx}`).value || "0" : "0"),
             factCerts: parseCurrency(document.getElementById(`factC-${idx}`) ? document.getElementById(`factC-${idx}`).value || "0" : "0")
          });
       });
 
       let btn = document.querySelector('button[onclick*="guardarObjetivosFrontend"]');
       if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">hourglass_empty</span> Guardando...';
       }
 
       // Guardar objetivos por rango primero
       let promesaRangos = new Promise((resolve, reject) => {
          if (filas.length > 0) {
             google.script.run.withSuccessHandler(res => {
                if (res.error) reject(res.mensaje);
                else resolve(res);
             }).withFailureHandler(err => reject(err.message)).guardarObjetivosBackend(trimestre, filas);
          } else {
             resolve({ error: false });
          }
       });
 
       // Guardar objetivos especiales
       let promesasEspeciales = objetivosEspeciales.map(obj => {
          return new Promise((resolve, reject) => {
             google.script.run.withSuccessHandler(res => {
                if (res.error) reject(res.mensaje);
                else resolve(res);
             }).withFailureHandler(err => reject(err.message)).guardarObjetivoEspecial(obj);
          });
       });
 
       Promise.all([promesaRangos, ...promesasEspeciales]).then(() => {
          if (btn) {
             btn.disabled = false;
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar Objetivos';
          }
          mostrarAlerta("Objetivos actualizados correctamente.");
          toggleEditMode();
          let trim = document.getElementById('selTrimestreHeader').value;
          cargar(trim);
       }).catch(err => {
          if (btn) {
             btn.disabled = false;
             btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px; margin-right:5px;">save</span> Guardar Objetivos';
          }
          alert("Error: " + err);
       });
    }
 
</script>
