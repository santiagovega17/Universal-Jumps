<script>
    function cargar(hoja) {
       if (hoja === 'CONSOLIDADO') {
          if (typeof poblarAnioConsolidado === 'function') poblarAnioConsolidado();
          let anioConsolidadoVentas = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : new Date().getFullYear();
          let selAnioVentas = document.getElementById('selAnioConsolidadoVentas');
          if (selAnioVentas && selAnioVentas.value) anioConsolidadoVentas = parseInt(selAnioVentas.value) || anioConsolidadoVentas;
          let selConsolidadoVentas = document.getElementById('consolidado-ventas-filters');
          if (selConsolidadoVentas) selConsolidadoVentas.style.display = 'flex';
 
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'CONSOLIDADO') return;
             if (res.error) {
                if (typeof getHtmlErrorRedConReintentar === 'function') {
                   window._reintentarCarga = function () { cargar('CONSOLIDADO'); };
                  document.getElementById('app').innerHTML = '<div class="dash-section-title">CONSOLIDADO</div>' + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar');
                } else {
                  document.getElementById('app').innerHTML = '<div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (res.mensaje || '') + '</div>';
                }
             } else {
                renderConsolidado(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'CONSOLIDADO') return;
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { cargar('CONSOLIDADO'); };
                document.getElementById('app').innerHTML = '<div class="dash-section-title">CONSOLIDADO</div>' + getHtmlErrorRedConReintentar(err && err.message ? err.message : 'Error de conexión');
             } else {
                document.getElementById('app').innerHTML = '<div class="dash-section-title">CONSOLIDADO</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (err && err.message ? err.message : '') + '</div>';
             }
          }).obtenerReporteConsolidado(anioConsolidadoVentas);
          return;
       }
 
       if (hoja === '%') {
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== '%') return;
             if (res.error) {
                if (typeof getHtmlErrorRedConReintentar === 'function') {
                   window._reintentarCarga = function () { cargar('%'); };
                  document.getElementById('app').innerHTML = '<div class="dash-section-title">COMISIONES</div>' + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar');
                } else {
                  document.getElementById('app').innerHTML = '<div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (res.mensaje || '') + '</div>';
                }
             } else {
                renderComisiones(res.data);
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== '%') return;
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { cargar('%'); };
                document.getElementById('app').innerHTML = '<div class="dash-section-title">COMISIONES</div>' + getHtmlErrorRedConReintentar(err && err.message ? err.message : 'Error de conexión');
             } else {
                document.getElementById('app').innerHTML = '<div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ' + (err && err.message ? err.message : '') + '</div>';
             }
          }).obtenerTodasLasComisiones();
          return;
       }
 
       // Cargar objetivos en paralelo (no bloquea la carga de datos del vendedor)
       google.script.run.withSuccessHandler(resObjs => {
          // Validar que resObjs existe y tiene data
          if (resObjs && !resObjs.error && resObjs.data && Array.isArray(resObjs.data)) {
             ALL_OBJECTIVES = resObjs.data.filter(o => o && o.anio != null && o.mes != null && Number.isFinite(Number(o.rango)));
          } else {
             // Si hay error o no hay datos, inicializar vacío
             ALL_OBJECTIVES = [];
          }
       }).withFailureHandler(err => {
          // Si falla obtenerTodosLosObjetivos, inicializar vacío
          console.error('Error al obtener objetivos:', err);
          ALL_OBJECTIVES = [];
       }).obtenerTodosLosObjetivos();
 
       // Cargar datos del vendedor de forma independiente (no espera a los objetivos)
       if (hoja !== 'CONSOLIDADO' && hoja !== '%' && typeof VENTAS_CACHE !== 'undefined' && VENTAS_CACHE.vendedor === hoja && VENTAS_CACHE.data && (Date.now() - VENTAS_CACHE.ts) < VENTAS_CACHE_TTL_MS) {
          NAVEGANDO = false;
          if (typeof debugLog === 'function') debugLog('VENTAS', 'Vendedor desde caché', { vendedor: hoja, segundos: Math.round((Date.now() - VENTAS_CACHE.ts) / 1000) });
          renderVendedor(VENTAS_CACHE.data, hoja);
          return;
       }
       try {
          google.script.run.withSuccessHandler(data => {
             try {
                NAVEGANDO = false;
                if (HOJA_ACTUAL !== hoja) return;
                if (!data) {
                   let titulo = 'VENTAS: ' + hoja.toUpperCase();
                  document.getElementById('app').innerHTML = `<div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: No se recibieron datos</div>`;
                   return;
                }
                if (data.error) {
                   let titulo = 'VENTAS: ' + hoja.toUpperCase();
                  document.getElementById('app').innerHTML = `<div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${data.mensaje || 'Error desconocido'}</div>`;
                   return;
                }
                if (hoja === 'CONSOLIDADO') {
                   if (data.data) renderConsolidado(data.data);
                   else console.error('No hay datos para consolidado');
                } else if (hoja === '%') {
                   if (data.data) renderComisiones(data.data);
                   else console.error('No hay datos para comisiones');
                } else {
                   if (data.data) {
                      if (typeof VENTAS_CACHE !== 'undefined') {
                         VENTAS_CACHE.vendedor = hoja;
                         VENTAS_CACHE.data = data.data;
                         VENTAS_CACHE.ts = Date.now();
                      }
                      renderVendedor(data.data, hoja);
                   } else console.error('No hay datos para vendedor:', hoja);
                }
             } catch (renderError) {
                NAVEGANDO = false;
                console.error('Error al renderizar:', renderError);
                if (HOJA_ACTUAL !== hoja) return;
                let titulo = 'VENTAS: ' + hoja.toUpperCase();
                document.getElementById('app').innerHTML = `<div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al renderizar: ${renderError.message}</div>`;
             }
          }).withFailureHandler(err => {
             NAVEGANDO = false;
             console.error('Error al obtener datos de hoja:', err);
             if (HOJA_ACTUAL !== hoja) return;
             let titulo = 'VENTAS: ' + hoja.toUpperCase();
             let errorMsg = err && err.message ? err.message : (err && err.toString ? err.toString() : 'Error desconocido');
             document.getElementById('app').innerHTML = `<div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${errorMsg}</div>`;
          }).obtenerDatosDeHoja(hoja);
       } catch (e) {
          NAVEGANDO = false;
          console.error('Error al iniciar carga:', e);
          let titulo = 'VENTAS: ' + hoja.toUpperCase();
          document.getElementById('app').innerHTML = `<div class="dash-section-title">${titulo}</div><div style="padding:40px; text-align:center; color:#ef4444;">Error al iniciar carga: ${e.message}</div>`;
       }
    }
 
    function renderMantenimiento() {
      let html = `<div class="home-grid"><div class="home-card disabled"><div class="home-icon"><span class="material-symbols-outlined">construction</span></div><div class="home-title">Próximamente</div></div></div>`;
       document.getElementById('app').innerHTML = html;
    }
 
    function textoRangoComisionesUi(r) {
       if (r === 0 || r === '0') return 'MIN';
       if (r == null || r === undefined) return '-';
       var n = Number(r);
       if (!Number.isFinite(n)) return '-';
       if (n > 0) return 'R' + n;
       return '-';
    }

    function renderComisiones(dataComisiones) {
      let html = `<div class="dash-section-title">COMISIONES</div>`;
 
       const trimestres = ['T1', 'T2', 'T3', 'T4'];
 
       trimestres.forEach(trimKey => {
          let trimData = dataComisiones[trimKey];
          if (!trimData) return;
 
          html += `<div style="margin-top: 30px; margin-bottom: 40px;">
                <div style="color: var(--accent); font-weight: 700; font-size: 20px; margin-bottom: 20px; text-align: center; text-transform: uppercase;">${trimData.nombre}</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">`;
 
          if (trimData.vendedores && trimData.vendedores.length > 0) {
             trimData.vendedores.forEach(v => {
                let ventas = trimData.ventas[v.nombre] || {
                   mes1: 0, mes2: 0, mes3: 0, total: 0,
                   rangoMes1: null, porcentajeMes1: 0,
                   rangoMes2: null, porcentajeMes2: 0,
                   rangoMes3: null, porcentajeMes3: 0,
                   nombreMes1: 'Mes 1',
                   nombreMes2: 'Mes 2',
                   nombreMes3: 'Mes 3'
                };
 
                let rangoTexto1 = textoRangoComisionesUi(ventas.rangoMes1);
                let porcentajeTexto1 = Number(ventas.porcentajeMes1) > 0 ? `${Number(ventas.porcentajeMes1).toFixed(1)}%` : '-';
                let rangoTexto2 = textoRangoComisionesUi(ventas.rangoMes2);
                let porcentajeTexto2 = Number(ventas.porcentajeMes2) > 0 ? `${Number(ventas.porcentajeMes2).toFixed(1)}%` : '-';
                let rangoTexto3 = textoRangoComisionesUi(ventas.rangoMes3);
                let porcentajeTexto3 = Number(ventas.porcentajeMes3) > 0 ? `${Number(ventas.porcentajeMes3).toFixed(1)}%` : '-';
 
                html += `
                      <div class="method-card" style="background: var(--sidebar); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px;">
                         <div style="font-size: 16px; font-weight: 700; color: white; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; text-align: center;">${v.nombre}</div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes1 || 'Mes 1'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes1)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto1}</span>
                                  <span style="color: ${ventas.porcentajeMes1 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto1}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes2 || 'Mes 2'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes2)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto2}</span>
                                  <span style="color: ${ventas.porcentajeMes2 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto2}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-bottom: 20px;">
                            <div style="font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase;">${ventas.nombreMes3 || 'Mes 3'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                               <span style="color: white; font-weight: 600;">${formatNumberAr(ventas.mes3)}</span>
                               <div style="display: flex; gap: 12px;">
                                  <span style="color: white; font-size: 11px; font-weight: 600;">${rangoTexto3}</span>
                                  <span style="color: ${ventas.porcentajeMes3 >= 100 ? 'var(--accent)' : 'white'}; font-size: 11px; font-weight: 700;">${porcentajeTexto3}</span>
                               </div>
                            </div>
                         </div>
                         
                         <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid var(--border-color);">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                               <span style="font-size: 13px; color: var(--accent); font-weight: 700; text-transform: uppercase;">Total</span>
                               <span style="color: var(--accent); font-weight: 800; font-size: 18px;">${formatNumberAr(ventas.total)}</span>
                            </div>
                         </div>
                      </div>`;
             });
          } else {
             html += `<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #94a3b8;">No hay datos disponibles</div>`;
          }
 
          html += `</div></div>`;
       });
 
       document.getElementById('app').innerHTML = html;
    }
 
    // NUEVA FUNCIÓN: Renderizar gestión de usuarios
    function renderGestionUsuarios() {
      var backNav = '<div class="dash-section-title">GESTIÓN DE USUARIOS</div>';
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { renderGestionUsuarios(); };
                document.getElementById('app').innerHTML = backNav + getHtmlErrorRedConReintentar(res.mensaje || 'Error al cargar usuarios');
             } else {
                mostrarAlerta('Error al cargar vendedores: ' + (res.mensaje || ''));
             }
             return;
          }
 
         let html = `<div class="dash-section-title">GESTIÓN DE USUARIOS</div>
             <div class="usuarios-gestion-toolbar">
                <button class="btn-submit" type="button" onclick="abrirModalVendedor('crear')">
                   <span class="material-symbols-outlined">add</span>
                   Agregar usuario
                </button>
             </div>
             <div class="usuarios-gestion-wrap">
                <section class="usuarios-gestion-section" id="usuarios-gestion-activos-section">
                   <h3 class="usuarios-gestion-section-title">Usuarios activos</h3>
                   <div class="usuarios-gestion-grid" id="usuarios-gestion-grid-activos"></div>
                </section>
                <section class="usuarios-gestion-section usuarios-gestion-section--inactivos" id="usuarios-gestion-inactivos-section" hidden>
                   <h3 class="usuarios-gestion-section-title">Usuarios inactivos</h3>
                   <div class="usuarios-gestion-grid" id="usuarios-gestion-grid-inactivos"></div>
                </section>
             </div>`;
 
          document.getElementById('app').innerHTML = html;
 
          function escHtmlUsuariosGestion(s) {
             return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
          }
          function escAttrUsuariosGestion(s) {
             return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r?\n/g, ' ');
          }
          function tarjetaUsuarioGestion(u, activo) {
             var rolEff = USUARIO_ACTUAL ? (typeof getRolEfectivo === 'function' ? getRolEfectivo() : USUARIO_ACTUAL.rol) : '';
             var puedeEditar = USUARIO_ACTUAL && (String(rolEff).toUpperCase() === 'ADMIN' || String(rolEff).toUpperCase() === 'ROOT');
             var tipoObjDisplay = u.rol === 'VENDEDOR' ? (u.tipoObjetivo || 'RANGO') : '-';
             var nombreEsc = escHtmlUsuariosGestion(u.nombre);
             var emailEsc = escHtmlUsuariosGestion(u.email || '');
             var emailAttr = escAttrUsuariosGestion(u.email || '');
             var rolEsc = escHtmlUsuariosGestion(u.rol || 'VENDEDOR');
             var tipoEsc = escHtmlUsuariosGestion(tipoObjDisplay);
             var nombreAttr = escAttrUsuariosGestion(u.nombre);
             var tipoObjAttr = escAttrUsuariosGestion(u.tipoObjetivo || 'RANGO');
             var rolAttr = escAttrUsuariosGestion(u.rol || 'VENDEDOR');
             var inactiveMod = activo ? '' : ' usuarios-gestion-card--inactive';
             var badgeCls = activo ? 'usuarios-gestion-card-badge--activo' : 'usuarios-gestion-card-badge--inactivo';
             var badgeTxt = activo ? 'Activo' : 'Inactivo';
             var btnToggle = activo
                ? '<button type="button" class="usuarios-gestion-card-btn usuarios-gestion-card-btn--danger" onclick="cambiarEstadoUsuario(\'' + emailAttr + '\', false)">Desactivar</button>'
                : '<button type="button" class="usuarios-gestion-card-btn usuarios-gestion-card-btn--ok" onclick="cambiarEstadoUsuario(\'' + emailAttr + '\', true)">Activar</button>';
             var btnEdit = puedeEditar
                ? '<button type="button" class="action-btn btn-edit usuarios-gestion-card-btn-icon" title="Editar" aria-label="Editar" onclick="abrirModalVendedor(\'editar\', \'' + nombreAttr + '\', \'' + emailAttr + '\', \'' + tipoObjAttr + '\', \'' + rolAttr + '\')"><span class="material-symbols-outlined">edit</span></button>'
                : '';
             return '<article class="usuarios-gestion-card' + inactiveMod + '">' +
                '<div class="usuarios-gestion-card-head">' +
                '<span class="usuarios-gestion-card-name">' + nombreEsc + '</span>' +
                '<span class="usuarios-gestion-card-badge ' + badgeCls + '">' + badgeTxt + '</span></div>' +
                '<dl class="usuarios-gestion-card-meta">' +
                '<div class="usuarios-gestion-card-row"><dt>Email</dt><dd>' + emailEsc + '</dd></div>' +
                '<div class="usuarios-gestion-card-row"><dt>Rol</dt><dd>' + rolEsc + '</dd></div>' +
                '<div class="usuarios-gestion-card-row"><dt>Tipo objetivo</dt><dd>' + tipoEsc + '</dd></div>' +
                '</dl>' +
                '<div class="usuarios-gestion-card-actions">' + btnEdit + btnToggle + '</div></article>';
          }
 
          // Cargar todos los usuarios
          google.script.run.withSuccessHandler(usuariosRes => {
             if (usuariosRes.error) {
                mostrarAlerta('Error: ' + usuariosRes.mensaje);
                return;
             }
 
             var gridAct = document.getElementById('usuarios-gestion-grid-activos');
             var gridInact = document.getElementById('usuarios-gestion-grid-inactivos');
             var secInact = document.getElementById('usuarios-gestion-inactivos-section');
             if (!gridAct || !gridInact) return;
 
             var activos = usuariosRes.usuarios.filter(function (u) { return u.activo && u.rol !== 'ROOT'; });
             var inactivos = usuariosRes.usuarios.filter(function (u) { return !u.activo && u.rol !== 'ROOT'; });
 
             var htmlAct = '';
             activos.forEach(function (u) { htmlAct += tarjetaUsuarioGestion(u, true); });
             gridAct.innerHTML = htmlAct || '<p class="usuarios-gestion-empty">No hay usuarios activos.</p>';
 
             var htmlInact = '';
             inactivos.forEach(function (u) { htmlInact += tarjetaUsuarioGestion(u, false); });
             gridInact.innerHTML = htmlInact || '<p class="usuarios-gestion-empty">No hay usuarios inactivos.</p>';
             if (secInact) secInact.hidden = inactivos.length === 0;
          }).withFailureHandler(function (err) {
             if (typeof getHtmlErrorRedConReintentar === 'function') {
                window._reintentarCarga = function () { renderGestionUsuarios(); };
                document.getElementById('app').innerHTML = backNav + getHtmlErrorRedConReintentar(err && (err.message || err.toString()) ? (err.message || err.toString()) : 'Error de conexión');
             } else {
                mostrarAlerta('Error de conexión al cargar usuarios');
             }
          }).obtenerTodosUsuarios();
       }).withFailureHandler(function (err) {
          if (typeof getHtmlErrorRedConReintentar === 'function') {
             window._reintentarCarga = function () { renderGestionUsuarios(); };
             document.getElementById('app').innerHTML = backNav + getHtmlErrorRedConReintentar(err && (err.message || err.toString()) ? (err.message || err.toString()) : 'Error de conexión');
          } else {
             mostrarAlerta('Error de conexión al cargar usuarios');
          }
       }).obtenerTodosUsuarios();
    }
 
    // NUEVA FUNCIÓN: Cambiar estado de usuario
    function cambiarEstadoUsuario(email, activo) {
       let accion = activo ? 'activar' : 'desactivar';
       abrirConfirmacion(`¿Estás seguro de ${accion} a este usuario?`, () => {
          google.script.run.withSuccessHandler(res => {
             if (res.error) {
                mostrarAlerta('Error: ' + res.mensaje);
             } else {
                if (typeof mostrarToast === 'function') mostrarToast(`Usuario ${activo ? 'activado' : 'desactivado'} correctamente.`);
                renderGestionUsuarios();
                renderizarVendedores();
             }
          }).actualizarEstadoUsuario(email, activo);
       });
    }
 
    // NUEVA FUNCIÓN: Renderizar clientes
    function renderClientes() {
       // Todos ven la misma vista (sin filtro de vendedor)
      let html = `<div class="dash-section-title">CLIENTES</div>
             <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                   <label class="form-label">País</label>
                   <select class="form-input" id="selPaisCliente" onchange="filtrarClientesTabla()">
                      <option value="">Todos los países</option>
                      <option value="Argentina">Argentina</option>
                      <option value="Chile">Chile</option>
                      <option value="Mexico">Mexico</option>
                      <option value="España">España</option>
                      <option value="EEUU">EEUU</option>
                      <option value="Brasil">Brasil</option>
                      <option value="Uruguay">Uruguay</option>
                      <option value="RDM">RDM</option>
                   </select>
                </div>
                <div style="flex: 2; min-width: 200px;">
                   <label class="form-label">Buscar</label>
                   <input type="text" class="form-input" id="buscarCliente" placeholder="Buscar por nombre, apellido, DNI, correo..." oninput="filtrarClientesTabla()">
                </div>
             </div>
             <div id="clientes-container"></div>`;
 
       document.getElementById('app').innerHTML = html;
 
       // Cargar todos los clientes (sin filtro de vendedor)
       cargarClientesVendedor('TODOS');
    }
 
    // NUEVA FUNCIÓN: Filtrar clientes en la tabla por país y búsqueda
    function filtrarClientesTabla() {
       let filtroPais = document.getElementById('selPaisCliente')?.value || '';
       let filtroBuscar = (document.getElementById('buscarCliente')?.value || '').toLowerCase();
 
       let tableBody = document.getElementById('clientes-table-body');
       if (!tableBody) return;
 
       let todasLasFilas = Array.from(tableBody.querySelectorAll('tr'));
       let filasVisibles = 0;
 
       todasLasFilas.forEach(tr => {
          let tds = tr.querySelectorAll('td');
          if (tds.length < 7) {
             tr.style.display = ''; // Mantener filas de mensaje sin datos
             return;
          }
 
          // Índices de las columnas en la tabla (sin ID visible)
          // Nombre=0, Apellido=1, DNI=2, Teléfono=3, Correo=4, Domicilio=5, Provincia=6, País=7
          let idxPais = 7; // Columna País (índice 7)
          let idxNombre = 0; // Columna Nombre
          let idxApellido = 1; // Columna Apellido
          let idxDni = 2; // Columna DNI
          let idxCorreo = 4; // Columna Correo
 
          let pais = (tds[idxPais]?.textContent || '').trim();
          let nombre = (tds[idxNombre]?.textContent || '').toLowerCase();

    let CLIENTES_ACTUALES = [];
    /** Clientes del país actual en el modal de venta (autocompletado). */
    let CLIENTES_LISTA_VENTA_CACHE = [];
    /** Lista filtrada mostrada en el panel (para flechas / Enter). */
    let CLIENTE_COMBO_FILTRADA_ACTUAL = [];
    let CLIENTE_COMBO_HIGHLIGHT_INDEX = -1;

    function nombreCompletoClienteVenta(cliente) {
       let nombreCompleto = `${cliente.nombre} ${cliente.apellido}`.trim();
       if (!nombreCompleto) nombreCompleto = cliente.nombre || 'Sin nombre';
       return nombreCompleto;
    }

    function ordenarClientesVentaAlfabeticamente(lista) {
       if (!lista || !lista.length) return [];
       return lista.slice().sort(function (a, b) {
          return nombreCompletoClienteVenta(a).localeCompare(nombreCompletoClienteVenta(b), 'es', { sensitivity: 'base' });
       });
    }

    function filtrarClientesVentaPorTexto(lista, q) {
       if (!lista || !lista.length) return [];
       q = (q || '').trim().toLowerCase();
       var out;
       if (!q) {
          out = lista.slice();
       } else {
          var qTel = q.replace(/\s/g, '');
          var normalize = function (s) {
             return (s || '').toString().toLowerCase();
          };
          out = lista.filter(function (c) {
             var nc = normalize(nombreCompletoClienteVenta(c));
             if (nc.indexOf(q) !== -1) return true;
             if (normalize(c.dni).indexOf(q) !== -1) return true;
             if (qTel && normalize(c.telefono).replace(/\s/g, '').indexOf(qTel) !== -1) return true;
             if (normalize(c.correo).indexOf(q) !== -1) return true;
             return false;
          });
       }
       return ordenarClientesVentaAlfabeticamente(out);
    }

    function setClienteVentaCombo(nombreCompleto) {

    function aplicarHighlightClienteCombo() {
       var panel = document.getElementById('clienteComboPanel');
       if (!panel || panel.hidden) return;
       var opts = panel.querySelectorAll('.cliente-combobox-option');
       opts.forEach(function (el, i) {
          el.classList.toggle('is-active', i === CLIENTE_COMBO_HIGHLIGHT_INDEX);
       });
       if (CLIENTE_COMBO_HIGHLIGHT_INDEX >= 0 && opts[CLIENTE_COMBO_HIGHLIGHT_INDEX]) {
          opts[CLIENTE_COMBO_HIGHLIGHT_INDEX].scrollIntoView({ block: 'nearest' });
       }
    }

    function renderClienteComboPanel(filtrados) {
       var panel = document.getElementById('clienteComboPanel');
       var textEl = document.getElementById('clienteComboText');
       if (!panel) return;
       panel.innerHTML = '';
       CLIENTE_COMBO_HIGHLIGHT_INDEX = -1;
       if (textEl) textEl.setAttribute('aria-expanded', 'true');
       if (!filtrados || !filtrados.length) {
          CLIENTE_COMBO_FILTRADA_ACTUAL = [];
          var msg = document.createElement('div');
          msg.className = 'cliente-combobox-msg';
          msg.textContent = 'Sin resultados';
          panel.appendChild(msg);
          panel.hidden = false;
          return;
       }
       CLIENTE_COMBO_FILTRADA_ACTUAL = filtrados.slice();
       filtrados.forEach(function (c, idx) {
          var nc = nombreCompletoClienteVenta(c);
          var row = document.createElement('div');
          row.className = 'cliente-combobox-option';
          row.setAttribute('role', 'option');
          row.textContent = nc;
          row.addEventListener('mouseenter', function () {
             CLIENTE_COMBO_HIGHLIGHT_INDEX = idx;
             aplicarHighlightClienteCombo();
          });
          row.addEventListener('mousedown', function (ev) {
             ev.preventDefault();
             seleccionarClienteComboVenta(c);
          });
          panel.appendChild(row);
       });
       panel.hidden = false;
    }

    function seleccionarClienteComboVenta(cliente) {
       setClienteVentaCombo(nombreCompletoClienteVenta(cliente));
       cerrarPanelClienteCombo();

    function syncClienteComboDesdeTexto() {
       var hidden = document.getElementById('clienteInput');
       var text = document.getElementById('clienteComboText');
       if (!hidden || !text) return;
       var t = (text.value || '').trim();
       if (!t) {
          hidden.value = '';
          return;
       }
       var lower = t.toLowerCase();
       var lista = CLIENTES_LISTA_VENTA_CACHE;
       for (var i = 0; i < lista.length; i++) {
          var nc = nombreCompletoClienteVenta(lista[i]);
          if (nc.toLowerCase() === lower) {
             hidden.value = nc;
             text.value = nc;
             return;
          }
       }
       hidden.value = '';
    }

    function actualizarPanelClienteComboDesdeInput() {
       var textEl = document.getElementById('clienteComboText');
       if (!textEl || textEl.disabled) return;
       var q = textEl.value || '';
       var filtrados = filtrarClientesVentaPorTexto(CLIENTES_LISTA_VENTA_CACHE, q);
       renderClienteComboPanel(filtrados);
    }

    function initClienteComboVenta() {
       var textEl = document.getElementById('clienteComboText');
       if (!textEl || textEl.dataset.comboInit) return;
       textEl.dataset.comboInit = '1';

       textEl.addEventListener('input', function () {
          syncClienteComboDesdeTexto();
          actualizarPanelClienteComboDesdeInput();
       });
       textEl.addEventListener('focus', function () {
          if (textEl.disabled || !CLIENTES_LISTA_VENTA_CACHE.length) return;
          actualizarPanelClienteComboDesdeInput();
       });
       textEl.addEventListener('blur', function () {
          setTimeout(function () {
             cerrarPanelClienteCombo();
             syncClienteComboDesdeTexto();
          }, 200);
       });
       textEl.addEventListener('keydown', function (ev) {
          var panel = document.getElementById('clienteComboPanel');
          var panelAbierto = panel && !panel.hidden && CLIENTE_COMBO_FILTRADA_ACTUAL.length > 0;

          if (ev.key === 'Escape') {
             cerrarPanelClienteCombo();
             ev.preventDefault();
             return;
          }

          if (ev.key === 'ArrowDown') {
             if (textEl.disabled || !CLIENTES_LISTA_VENTA_CACHE.length) return;
             ev.preventDefault();
             if (!panelAbierto) {
                actualizarPanelClienteComboDesdeInput();
                if (!CLIENTE_COMBO_FILTRADA_ACTUAL.length) return;
                CLIENTE_COMBO_HIGHLIGHT_INDEX = 0;
             } else if (CLIENTE_COMBO_HIGHLIGHT_INDEX < 0) {
                CLIENTE_COMBO_HIGHLIGHT_INDEX = 0;
             } else {
                CLIENTE_COMBO_HIGHLIGHT_INDEX = Math.min(
                   CLIENTE_COMBO_HIGHLIGHT_INDEX + 1,
                   CLIENTE_COMBO_FILTRADA_ACTUAL.length - 1
                );
             }
             aplicarHighlightClienteCombo();
             return;
          }

          if (ev.key === 'ArrowUp') {
             if (!panelAbierto) return;
             ev.preventDefault();
             if (CLIENTE_COMBO_HIGHLIGHT_INDEX <= 0) {
                CLIENTE_COMBO_HIGHLIGHT_INDEX = -1;
                aplicarHighlightClienteCombo();
                return;
             }
             CLIENTE_COMBO_HIGHLIGHT_INDEX -= 1;
             aplicarHighlightClienteCombo();
             return;
          }

          if (ev.key === 'Enter') {
             if (
                panelAbierto &&
                CLIENTE_COMBO_HIGHLIGHT_INDEX >= 0 &&
                CLIENTE_COMBO_FILTRADA_ACTUAL[CLIENTE_COMBO_HIGHLIGHT_INDEX]
             ) {
                ev.preventDefault();
                seleccionarClienteComboVenta(CLIENTE_COMBO_FILTRADA_ACTUAL[CLIENTE_COMBO_HIGHLIGHT_INDEX]);
             }
          }
       });
       document.addEventListener('mousedown', function onDocMouseClienteCombo(e) {
          if (e.target && e.target.closest && e.target.closest('.cliente-combobox')) return;
          if (!document.getElementById('clienteComboPanel') || document.getElementById('clienteComboPanel').hidden) return;
          cerrarPanelClienteCombo();
          syncClienteComboDesdeTexto();
       });
    }

    // NUEVA FUNCIÓN: Actualizar selector de clientes en formulario de venta (combobox)
    function actualizarSelectorClientes(vendedor) {
       var clienteHidden = document.getElementById('clienteInput');
       var comboText = document.getElementById('clienteComboText');
       var paisSelect = document.getElementById('paisInput');
 
       if (!clienteHidden || !comboText) {
          console.error('No se encontró clienteInput / clienteComboText');
          return;
       }
 
       var paisSeleccionado = paisSelect ? paisSelect.value : '';
       var valorPreservar = ((clienteHidden.value || '').trim() || (comboText.value || '').trim());
 
       CLIENTES_LISTA_VENTA_CACHE = [];
       cerrarPanelClienteCombo();
 
       if (!paisSeleccionado || paisSeleccionado === '') {
          limpiarClienteVentaCombo();
          comboText.disabled = true;
          comboText.placeholder = 'Seleccioná un país primero...';
          return;
       }
 
       comboText.disabled = true;
       comboText.placeholder = 'Cargando clientes...';
       limpiarClienteVentaCombo();
 
       google.script.run.withSuccessHandler(res => {
          comboText.disabled = false;
          comboText.placeholder = 'Escribí para buscar cliente...';
          if (res.error) {
             CLIENTES_LISTA_VENTA_CACHE = [];
             limpiarClienteVentaCombo();
             comboText.disabled = true;
             comboText.placeholder = 'Error al cargar clientes';
             console.error('Error al obtener clientes:', res.mensaje);
             return;
          }
 
          var data = (res.data && res.data.length > 0) ? ordenarClientesVentaAlfabeticamente(res.data) : [];
          CLIENTES_LISTA_VENTA_CACHE = data;
 
          if (!data.length) {
             limpiarClienteVentaCombo();
             comboText.disabled = true;
             comboText.placeholder = 'No hay clientes en ese país';
             return;
          }
 
          if (valorPreservar && data.some(function (c) {
             return nombreCompletoClienteVenta(c) === valorPreservar;
          })) {
             setClienteVentaCombo(valorPreservar);
          } else {
             limpiarClienteVentaCombo();
          }
       }).withFailureHandler(err => {
          CLIENTES_LISTA_VENTA_CACHE = [];
          limpiarClienteVentaCombo();
          comboText.disabled = true;
          comboText.placeholder = 'Error al cargar clientes';
          console.error('Error al obtener clientes:', err);
       }).obtenerClientesVendedor(vendedor, paisSeleccionado);
    }

    // --- FUNCIÓN AUXILIAR: Convertir monto a ARS ---
    function convertirAArs(monto, pais) {
       if (pais === 'ARGENTINA') return monto;
       let cotizacion = COTIZACIONES[pais] || 1;
       return monto * cotizacion;
    }
 
    // --- FUNCIÓN AUXILIAR: Formatear monto en moneda del país ---
    function formatearMonedaPais(monto, pais) {
       if (pais === 'ARGENTINA') return formatNumberAr(monto);
       if (pais === 'CHILE') return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(monto);
       if (pais === 'MEXICO') return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(monto);
       if (pais === 'ESPANA') return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(monto);
       if (pais === 'BRASIL') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(monto);
       if (pais === 'URUGUAY') return new Intl.NumberFormat('es-UY', { style: 'currency', currency: 'UYU' }).format(monto);
       if (pais === 'EEUU' || pais === 'RDM') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(monto);
       return formatNumberAr(monto);
    }

                      <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">`;
 
             // Últimos 6 meses (Fila 3)
             ordenMeses.slice(6, 12).forEach(mes => {
                let d = data[mes] || {};
                let montoPaisArs = d[pais.key] || 0;
                let montoPaisOriginal = pais.key === 'ARGENTINA' ? montoPaisArs : (cotizacionPais > 0 && cotizacionPais !== 1 ? Math.round((montoPaisArs / cotizacionPais) * 100) / 100 : montoPaisArs);
                html += `
                      <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px; text-align: center;">
                         <div style="font-weight: 600; color: white; font-size: 11px; margin-bottom: 6px;">${mes}</div>
                         <div style="color: white; font-weight: 700; font-size: 13px; margin-bottom: 4px;">${formatearMonedaPais(montoPaisOriginal, pais.key)}</div>
                         <div style="color: #64748b; font-size: 9px;">(${formatNumberAr(montoPaisArs)})</div>
                      </div>`;
             });
 
             html += `</div></div>`;
          }
 
          html += `</div></div>`;
       });
 
       document.getElementById('app').innerHTML = html;
    }

    initClienteComboVenta();
 
</script>
