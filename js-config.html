<script>
    // Año activo para filtros y reportes (cambiar en un solo lugar)
    const ANIO_ACTIVO = 2026;
    const APP_VERSION = '1.5.0';

    /** Modo debug: poner a true para ver logs en consola (F12). También se puede activar en consola con: window.DEBUG = true */
    var DEBUG = false;

    /** Log solo si DEBUG está activo. Uso: debugLog('CAJA', 'Desde caché', { key: cacheKey }); */
    function debugLog(tag, message, data) {
       if (typeof window !== 'undefined' && (window.DEBUG === true || (typeof DEBUG !== 'undefined' && DEBUG === true))) {
          if (typeof console !== 'undefined' && console.log) {
             var prefix = '[DEBUG][' + (tag || 'APP') + '] ';
             if (data !== undefined) console.log(prefix + (message || ''), data);
             else console.log(prefix + (message || ''));
          }
       }
    }

    let GLOBAL_CONFIG = {}; // Se llenará estructurada por país
    let PAIS_CAJA_ACTUAL = 'ARGENTINA'; // País por defecto
    let PAIS_STOCK_ACTUAL = 'ARGENTINA'; // País por defecto para stock
    let VISTA_STOCK_ACTUAL = 'STOCK'; // Vista por defecto: 'STOCK' o 'MOVIMIENTOS'
    let ALL_OBJECTIVES = []; // Cache de objetivos
    let ALL_OBJECTIVES_ESPECIALES = {}; // Cache de objetivos especiales { trimestre: { vendedor: objetivo } }
    let COTIZACIONES = {};
    const TRIMESTRES = ["1° TRIMESTRE", "2° TRIMESTRE", "3° TRIMESTRE", "4° TRIMESTRE"];
    let HOJA_ACTUAL = 'HOME';
    let USUARIO_ACTUAL = null;
    let HISTORIAL_CACHE = [];
    let HISTORIAL_CAJA_COMPLETO = [];
    var VENTAS_CACHE = { vendedor: '', data: null, ts: 0 };
    var VENTAS_CACHE_TTL_MS = 30000; // Almacenar todos los movimientos para filtrar
    let FILTRO_TIPO_HISTORIAL = 'EGRESO'; // Filtro predeterminado
    let FILAS_EN_EDICION = {}; // { filaIndex: true/false } para rastrear qué filas están en modo edición
    let CAMBIOS_PENDIENTES = {}; // { filaIndex: { campo: valor } } para almacenar cambios no guardados

    let accionPendiente = null;
    let NAVEGANDO = false; // Flag para prevenir navegación múltiple

    /** Objeto de estado mínimo: lectura/escritura centralizada (get/set) y sincronización con variables globales. */
    var APP_STATE = {
       _data: {
          hojaActual: 'HOME',
          paisCaja: 'ARGENTINA',
          paisStock: 'ARGENTINA',
          vistaStock: 'STOCK'
       },
       get: function (key) {
          if (this._data.hasOwnProperty(key)) return this._data[key];
          return undefined;
       },
       set: function (key, val) {
          this._data[key] = val;
          if (key === 'hojaActual') HOJA_ACTUAL = val;
          if (key === 'paisCaja') PAIS_CAJA_ACTUAL = val;
          if (key === 'paisStock') PAIS_STOCK_ACTUAL = val;
          if (key === 'vistaStock') VISTA_STOCK_ACTUAL = val;
          return val;
       }
    };
    HOJA_ACTUAL = APP_STATE._data.hojaActual;
    PAIS_CAJA_ACTUAL = APP_STATE._data.paisCaja;
    PAIS_STOCK_ACTUAL = APP_STATE._data.paisStock;
    VISTA_STOCK_ACTUAL = APP_STATE._data.vistaStock;

    /** Rellena el select de año del consolidado con ANIO_ACTIVO-2 hasta ANIO_ACTIVO. Llamar al iniciar app o al entrar a consolidado. */
    function poblarAnioConsolidado() {
       var sel = document.getElementById('selAnioConsolidadoVentas');
       if (!sel || typeof ANIO_ACTIVO === 'undefined') return;
       var anio = ANIO_ACTIVO;
       sel.innerHTML = '';
       for (var a = anio - 2; a <= anio; a++) {
          var opt = document.createElement('option');
          opt.value = a;
          opt.textContent = a;
          if (a === anio) opt.selected = true;
          sel.appendChild(opt);
       }
    }

    // DETECTAR ESC PARA CERRAR MODALES
    document.addEventListener('keydown', function (event) {
       if (event.key === "Escape") {
          cerrarModals();
       }
    });

    // Listener para actualizar clientes cuando cambia el vendedor o el país en el modal de venta
    setTimeout(() => {
       let selVendedor = document.getElementById('selVendedor');
       if (selVendedor && !selVendedor.dataset.listenerAdded) {
          selVendedor.addEventListener('change', function () {
             actualizarSelectorClientes(this.value);
          });
          selVendedor.dataset.listenerAdded = 'true';
       }

       let paisInput = document.getElementById('paisInput');
       if (paisInput && !paisInput.dataset.listenerAdded) {
          paisInput.addEventListener('change', function () {
             // Actualizar clientes cuando cambia el país
             let selVendedor = document.getElementById('selVendedor');
             if (selVendedor && selVendedor.value) {
                actualizarSelectorClientes(selVendedor.value);
             }
          });
          paisInput.dataset.listenerAdded = 'true';
       }
    }, 2000);

    // --- NUEVA FUNCIÓN: CAMBIAR PAÍS EN CAJA ---
    function switchCountryCaja(pais) {
       PAIS_CAJA_ACTUAL = pais;

       // Actualizar visualmente las pestañas usando data-pais
       document.querySelectorAll('.tab-caja').forEach(el => {
          el.classList.remove('active-view');
          if (el.getAttribute('data-pais') === pais) {
             el.classList.add('active-view');
          }
       });

       // Recargar Balance y Selects para el país seleccionado
       cargarBalance();
       poblarSelectsCaja();
    }

    // --- FORMATO ARGENTINA ---
    function formatoMoneda(input) {
       let val = input.value.replace(/\D/g, '');
       if (!val) { input.value = ""; return; }
       let num = parseInt(val) / 100;
       input.value = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }).format(num).replace('ARS', '').trim();
    }
    function parseCurrency(str) {
       if (!str) return 0;
       if (typeof str === 'number') return str;
       let limpio = str.toString().replace(/[$.]/g, '').replace(',', '.').trim();
       return parseFloat(limpio) || 0;
    }
    /** Acepta formato DB (1.520919, 200000.50) y formato AR (200.000,00). Para input usuario usar parseCurrency. */
    function parseNumeric(val) {
       if (val == null) return 0;
       if (typeof val === 'number') return isNaN(val) ? 0 : val;
       var s = String(val).trim();
       if (!s) return 0;
       if (s.indexOf(',') !== -1) {
          return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0;
       }
       return parseFloat(s) || 0;
    }
    function formatNumberAr(num) {
       if (num === null || num === undefined) return "$ 0,00";
       return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 }).format(num);
    }
    function calcularTotal() {
       let cant = parseFloat(document.getElementById('cantInput').value) || 0;
       let precio = parseCurrency(document.getElementById('precioInput').value);
       let total = cant * precio;
       document.getElementById('totalDisplay').value = formatNumberAr(total);
    }

    function formatCurrency(amount, currencyCode) {
       if (!amount) amount = 0;
       return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode }).format(amount);
    }

    // --- UI HELPERS ---
    function setTipoCaja(tipo) {
       document.getElementById('tipoCaja').value = tipo;
       let btnEgreso = document.getElementById('btn-egreso');
       let btnIngreso = document.getElementById('btn-ingreso');
       if (tipo === 'EGRESO') { btnEgreso.classList.add('active-egreso'); btnIngreso.classList.remove('active-ingreso'); }
       else { btnIngreso.classList.add('active-ingreso'); btnEgreso.classList.remove('active-egreso'); }
    }

    function toggleSection(id) {
       let el = document.getElementById(id);
       let cat = el.previousElementSibling;
       if (el.classList.contains('open')) { el.classList.remove('open'); cat.classList.remove('active'); }
       else { el.classList.add('open'); cat.classList.add('active'); }
    }

    function parseFecha(s) {
       if (!s) return new Date(0);
       if (s instanceof Date) return s;
       let p = s.split('/');
       return new Date(p[2], p[1] - 1, p[0]);
    }

    // Muestra de inmediato back + título (sin skeleton; fondo hasta que cargue el contenido)
    function mostrarEstadoCarga(titulo, backNav, vista) {
       let backNavHtml = backNav || '';
       document.getElementById('app').innerHTML = `
             ${backNavHtml}
             <div class="dash-section-title">${titulo}</div>
          `;
    }
</script>
