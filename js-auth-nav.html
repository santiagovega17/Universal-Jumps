<script>
    (function() {
       var btn = document.getElementById('btn-entrar');
       if (btn) { btn.disabled = true; btn.innerText = 'Verificando sesión...'; }
    })();

    window.addEventListener('supabase-auth-ready', function(ev) {
       var d = ev && ev.detail;
       var btn = document.getElementById('btn-entrar');
       if (d && d.hasSession && d.perfil) {
          aplicarPerfilYMostrarApp(d.perfil);
          return;
       }
       if (btn) { btn.disabled = false; btn.innerText = (d && d.authError) ? 'Cambiar de Cuenta' : 'Ingresar'; }
       if (d && d.authError) {
          var err = document.getElementById('login-error');
          var switcher = document.getElementById('account-switcher');
          var wrongEmail = document.getElementById('wrong-email');
          if (err) { err.innerText = d.mensaje || 'Tu usuario no tiene permisos.'; err.style.display = 'block'; }
          if (switcher) switcher.style.display = 'block';
          if (wrongEmail && d.emailDetectado) wrongEmail.innerText = d.emailDetectado;
       }
    });
 
    function aplicarPerfilYMostrarApp(perfil) {
       USUARIO_ACTUAL = perfil; aplicarPermisos(perfil);
       document.getElementById('login-screen').style.opacity = '0';
       setTimeout(function() {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app-container').style.display = 'flex';
          var vEl = document.getElementById('sidebar-version');
          if (vEl && typeof APP_VERSION !== 'undefined') vEl.textContent = 'v' + APP_VERSION;
       }, 500);
       inicializarApp();
    }

    // --- ROOT "Ver como" (solo UI, no cambia permisos reales) ---
    var VIEW_AS_STORAGE_KEY_ROLE = 'uj_view_as_role';
    var VIEW_AS_STORAGE_KEY_HOJA = 'uj_view_as_hoja';
    var VIEW_AS_ROLE = '';
    var VIEW_AS_HOJA = '';
    var VIEW_AS_VENDEDORES = [];

    function isRootUser() {
       return USUARIO_ACTUAL && String(USUARIO_ACTUAL.rol || '').toUpperCase() === 'ROOT';
    }

    function getRolEfectivo() {
       var real = USUARIO_ACTUAL ? String(USUARIO_ACTUAL.rol || '').toUpperCase() : '';
       if (real === 'ROOT' && VIEW_AS_ROLE) return String(VIEW_AS_ROLE || '').toUpperCase();
       return real;
    }

    function getHojaEfectiva() {
       var rolEff = getRolEfectivo();
       if (rolEff === 'VENDEDOR' && isRootUser() && VIEW_AS_HOJA) return VIEW_AS_HOJA;
       return USUARIO_ACTUAL ? (USUARIO_ACTUAL.hoja || '') : '';
    }

    function loadViewAsFromStorage() {
       try {
          VIEW_AS_ROLE = (localStorage.getItem(VIEW_AS_STORAGE_KEY_ROLE) || '').toUpperCase();
          VIEW_AS_HOJA = (localStorage.getItem(VIEW_AS_STORAGE_KEY_HOJA) || '').toString();
       } catch (_) {
          VIEW_AS_ROLE = '';
          VIEW_AS_HOJA = '';
       }
    }

    function saveViewAsToStorage() {
       try {
          localStorage.setItem(VIEW_AS_STORAGE_KEY_ROLE, VIEW_AS_ROLE || '');
          localStorage.setItem(VIEW_AS_STORAGE_KEY_HOJA, VIEW_AS_HOJA || '');
       } catch (_) {}
    }

    function updateViewAsControls() {
       var cont = document.getElementById('viewas-container');
       if (!cont) return;
       if (!isRootUser()) {
          cont.style.display = 'none';
          return;
       }
       cont.style.display = 'flex';
       var selRole = document.getElementById('viewas-role');
       var selHoja = document.getElementById('viewas-hoja');
       if (selRole) selRole.value = VIEW_AS_ROLE || '';
       var showHoja = String(VIEW_AS_ROLE || '').toUpperCase() === 'VENDEDOR';
       if (selHoja) selHoja.style.display = showHoja ? 'inline-flex' : 'none';
    }

    function populateViewAsHojaOptions() {
       var selHoja = document.getElementById('viewas-hoja');
       if (!selHoja) return;
       var prev = VIEW_AS_HOJA || '';
       selHoja.innerHTML = '<option value=\"\">Vendedor...</option>';
       (VIEW_AS_VENDEDORES || []).forEach(function (v) {
          var opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          selHoja.appendChild(opt);
       });
       if (prev && Array.prototype.some.call(selHoja.options, function (o) { return o.value === prev; })) selHoja.value = prev;
       else selHoja.value = '';
    }

    function bindViewAsControls() {
       var selRole = document.getElementById('viewas-role');
       var selHoja = document.getElementById('viewas-hoja');
       if (selRole && !selRole._ujBound) {
          selRole._ujBound = true;
          selRole.addEventListener('change', function () {
             VIEW_AS_ROLE = String(selRole.value || '').toUpperCase();
             if (VIEW_AS_ROLE !== 'VENDEDOR') VIEW_AS_HOJA = '';
             saveViewAsToStorage();
             updateViewAsControls();
             populateViewAsHojaOptions();
             if (USUARIO_ACTUAL) aplicarPermisos(USUARIO_ACTUAL);
             navegar(null, 'HOME');
          });
       }
       if (selHoja && !selHoja._ujBound) {
          selHoja._ujBound = true;
          selHoja.addEventListener('change', function () {
             VIEW_AS_HOJA = String(selHoja.value || '');
             saveViewAsToStorage();
             if (USUARIO_ACTUAL) aplicarPermisos(USUARIO_ACTUAL);
             navegar(null, 'HOME');
          });
       }
    }
 
    function iniciarSesion() {
       var btn = document.getElementById('btn-entrar');
       if (!btn || btn.disabled) return;
       var err = document.getElementById('login-error');
       var switcher = document.getElementById('account-switcher');
       btn.disabled = true; btn.innerText = "Verificando..."; err.style.display = 'none'; switcher.style.display = 'none';
 
       if (window.SupabaseAuth && window.SupabaseAuth.ready && !window.SupabaseAuth.useDemo) {
          window.SupabaseAuth.signInWithGoogle().then(function() {
             btn.disabled = false; btn.innerText = "Ingresar";
          }).catch(function(e) {
             err.innerText = "Error: " + (e && e.message ? e.message : "No se pudo iniciar sesión"); err.style.display = 'block';
             btn.disabled = false; btn.innerText = "Ingresar";
          });
          return;
       }
 
       google.script.run.withSuccessHandler(function(perfil) {
          if (perfil.error) {
             btn.disabled = false; btn.innerText = "Ingresar";
             if (perfil.authError) {
                err.innerText = "Tu usuario no tiene permisos."; err.style.display = 'block';
                document.getElementById('wrong-email').innerText = perfil.emailDetectado || ''; switcher.style.display = 'block';
             } else { err.innerText = perfil.mensaje; err.style.display = 'block'; }
          } else {
             aplicarPerfilYMostrarApp(perfil);
          }
       }).withFailureHandler(function(e) { err.innerText = "Error: " + e; err.style.display = 'block'; btn.disabled = false; btn.innerText = "Ingresar"; }).obtenerPerfilUsuario();
    }
 
    function cambiarCuentaGoogle() {
       if (window.SupabaseAuth && window.SupabaseAuth.ready && !window.SupabaseAuth.useDemo) {
          window.SupabaseAuth.signOut().then(function() {
             window.SupabaseAuth.signInWithGoogle();
          });
          return;
       }
       window.open("https://accounts.google.com/AccountChooser?service=wise&continue=" + encodeURIComponent(window.location.href), '_top');
    }
 
    function aplicarPermisos(perfil) {
       document.getElementById('user-display-name').innerText = perfil.email;
       loadViewAsFromStorage();
       bindViewAsControls();
       updateViewAsControls();

       var rolEff = getRolEfectivo();
       var hojaEff = getHojaEfectiva();
       var label = perfil.rol;
       if (isRootUser() && rolEff && rolEff !== 'ROOT') {
          label = 'ROOT (viendo como ' + rolEff + (rolEff === 'VENDEDOR' && hojaEff ? ' - ' + hojaEff : '') + ')';
       }
       document.getElementById('user-display-role').innerText = label + (perfil.hoja !== 'TODAS' ? ` (${perfil.hoja})` : '');
 
       // Reset básico de visibilidad antes de aplicar reglas (para poder alternar "ver como" sin refrescar).
       var adminGroup0 = document.getElementById('nav-admin-group');
       if (adminGroup0) adminGroup0.style.display = '';
       var inventarioGroup0 = document.getElementById('nav-inventario-group');
       if (inventarioGroup0) inventarioGroup0.style.display = '';
       if (document.getElementById('menu-consolidado')) document.getElementById('menu-consolidado').style.display = '';
       if (document.getElementById('menu-comisiones')) document.getElementById('menu-comisiones').style.display = '';
       if (document.getElementById('menu-config-permisos')) document.getElementById('menu-config-permisos').style.display = '';
       if (document.getElementById('menu-config-ventas')) document.getElementById('menu-config-ventas').style.display = '';
       document.querySelectorAll('.vendor-item').forEach(item => { item.style.display = ''; });
       document.querySelectorAll('.menu-sublabel').forEach(item => { item.style.display = ''; });

       if (rolEff === 'VENDEDOR') {
          var adminGroup = document.getElementById('nav-admin-group');
          if (adminGroup) adminGroup.style.display = 'none';
          var inventarioGroup = document.getElementById('nav-inventario-group');
          if (inventarioGroup) inventarioGroup.style.display = 'none';
          document.getElementById('menu-consolidado').style.display = 'none';
          document.getElementById('menu-comisiones').style.display = 'none';
          let sublabels = document.querySelectorAll('.menu-sublabel');
          if (sublabels[0]) sublabels[0].style.display = 'none';
          if (hojaEff) {
             document.querySelectorAll('.vendor-item').forEach(item => { if (item.id !== 'menu-' + hojaEff.replace(/\s/g, '')) item.style.display = 'none'; });
          }
          // Clientes siempre visible para vendedores
          if (document.getElementById('menu-clientes')) document.getElementById('menu-clientes').style.display = 'block';
          if (document.getElementById('menu-config-ventas')) document.getElementById('menu-config-ventas').style.display = 'none';
       } else if (rolEff === 'VENDEDORGRAL') {
          var adminGroup = document.getElementById('nav-admin-group');
          if (adminGroup) adminGroup.style.display = 'none';
          var inventarioGroup = document.getElementById('nav-inventario-group');
          if (inventarioGroup) inventarioGroup.style.display = 'none';
          // Ocultar consolidado y comisiones para VENDEDORGRAL
          if (document.getElementById('menu-consolidado')) document.getElementById('menu-consolidado').style.display = 'none';
          if (document.getElementById('menu-comisiones')) document.getElementById('menu-comisiones').style.display = 'none';
          // Ocultar config permisos
          if (document.getElementById('menu-config-permisos')) document.getElementById('menu-config-permisos').style.display = 'none';
          if (document.getElementById('menu-config-ventas')) document.getElementById('menu-config-ventas').style.display = 'none';
       } else if (rolEff === 'ROOT') {
          // ROOT tiene todos los permisos (se definirán más adelante)
          if (document.getElementById('menu-config-ventas')) document.getElementById('menu-config-ventas').style.display = 'block';
       }
       // ADMIN ya puede ver todo por defecto (no se oculta nada)
       if (rolEff === 'ADMIN' && document.getElementById('menu-config-ventas')) {
          document.getElementById('menu-config-ventas').style.display = 'block';
       }
    }
 
    // NUEVA FUNCIÓN: Renderizar lista de vendedores dinámicamente
    function renderizarVendedores() {
       google.script.run.withSuccessHandler(res => {
          if (res.error) {
             console.error('Error cargando vendedores:', res.mensaje);
             return;
          }
 
          let container = document.getElementById('vendor-list-container');
          if (!container) return;
 
          let html = '';
          VIEW_AS_VENDEDORES = [];
 
          // Vendedores activos (ordenados alfabéticamente)
          let activosOrdenados = (res.activos || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
          activosOrdenados.forEach(v => {
             let idNombre = v.nombre.replace(/\s/g, '');
             let icono = v.nombre === 'Universal Jumps' ? 'storefront' : 'person';
             VIEW_AS_VENDEDORES.push(v.nombre);
             html += `<div class="menu-item vendor-item vendor-active" id="menu-${idNombre}" onclick="navegar(this, '${v.nombre}')">
                   <span class="material-symbols-outlined">${icono}</span> ${v.nombre}
                </div>`;
          });
 
          // Separador si hay inactivos
          if ((res.inactivos || []).length > 0) {
             html += `<div class="menu-sublabel" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">VENDEDORES INACTIVOS</div>`;
 
             // Vendedores inactivos (ordenados alfabéticamente)
             let inactivosOrdenados = (res.inactivos || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
             inactivosOrdenados.forEach(v => {
                let idNombre = v.nombre.replace(/\s/g, '');
                let icono = v.nombre === 'Universal Jumps' ? 'storefront' : 'person';
                VIEW_AS_VENDEDORES.push(v.nombre);
                html += `<div class="menu-item vendor-item vendor-inactive" id="menu-${idNombre}" onclick="navegar(this, '${v.nombre}')">
                      <span class="material-symbols-outlined">${icono}</span> ${v.nombre}
                   </div>`;
             });
          }
 
          container.innerHTML = html;
          populateViewAsHojaOptions();
          updateViewAsControls();
          bindViewAsControls();
 
          // Aplicar permisos después de renderizar
          if (USUARIO_ACTUAL) aplicarPermisos(USUARIO_ACTUAL);
          if (typeof poblarSelectFormasPagoVenta === 'function') poblarSelectFormasPagoVenta('pagoInput');
       }).obtenerListaVendedores();
    }
 
    function inicializarApp() {
       var fi = document.getElementById('fechaInput');
       var fc = document.getElementById('fechaCaja');
       if (fi && typeof getFechaHoyISO === 'function') fi.value = getFechaHoyISO();
       if (fc && typeof getFechaHoyISO === 'function') fc.value = getFechaHoyISO();
 
       google.script.run.withSuccessHandler(res => {
          if (!res.error) COTIZACIONES = res.data;
       }).obtenerCotizacionesBackend();
 
       google.script.run.withSuccessHandler(res => {
          if (!res.error) { GLOBAL_CONFIG = res.data; poblarSelectsCaja(); }
       }).obtenerConfiguracion();
 
       // Cargar vendedores dinámicamente
       renderizarVendedores();
 
       let hoy = new Date();
       // Inicializar selectores de balance si existen
       let selMesBalance = document.getElementById('selMesBalance');
       let selAnioBalance = document.getElementById('selAnioBalance');
       if (selMesBalance) selMesBalance.value = (hoy.getMonth() + 1).toString(); // Mes actual (1-12)
       if (selAnioBalance) selAnioBalance.value = hoy.getFullYear();
 
       const mesActual = hoy.getMonth();
       let obj = 'OBJETIVOS 1°T';
       if (mesActual >= 3 && mesActual <= 5) obj = 'OBJETIVOS 2°T';
       else if (mesActual >= 6 && mesActual <= 8) obj = 'OBJETIVOS 3°T';
       else if (mesActual >= 9) obj = 'OBJETIVOS 4°T';
       document.getElementById('selTrimestreHeader').value = obj;
 
       if (typeof poblarAnioConsolidado === 'function') poblarAnioConsolidado();
       initNavDropdowns();
       navegar(null, 'HOME');
    }
 
    function initNavDropdowns() {
       if (window.innerWidth <= 768) return;
       var dropdowns = document.querySelectorAll('.top-nav-dropdown');
       var closeTimer = null;
       function setArrowState(dd, open) {
          var btn = dd && dd.querySelector('.top-nav-dropdown-trigger');
          if (btn) {
             if (open) btn.classList.add('nav-arrow-open'); else btn.classList.remove('nav-arrow-open');
          }
       }
       dropdowns.forEach(function (dd) {
          dd.addEventListener('mouseenter', function () {
             if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
             dropdowns.forEach(function (d) {
                if (d !== dd && d.classList.contains('nav-dropdown-open')) {
                   d.classList.add('nav-dropdown-close-now');
                   setArrowState(d, false);
                }
                d.classList.remove('nav-dropdown-open');
                setArrowState(d, false);
             });
             dd.classList.remove('nav-dropdown-close-now');
             dd.classList.add('nav-dropdown-open');
             setArrowState(dd, true);
             dropdowns.forEach(function (d) { d.classList.remove('nav-dropdown-close-now'); });
          });
          dd.addEventListener('mouseleave', function () {
             var self = dd;
             closeTimer = setTimeout(function () {
                self.classList.remove('nav-dropdown-open');
                setArrowState(self, false);
                closeTimer = null;
             }, 120);
          });
       });
    }
 
 
 
    function toggleMenu() {
       var menu = document.getElementById('top-nav-menu');
       var overlay = document.getElementById('mobile-overlay');
       if (menu) menu.classList.toggle('open');
       if (overlay) overlay.classList.toggle('active');
    }
 
    function navegar(el, hoja) {
       // Prevenir navegación múltiple
       if (NAVEGANDO) return;
       NAVEGANDO = true;
 
       if (window.innerWidth <= 768) {
          var m = document.getElementById('top-nav-menu');
          var o = document.getElementById('mobile-overlay');
          if (m) m.classList.remove('open');
          if (o) o.classList.remove('active');
       }
       if (typeof debugLog === 'function') debugLog('NAV', 'Navegando', { hoja: hoja });
 
       document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
       if (el) { el.classList.add('active'); }
 
       let selVentas = document.getElementById('selTrimestreHeader');
       let selBalance = document.getElementById('balance-filters');
       let selConsolidadoVentas = document.getElementById('consolidado-ventas-filters');
       let selStock = document.getElementById('stock-filters');
       let fabVenta = document.querySelector('.fab');
       let fabCaja = document.getElementById('fab-caja');
 
       // Ocultar todas las vistas personalizadas PRIMERO (antes de cualquier otra operación)
       document.querySelectorAll('[id^="vista-"]').forEach(v => {
          v.style.display = 'none';
       });
 
       selVentas.style.display = 'none';
       selBalance.style.display = 'none';
       if (selConsolidadoVentas) selConsolidadoVentas.style.display = 'none';
       if (selStock) selStock.style.display = 'none';
       if (fabVenta) fabVenta.style.display = 'none';
       if (fabCaja) fabCaja.style.display = 'none';

       if (typeof APP_STATE !== 'undefined') APP_STATE.set('hojaActual', hoja); else HOJA_ACTUAL = hoja;
 
       if (hoja === 'HOME') { 
          document.getElementById('titulo').innerText = 'INICIO';
          renderMainMenu(); 
       }
       else if (hoja === 'MENU_ADMIN') { 
          document.getElementById('titulo').innerText = 'ADMINISTRACIÓN';
          renderAdminMenu(); 
       }
       else if (hoja === 'MENU_VENTAS') { 
          document.getElementById('titulo').innerText = 'VENTAS';
          renderVentasMenu(); 
       }
       else if (hoja === 'MENU_STOCK') { 
          var rolEff = getRolEfectivo();
          if (rolEff === 'VENDEDOR' || rolEff === 'VENDEDORGRAL') {
             alert('No tienes permisos para ver esta sección');
             NAVEGANDO = false;
             return;
          }
          document.getElementById('titulo').innerText = 'STOCK';
          if (selStock) selStock.style.display = 'flex';
          if (document.getElementById('app')) document.getElementById('app').innerHTML = '';
          renderStockMenu(); 
       }
       else if (hoja === 'STOCK') {
          var rolEff = getRolEfectivo();
          if (rolEff === 'VENDEDOR' || rolEff === 'VENDEDORGRAL') {
             alert('No tienes permisos para ver esta sección');
             NAVEGANDO = false;
             return;
          }
          document.getElementById('titulo').innerText = 'STOCK';
          if (selStock) selStock.style.display = 'flex';
          mostrarEstadoCarga('STOCK', '<div class="back-nav" onclick="navegar(null, \'HOME\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'STOCK');
          cargarStock();
       }
       else if (hoja === 'OBJETIVOS') {
          selVentas.style.display = 'block';
          document.getElementById('titulo').innerText = 'OBJETIVOS';
          mostrarEstadoCarga('OBJETIVOS', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'OBJETIVOS');
          cargar(selVentas.value);
       }
       else if (hoja === 'CAMBIAR_TRIMESTRE') {
          selVentas.style.display = 'block';
          let currentTitle = document.getElementById('titulo').innerText;
          if (currentTitle === 'COMISIONES') {
             // Si estamos en comisiones, recargar todas las comisiones
             document.getElementById('titulo').innerText = 'COMISIONES';
             mostrarEstadoCarga('COMISIONES', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'COMISIONES');
             google.script.run.withSuccessHandler(res => {
                NAVEGANDO = false;
                if (HOJA_ACTUAL !== 'CAMBIAR_TRIMESTRE' || (document.getElementById('titulo') && document.getElementById('titulo').innerText !== 'COMISIONES')) return;
                if (res.error) {
                   document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">COMISIONES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
                } else {
                   renderComisiones(res.data);
                }
             }).obtenerTodasLasComisiones();
          } else {
             document.getElementById('titulo').innerText = 'OBJETIVOS';
             document.getElementById('btnObjetivos').classList.add('active');
             mostrarEstadoCarga('OBJETIVOS', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'OBJETIVOS');
             cargar(selVentas.value);
          }
       }
       else if (hoja === 'GESTION_USUARIOS') {
          document.getElementById('titulo').innerText = 'GESTIONAR USUARIOS';
          mostrarEstadoCarga('GESTIONAR USUARIOS', '<div class="back-nav" onclick="navegar(null, \'MENU_ADMIN\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'USUARIOS');
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'GESTION_USUARIOS') return;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_ADMIN')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">GESTIONAR USUARIOS</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderGestionUsuarios();
             }
          }).obtenerTodosUsuarios();
       }
       else if (hoja === 'CAJA') {
          selBalance.style.display = 'flex';
          document.getElementById('titulo').innerText = 'BALANCE DE CAJA';
          mostrarEstadoCarga('BALANCE DE CAJA', '<div class="back-nav" onclick="navegar(null, \'MENU_ADMIN\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'CAJA');
          renderBalanceCaja();
       }
       else if (hoja === 'CAJA_CONSOLIDADO') {
          selBalance.style.display = 'none';
          document.getElementById('titulo').innerText = 'CONSOLIDADO CAJA';
          mostrarEstadoCarga('CONSOLIDADO CAJA', '<div class="back-nav" onclick="navegar(null, \'CAJA\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'CAJA_CONSOLIDADO');
          if (typeof renderConsolidadoCaja === 'function') {
             renderConsolidadoCaja();
          }
       }
       else if (hoja === 'CONFIGURACION_VENTAS') {
         var rolEff = getRolEfectivo();
         if (!USUARIO_ACTUAL || (rolEff !== 'ADMIN' && rolEff !== 'ROOT')) {
             alert('No tienes permisos para esta sección.');
             NAVEGANDO = false;
             return;
          }
          document.getElementById('titulo').innerText = 'CONFIGURACIÓN - VENTAS';
          mostrarEstadoCarga('CONFIGURACIÓN', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'CONFIGURACION_VENTAS');
          if (typeof renderConfiguracionVentas === 'function') {
             renderConfiguracionVentas();
          } else {
             document.getElementById('app').innerHTML += '<div style="padding:40px;color:#ef4444;text-align:center;">No se cargó el módulo de configuración.</div>';
          }
       }
       else if (hoja === 'CLIENTES') {
          document.getElementById('titulo').innerText = 'CLIENTES';
          mostrarEstadoCarga('CLIENTES', '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'CLIENTES');
          google.script.run.withSuccessHandler(res => {
             NAVEGANDO = false;
             if (HOJA_ACTUAL !== 'CLIENTES') return;
             if (res.error) {
                document.getElementById('app').innerHTML = `<div class="back-nav" onclick="navegar(null, 'MENU_VENTAS')"><span class="material-symbols-outlined">arrow_back</span> Volver</div><div class="dash-section-title">CLIENTES</div><div style="padding:40px; text-align:center; color:#ef4444;">Error: ${res.mensaje}</div>`;
             } else {
                renderClientes();
             }
          }).obtenerListaVendedores();
       }
       else if (hoja === 'CONSOLIDADO' || hoja === '%') {
          // Verificar permisos para CONSOLIDADO y COMISIONES
         if (USUARIO_ACTUAL && getRolEfectivo() === 'VENDEDORGRAL') {
             alert('No tienes permisos para ver esta sección');
             NAVEGANDO = false;
             return;
          }
          let tituloConsolidado = hoja === '%' ? 'COMISIONES' : 'CONSOLIDADO';
          document.getElementById('titulo').innerText = tituloConsolidado;
          mostrarEstadoCarga(tituloConsolidado, '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', hoja === '%' ? 'COMISIONES' : 'CONSOLIDADO');
          cargar(hoja);
       }
       else {
          // Ocultar el FAB global siempre en vistas de vendedor específico (se usa el botón dinámico dentro de renderVendedor)
          if (fabVenta) fabVenta.style.display = 'none';
          let tituloVendedor = 'VENTAS: ' + hoja.toUpperCase();
          document.getElementById('titulo').innerText = tituloVendedor;
          mostrarEstadoCarga(tituloVendedor, '<div class="back-nav" onclick="navegar(null, \'MENU_VENTAS\')"><span class="material-symbols-outlined">arrow_back</span> Volver</div>', 'VENTAS');
          cargar(hoja);
       }
 
       // Resetear flag después de un breve delay para permitir la navegación
       setTimeout(() => { NAVEGANDO = false; }, 300);
    }
 
    // --- MENUS ---
    function destroyHomeCharts() {
       if (window._ujHomeCharts && window._ujHomeCharts.length) {
          window._ujHomeCharts.forEach(function (c) {
             try { c.destroy(); } catch (e) {}
          });
       }
       window._ujHomeCharts = [];
    }

    function formatMoneyHome(n) {
       return new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(n) || 0);
    }

    function formatFechaHome(iso) {
       if (!iso || String(iso).length < 10) return iso || '';
       var p = String(iso).slice(0, 10).split('-');
       if (p.length !== 3) return iso;
       return p[2] + '/' + p[1] + '/' + p[0];
    }

    function monthNameEs(m) {
       var meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
       return meses[(Number(m || 1) - 1)] || '';
    }

    /** Eje Y: 4 marcas (0 y 3 saltos). Cada salto es un número redondo (1/2/2.5/5/10 × 10ⁿ). */
    function homeChartYAxisConfig(dataActual, dataPrev) {
       var maxVal = 0;
       var all = (dataActual || []).concat(dataPrev || []);
       for (var i = 0; i < all.length; i++) maxVal = Math.max(maxVal, Number(all[i]) || 0);
       if (maxVal <= 0) return { max: 3000000, stepSize: 1000000 };

       function niceMoneyStepFromRough(rough) {
          if (!isFinite(rough) || rough <= 0) return 1;
          var pow10 = Math.pow(10, Math.floor(Math.log10(rough)));
          var norm = rough / pow10;
          var mult = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 2.5 ? 2.5 : norm <= 5 ? 5 : 10;
          return Math.round(mult * pow10);
       }

       var padded = maxVal * 1.15;
       var target = padded / 3;
       var stepSize = niceMoneyStepFromRough(target);
       if (stepSize < 1) stepSize = 1;
       var guard = 0;
       while (3 * stepSize < padded && guard++ < 40) {
          target *= 1.12;
          stepSize = niceMoneyStepFromRough(target);
          if (stepSize < 1) stepSize = 1;
       }
       var niceMax = 3 * stepSize;
       return { max: niceMax, stepSize: stepSize };
    }

    function homeChartFormatYAxisMoney(value) {
       var n = Math.round(Number(value));
       var fmt = new Intl.NumberFormat('es-AR', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
       }).format(n);
       return '$ ' + fmt;
    }

    function getDashboardVendedorParam() {
       var u = USUARIO_ACTUAL;
       if (!u) return '';
       var rolEff = getRolEfectivo();
       if (rolEff === 'ADMIN' || rolEff === 'ROOT') return '';
       if (rolEff === 'VENDEDOR') {
          var h = (getHojaEfectiva() || u.hoja || '').toString().trim();
          return h || '__SIN_HOJA__';
       }
       if (rolEff === 'VENDEDORGRAL') {
          var n = (u.nombre || '').toString().trim();
          return n || '__SIN_NOMBRE_VENDEDOR__';
       }
       return '';
    }

    function pintarHomeDashboard(res, showRanking, vendedorFiltrado) {
       var inner = document.getElementById('home-dashboard-inner');
       if (!inner) return;
       if (res.error || !res.data) {
          inner.innerHTML = '<div class="home-dashboard-error">No se pudieron cargar los datos del panel.</div>';
          return;
       }
       var d = res.data;
       var tituloMes = monthNameEs(d.mes || 1) + ' ' + (d.anio || '');
       var tituloHoy = 'Hoy (' + formatFechaHome(d.hoyIso || '') + ')';

       destroyHomeCharts();

       var kpiBlock =
          '<div class="dash-kpi-grid">' +
             '<div class="dash-kpi-card"><div class="dash-kpi-label">Total vendido (' + tituloMes + ')</div>' +
                '<div class="dash-kpi-value">$ ' + formatMoneyHome(d.totalMes) + '</div>' +
                '<div class="dash-kpi-sub">Mes actual (según permisos).</div></div>' +
             '<div class="dash-kpi-card"><div class="dash-kpi-label">Total vendido ' + tituloHoy + '</div>' +
                '<div class="dash-kpi-value">$ ' + formatMoneyHome(d.totalHoy) + '</div>' +
                '<div class="dash-kpi-sub">Ventas cargadas con fecha de hoy.</div></div>' +
          '</div>';

       var serieCard =
          '<div class="dash-chart-card">' +
             '<div class="dash-chart-title">' +
                '<span>Ventas vs Mes Anterior</span>' +
                '<span class="dash-chart-legend">' +
                   '<span class="dash-legend-item"><span class="dash-legend-dot dash-legend-dot-actual"></span>Actual</span>' +
                   '<span class="dash-legend-item"><span class="dash-legend-dot dash-legend-dot-prev"></span>Anterior</span>' +
                '</span>' +
             '</div>' +
             '<div class="dash-chart-canvas-wrap"><canvas id="chartHomeSerie" height="240"></canvas></div>' +
          '</div>';

       var rankBlock = '';
       if (showRanking) {
          var rank = (d.rankingVendedores || []).slice(0, 10);
          if (!rank.length) {
             rankBlock =
                '<div class="dash-ranking-card">' +
                   '<div class="dash-ranking-title">Ranking de vendedores</div>' +
                   '<div class="dash-ranking-empty">Sin datos para este mes.</div>' +
                '</div>';
          } else {
             var items = '';
             rank.forEach(function (x, idx) {
                items +=
                   '<div class="dash-rank-item">' +
                      '<div class="dash-rank-left">' +
                         '<div class="dash-rank-pos">' + (idx + 1) + '</div>' +
                         '<div class="dash-rank-name">' + (x.vendedor || '') + '</div>' +
                      '</div>' +
                      '<div class="dash-rank-total">$ ' + formatMoneyHome(x.total) + '</div>' +
                   '</div>';
             });
             rankBlock =
                '<div class="dash-ranking-card">' +
                   '<div class="dash-ranking-title">Ranking de vendedores</div>' +
                   '<div class="dash-ranking-list">' + items + '</div>' +
                '</div>';
          }
       }

       var chartsBlock = '<div class="dash-charts-grid dash-charts-compare">' + serieCard + rankBlock + '</div>';

       var rows = d.ultimasVentas || [];
       var colSpan = vendedorFiltrado ? 4 : 5;
       var tableHead = '<tr><th>Fecha</th>';
       if (!vendedorFiltrado) tableHead += '<th>Vendedor</th>';
       tableHead += '<th>Cliente</th><th>Total</th><th>Estado</th></tr>';
       var tableBody = '';
       if (rows.length === 0) {
          tableBody = '<tr><td colspan="' + colSpan + '" class="dash-ventas-empty">No hay ventas recientes en este período.</td></tr>';
       } else {
          rows.forEach(function (r) {
             tableBody += '<tr><td>' + formatFechaHome(r.fecha || '') + '</td>';
             if (!vendedorFiltrado) tableBody += '<td>' + (r.vendedor || '') + '</td>';
             tableBody += '<td>' + (r.cliente || '') + '</td><td>$ ' + formatMoneyHome(r.total) + '</td><td>' + (r.estado || '') + '</td></tr>';
          });
       }

       inner.innerHTML = kpiBlock + chartsBlock +
          '<div class="dash-table-section"><div class="dash-table-title">Últimas 5 ventas</div><div class="dash-table-wrap"><table class="dash-ventas-table"><thead>' +
          tableHead + '</thead><tbody>' + tableBody + '</tbody></table></div></div>';

       if (typeof Chart === 'undefined') return;

       var tickColor = '#94a3b8';
       var accent = '#38bdf8';
       var prevColor = 'rgba(148, 163, 184, 0.65)';

       var serieLabels = (d.serieSemanalActual || []).map(function (p) {
          return 'SEM ' + String(p.semana).padStart(2, '0');
       });
       var dataActual = (d.serieSemanalActual || []).map(function (p) { return Number(p.total) || 0; });
       var dataPrev = (d.serieSemanalAnterior || []).map(function (p) { return Number(p.total) || 0; });
       while (dataPrev.length < serieLabels.length) dataPrev.push(0);
       if (dataPrev.length > serieLabels.length) dataPrev = dataPrev.slice(0, serieLabels.length);

       var yScale = homeChartYAxisConfig(dataActual, dataPrev);

       var ctxS = document.getElementById('chartHomeSerie');
       if (ctxS) {
          var gctx = ctxS.getContext('2d');

          window._ujHomeCharts.push(new Chart(gctx, {
             type: 'line',
             data: {
                labels: serieLabels,
                datasets: [{
                   label: 'ACTUAL',
                   data: dataActual,
                   borderColor: accent,
                   backgroundColor: 'transparent',
                   fill: false,
                   tension: 0.42,
                   cubicInterpolationMode: 'monotone',
                   borderWidth: 3,
                   pointRadius: 0,
                   pointHoverRadius: 4,
                }, {
                   label: 'ANTERIOR',
                   data: dataPrev,
                   borderColor: prevColor,
                   backgroundColor: 'transparent',
                   fill: false,
                   tension: 0.42,
                   cubicInterpolationMode: 'monotone',
                   borderWidth: 2,
                   borderDash: [5, 5],
                   pointRadius: 0,
                   pointHoverRadius: 3,
                }],
             },
             options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 10, right: 6, left: 10, bottom: 6 } },
                interaction: { mode: 'index', intersect: false },
                elements: {
                   line: { borderJoinStyle: 'round', borderCapStyle: 'round' },
                },
                plugins: {
                   legend: { display: false },
                   tooltip: {
                      callbacks: {
                         label: function (ctx) {
                            return (ctx.dataset.label || '') + ': $ ' + formatMoneyHome(ctx.parsed.y);
                         },
                      },
                   },
                },
                scales: {
                   x: {
                      offset: true,
                      ticks: { color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 6, padding: 8 },
                      grid: { display: false, drawBorder: false },
                      border: { display: false },
                   },
                   y: {
                      min: 0,
                      max: yScale.max,
                      ticks: {
                         color: tickColor,
                         stepSize: yScale.stepSize,
                         maxTicksLimit: 5,
                         autoSkip: false,
                         padding: 10,
                         font: { size: 10 },
                         maxRotation: 0,
                         callback: function (v) { return homeChartFormatYAxisMoney(v); },
                      },
                      grid: { display: false, drawBorder: false },
                      border: { display: false },
                   },
                },
             },
          }));
       }
    }

    function renderMainMenu() {
       let user = USUARIO_ACTUAL;
       let rol = user ? getRolEfectivo() : '';
       let showRanking = (rol === 'ADMIN' || rol === 'ROOT');
       let vendedorParam = getDashboardVendedorParam();
       let mesNow = (new Date()).getMonth() + 1;
       let anioDash = typeof ANIO_ACTIVO !== 'undefined' ? ANIO_ACTIVO : (new Date()).getFullYear();

       let html = `<div class="welcome-banner"><div class="welcome-title">Panel Principal</div></div>
          <div id="home-dashboard" class="home-dashboard">
             <div class="dash-section-title" style="margin-top:0;border-bottom:none;padding-bottom:8px;">Resumen</div>
             <div id="home-dashboard-inner" class="home-dashboard-inner">
                <div class="home-dashboard-loading">Cargando datos…</div>
             </div>
          </div>
          `;
       document.getElementById('app').innerHTML = html;

       google.script.run
          .withSuccessHandler(function (res) {
             pintarHomeDashboard(res, showRanking, !!vendedorParam);
          })
          .withFailureHandler(function () {
             var inner = document.getElementById('home-dashboard-inner');
             if (inner) inner.innerHTML = '<div class="home-dashboard-error">Error al cargar el panel.</div>';
          })
          .obtenerDashboardHome(mesNow, anioDash, vendedorParam);
    }

             <div class="home-card" onclick="navegar(null, 'GESTION_USUARIOS')"><div class="home-icon"><span class="material-symbols-outlined">groups</span></div><div class="home-title">Gestionar Usuarios</div><div class="home-desc">Usuarios y Permisos</div></div>
          </div>`;

                      <div class="home-card" onclick="navegar(null, '%')"><div class="home-icon"><span class="material-symbols-outlined">trending_up</span></div><div class="home-title">Comisiones</div></div>
                      <div class="home-card" onclick="navegar(null, 'OBJETIVOS')"><div class="home-icon"><span class="material-symbols-outlined">track_changes</span></div><div class="home-title">Objetivos</div></div>
                      <div class="home-card" onclick="navegar(null, 'CLIENTES')"><div class="home-icon"><span class="material-symbols-outlined">contacts</span></div><div class="home-title">Clientes</div></div>
                      <div class="home-card" onclick="navegar(null, 'CONFIGURACION_VENTAS')"><div class="home-icon"><span class="material-symbols-outlined">tune</span></div><div class="home-title">Configuración</div><div class="home-desc">Medios de pago y más</div></div>`;

         html += `<div class="home-card" onclick="navegar(null, '${hojaEff || user.hoja}')"><div class="home-icon"><span class="material-symbols-outlined">edit_note</span></div><div class="home-title">Mis Ventas</div></div>

       }
       html += `</div>`;
       document.getElementById('app').innerHTML = html;
    }

       }
    }
